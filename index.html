    TAB_META[key].render();
    save(STORAGE.lastTab, key);

    if (options.scrollToId) {
      requestAnimationFrame(() => {
        const target = document.getElementById(options.scrollToId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo(0, 0);
        }
      });
    } else {
      window.scrollTo(0, 0);
    }
  }

  // Header Tips button routes to the Tips view (formerly a nav tab).
  headerTipsBtn.addEventListener('click', () => setView('tips'));

  function updateHeaderSubtitle() {
    if (state.currentView === 'meals' && state.currentDay) {
      const d = DAYS.find(x => x.key === state.currentDay);
      headerSubtitle.textContent = d ? d.name : '';
    } else if (state.currentView === 'today') {
      const d = DAYS.find(x => x.key === todayDayKey());
      headerSubtitle.textContent = d ? d.name : '';
    } else {
      headerSubtitle.textContent = '';
    }
  }

  nav.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-view]');
    if (!btn) return;
    setView(btn.dataset.view);
  });

  /* ============================================================
   *  TODAY TAB
   * ============================================================ */

  function navFromTimeline(item, dayKey) {
    if (item.navTo) {
      setView(item.navTo);
      return;
    }
    if (item.navMi !== undefined) {
      state.currentDay = dayKey;
      save(STORAGE.curDay, dayKey);
      setView('meals', { scrollToId: 'meal-' + dayKey + '-' + item.navMi });
    }
  }

  function renderToday() {
    const root = document.getElementById('view-today');
    root.innerHTML = '';

    const dayKey = todayDayKey();
    const day = DAYS.find(d => d.key === dayKey);
    const timeline = buildTodayTimeline(dayKey);
    const now = currentMinute();

    // Header
    const header = el('div', 'today-header');
    const dateStr = new Date().toLocaleDateString(undefined,
      { weekday: 'long', month: 'long', day: 'numeric' });
    header.innerHTML =
      '<div class="today-eyebrow">' + dateStr + '</div>'
      + '<h1 class="today-greeting">' + greeting() + ', Atul</h1>'
      + '<span class="badge ' + day.type + '">' + day.badge + '</span>';
    root.appendChild(header);

    // Next-up card (shows the first future item)
    const nextIdx = timeline.findIndex(t => minuteOfDay(t.time) > now);
    if (nextIdx >= 0) {
      const next = timeline[nextIdx];
      const mins = minuteOfDay(next.time) - now;
      const whenStr = mins < 60
        ? 'in ' + mins + ' min'
        : 'in ' + Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
      const nextCard = el('button', 'today-next' + (next.optional ? ' is-optional' : ''));
      nextCard.innerHTML =
        '<div class="next-label">'
        +   iconForTimelineType(next.type) + ' Coming up'
        +   (next.optional ? ' <span class="next-opt-pill">Optional</span>' : '')
        + '</div>'
        + '<div class="next-time">' + formatTime12(next.time) + ' · ' + whenStr + '</div>'
        + '<div class="next-title">' + next.title + '</div>'
        + (next.subtitle ? '<div class="next-sub">' + next.subtitle + '</div>' : '');
      if (next.navMi !== undefined || next.navTo) {
        nextCard.addEventListener('click', () => navFromTimeline(next, dayKey));
      } else {
        nextCard.style.cursor = 'default';
      }
      root.appendChild(nextCard);
    } else {
      // End of day
      const done = el('div', 'card');
      done.innerHTML =
        '<h2>That\'s a wrap</h2>'
        + '<p class="muted small" style="margin:0">All of today\'s milestones have passed. '
        + 'Tomorrow\'s plan will appear after midnight.</p>';
      root.appendChild(done);
    }

    // Hydration indicator (ideal state based on schedule)
    const hydro = computeHydration(dayKey);
    if (hydro.total > 0) {
      const hydroCard = el('div', 'card hydration-card');
      const leftMl = hydro.total - hydro.consumed;
      const slotsLeft = hydro.totalSlots - hydro.completedSlots;
      const targetL = (hydro.total / 1000).toFixed(2);
      const isDone = hydro.pct >= 100 || slotsLeft === 0;

      // Tick markers on the bar so each scheduled slot has a visual anchor
      const ticksHtml = hydro.ticks
        .slice(0, -1) // skip the last tick (it lives at 100% = right edge)
        .map(pct => '<span class="hydro-tick" style="left:' + pct.toFixed(2) + '%"></span>')
        .join('');

      const nextHtml = hydro.nextSlot
        ? '<span class="next-time-chip">' + formatTime12(hydro.nextSlot.time) + '</span>'
          + '<span>Next · <b>' + hydro.nextSlot.amount + ' ml</b></span>'
        : '<span>✓ All slots done for today</span>';

      hydroCard.innerHTML =
        '<div class="hydro-head">'
        +   '<div class="hydro-title"><span class="hydro-icon">💧</span>Hydration</div>'
        +   '<div class="hydro-pct' + (isDone ? ' done' : '') + '">' + hydro.pct + '%</div>'
        + '</div>'
        + '<div class="hydro-totals">'
        +   '<span class="hydro-current">' + hydro.consumed.toLocaleString() + '</span>'
        +   '<span class="hydro-unit">ml</span>'
        +   '<span class="hydro-sep">/</span>'
        +   '<span class="hydro-target">' + targetL + ' L target</span>'
        + '</div>'
        + '<div class="hydro-bar">'
        +   '<div class="hydro-fill" style="width:' + hydro.pct + '%"></div>'
        +   '<div class="hydro-ticks">' + ticksHtml + '</div>'
        + '</div>'
        + '<div class="hydro-sub">'
        +   '<span class="hydro-left"><b>' + leftMl.toLocaleString() + ' ml</b> left</span>'
        +   '<span class="hydro-slots-text">' + hydro.completedSlots + ' / ' + hydro.totalSlots + ' slots</span>'
        + '</div>'
        + '<div class="hydro-next">' + nextHtml + '</div>';
      root.appendChild(hydroCard);
    }

    // Timeline
    const tlCard = el('div', 'card today-tl-card');
    const shiftCount = Object.keys(todayShiftMap()).length;
    const shiftWarnings = shiftCount > 0 ? computeShiftWarnings(timeline) : [];
    tlCard.innerHTML = '<div class="today-tl-head">'
      +   '<h2 style="margin:0">Today\'s timeline</h2>'
      +   (shiftCount > 0
          ? '<button class="tl-reset-btn" id="tl-reset-btn" type="button">Reset today</button>'
          : '')
      + '</div>';
    if (shiftCount > 0) {
      const info = el('div', 'tl-shift-info');
      info.innerHTML = '⏱ <b>' + shiftCount + '</b> shifted today'
        + (shiftWarnings.length
           ? ' · <span class="tl-warn-count">' + shiftWarnings.length + ' warning' + (shiftWarnings.length > 1 ? 's' : '') + '</span>'
           : '');
      tlCard.appendChild(info);
      if (shiftWarnings.length) {
        const warnBox = el('div', 'tl-warnings');
        warnBox.innerHTML = shiftWarnings.map(w => '<div class="tl-warn-row">⚠ ' + w + '</div>').join('');
        tlCard.appendChild(warnBox);
      }
    }
    const tl = el('div', 'timeline');
    timeline.forEach(item => {
      const mm = minuteOfDay(item.time);
      let stateClass = 'future';
      if (mm < now - 15) stateClass = 'past';
      else if (mm >= now - 15 && mm <= now + 15) stateClass = 'now';

      const hasNav = item.navMi !== undefined || item.navTo;
      const classes = ['tl-item', 'type-' + item.type, stateClass];
      if (!hasNav) classes.push('no-nav');
      if (item.optional) classes.push('is-optional');
      if (item.shifted || item.cascaded) classes.push('is-shifted');
      if (item.anchor) classes.push('is-anchor');
      const row = el('div', classes.join(' '));
      const titleHtml = item.title
        + (item.optional ? ' <span class="tl-opt-pill">Optional</span>' : '')
        + (item.anchor ? ' <span class="tl-anchor-pill" title="Medically anchored · cannot shift">⚓</span>' : '');
      const timeDisplayHtml = '<div class="tl-time-new">' + formatTime12(item.time) + '</div>'
        + ((item.shifted || item.cascaded)
            ? '<div class="tl-time-was">was ' + formatTime12(item.plannedTime) + '</div>'
            : '');
      row.innerHTML =
        '<div class="tl-time-col">' + timeDisplayHtml + '</div>'
        + '<div class="tl-line"><div class="tl-dot"></div></div>'
        + '<div class="tl-content">'
        +   '<div class="tl-icon">' + iconForTimelineType(item.type) + '</div>'
        +   '<div class="tl-text">'
        +     '<div class="tl-title">' + titleHtml + '</div>'
        +     (item.subtitle ? '<div class="tl-sub">' + item.subtitle + '</div>' : '')
        +   '</div>'
        +   (hasNav ? '<div class="tl-arrow">›</div>' : '')
        +   (!item.anchor
              ? '<button class="tl-shift-btn" type="button" aria-label="Shift time"'
                + (item.shifted ? ' data-shifted="1"' : '')
                + '>⏱</button>'
              : '')
        + '</div>';
      if (hasNav) {
        row.addEventListener('click', (e) => {
          // Don't nav if the shift button was tapped
          if (e.target.closest('.tl-shift-btn')) return;
          navFromTimeline(item, dayKey);
        });
      }
      const shiftBtn = row.querySelector('.tl-shift-btn');
      if (shiftBtn) {
        shiftBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          openShiftSheet(item);
        });
      }
      tl.appendChild(row);
    });
    tlCard.appendChild(tl);
    root.appendChild(tlCard);

    const resetBtn = document.getElementById('tl-reset-btn');
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        if (!confirm('Reset all of today\'s shifts back to the planned schedule?')) return;
        writeTodayShifts({});
        renderToday();
      });
    }
  }

  /* ============================================================
   *  MEALS TAB
   * ============================================================ */

  // Swap key format: "mon-3-2" — dayKey + mealIdx + itemIdx.
  function swapKey(dayKey, mealIdx, itemIdx) {
    return dayKey + '-' + mealIdx + '-' + itemIdx;
  }

  function getItem(dayKey, mealIdx, itemIdx) {
    const key = swapKey(dayKey, mealIdx, itemIdx);
    const original = MEAL_PLAN[dayKey][mealIdx].items[itemIdx];
    const swapped = state.swaps[key];
    if (!swapped) return { item: original, swapped: false };
    return {
      item: { ...original, name: swapped.name, p: swapped.p, f: swapped.f, c: swapped.c },
      swapped: true,
      originalName: original.name,
    };
  }

  function dayMacros(dayKey) {
    let P = 0, F = 0, C = 0;
    MEAL_PLAN[dayKey].forEach((meal, mi) => {
      meal.items.forEach((it, ii) => {
        const { item } = getItem(dayKey, mi, ii);
        P += item.p; F += item.f; C += item.c;
      });
    });
    return { p: P, f: F, c: C, cal: calOf(P, F, C) };
  }

  function mealMacros(dayKey, mi) {
    let P = 0, F = 0, C = 0;
    MEAL_PLAN[dayKey][mi].items.forEach((it, ii) => {
      const { item } = getItem(dayKey, mi, ii);
      P += item.p; F += item.f; C += item.c;
    });
    return { p: P, f: F, c: C, cal: calOf(P, F, C) };
  }

  function renderMeals() {
    const root = document.getElementById('view-meals');
    root.innerHTML = '';

    if (!state.currentDay) state.currentDay = todayDayKey();
    const dayKey = state.currentDay;
    const day = DAYS.find(d => d.key === dayKey);

    // Day strip
    const strip = el('div', 'day-strip');
    const today = todayDayKey();
    DAYS.forEach(d => {
      const pill = el('button', 'day-pill');
      if (d.key === today) pill.classList.add('today');
      if (d.key === dayKey) pill.classList.add('active');
      pill.innerHTML = '<span class="d">' + d.short + '</span><span class="n">' + shortBadge(d) + '</span>';
      pill.addEventListener('click', () => {
        state.currentDay = d.key;
        save(STORAGE.curDay, d.key);
        updateHeaderSubtitle();
        renderMeals();
      });
      strip.appendChild(pill);
    });
    root.appendChild(strip);

    // Day header
    const head = el('div', 'day-header');
    const mealCount = MEAL_PLAN[dayKey].length;
    head.innerHTML =
      '<div>'
      +   '<div class="day-name">' + day.name + '</div>'
      +   '<div class="day-sub">' + mealCount + ' meals · ' + dayKey.toUpperCase() + '</div>'
      + '</div>'
      + '<span class="badge ' + day.type + '">' + day.badge + '</span>';
    root.appendChild(head);

    // Macro bar card
    root.appendChild(buildMacroCard(dayKey));

    // Meal cards
    MEAL_PLAN[dayKey].forEach((meal, mi) => {
      root.appendChild(buildMealCard(dayKey, mi, meal));
    });
  }

  function shortBadge(d) {
    // single char icon in day pill
    if (d.type === 'strength') return '💪';
    if (d.type === 'cardio') return '🚶';
    return '☀️';
  }

  function buildMacroCard(dayKey) {
    const m = dayMacros(dayKey);
    const t = MACRO_TARGETS;
    const card = el('div', 'card macro-card');

    const top = el('div', 'macro-top');
    top.innerHTML =
      '<div class="macro-cal-wrap">'
      +   '<div class="macro-cal-label">Today\'s total</div>'
      +   '<div class="macro-cal">' + m.cal + '<span class="unit">kcal</span></div>'
      + '</div>'
      + '<div class="macro-target">'
      +   '<span class="big">' + t.calMin.toLocaleString() + '–' + t.calMax.toLocaleString() + '</span>'
      +   'target range'
      + '</div>';
    card.appendChild(top);

    card.appendChild(buildMacroRow('Protein', m.p, t.p, 'var(--protein)', 'fill-protein'));
    card.appendChild(buildMacroRow('Fat',     m.f, t.f, 'var(--fat)',     'fill-fat'));
    card.appendChild(buildMacroRow('Carbs',   m.c, t.c, 'var(--carbs)',   'fill-carbs'));
    return card;
  }

  function buildMacroRow(label, cur, target, color, fillClass) {
    const row = el('div', 'macro-row');
    const pct = Math.min(100, Math.round(100 * cur / target));
    row.innerHTML =
      '<div class="macro-name" style="color:' + color + '">' + label + '</div>'
      + '<div class="macro-bar"><div class="macro-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>'
      + '<div class="macro-value"><span class="cur">' + Math.round(cur) + 'g</span> / ' + target + 'g</div>';
    return row;
  }

  /* Skip-today helpers: record skipped optional meals per date.
     Skipping is purely a visual / journaling feature — the macro bar
     keeps showing planned totals (the day's target). Keyed by ISO date
     so skips auto-reset at midnight. */
  function isMealSkipped(dateIso, mi) {
    return !!(state.skips[dateIso] && state.skips[dateIso][mi]);
  }
  function toggleMealSkip(dateIso, mi) {
    if (!state.skips[dateIso]) state.skips[dateIso] = {};
    if (state.skips[dateIso][mi]) {
      delete state.skips[dateIso][mi];
      if (Object.keys(state.skips[dateIso]).length === 0) delete state.skips[dateIso];
    } else {
      state.skips[dateIso][mi] = true;
    }
    save(STORAGE.skips, state.skips);
  }

  /* Activity items are synthetic (not stored in MEAL_PLAN) so they
     never shift swap indices or affect macro totals. Rendered as
     lightweight rows with a water/walk pill. */
  function getMealActivities(meal) {
    const title = (meal.title || '').toLowerCase();
    const prefix = [];
    const suffix = [];

    if (title.includes('wake')) {
      suffix.push({ kind: 'walk', text: '20-min morning treadmill walk at 5 km/h (~7:00 AM)' });
    }
    if (title.includes('breakfast')) {
      prefix.push({ kind: 'water', text: '250 ml water at 7:45 AM, before eating' });
    }
    if (title.includes('mid-morning')) {
      prefix.push({ kind: 'water', text: '250 ml water at 10:30 AM' });
    }
    // "Lunch" but not "Post-lunch"
    if (title.includes('lunch') && !title.includes('post')) {
      prefix.push({ kind: 'water', text: '250 ml water at 1:15 PM, before eating' });
      suffix.push({ kind: 'walk',  text: '10-min slow walk after lunch (glucose control)' });
    }
    if (title.includes('evening') || title.includes('pre-workout')) {
      prefix.push({ kind: 'water', text: '250 ml water at 3:30 PM' });
      suffix.push({ kind: 'water', text: '250 ml water at 5:45 PM' });
    }
    if (title.includes('dinner')) {
      prefix.push({ kind: 'water', text: '250 ml water at 8:15 PM, before eating' });
      suffix.push({ kind: 'walk',  text: '15-min walk after dinner' });
      suffix.push({ kind: 'water', text: '500 ml water by 9:30 PM (split in 2)' });
      suffix.push({ kind: 'water', text: '250 ml water at 10:30 PM, before bed' });
    }
    return { prefix, suffix };
  }

  function buildActivityRow(act) {
    const row = el('div', 'item-row activity activity-' + act.kind);
    const main = el('div', 'item-main');
    const nameLine = el('div', 'item-name');
    const pill = el('span', 'activity-pill ' + act.kind);
    pill.textContent = act.kind === 'water' ? 'Hydrate' : 'Move';
    nameLine.appendChild(pill);
    nameLine.appendChild(document.createTextNode(act.text));
    main.appendChild(nameLine);
    row.appendChild(main);
    return row;
  }

  function mealTypeClass(meal) {
    const t = (meal.title || '').toLowerCase();
    if (t.includes('wake')) return 'is-wake';
    if (t.includes('breakfast')) return 'is-breakfast';
    if (t.includes('lunch')) return 'is-lunch';
    if (t.includes('dinner')) return 'is-dinner';
    if (t.includes('workout')) return 'is-workout';
    return 'is-snack';
  }
  function mealEyebrow(meal) {
    const t = (meal.title || '').toLowerCase();
    if (t.includes('wake')) return 'Morning hydration';
    if (t.includes('breakfast')) return 'Breakfast';
    if (t.includes('mid-morning')) return 'Snack';
    if (t.includes('lunch') && !t.includes('post-lunch')) return 'Lunch';
    if (t.includes('post-lunch')) return 'After lunch';
    if (t.includes('pre-workout')) return 'Fuel';
    if (t.includes('post-workout')) return 'Recovery';
    if (t.includes('evening')) return 'Evening snack';
    if (t.includes('dinner')) return 'Dinner';
    return 'Meal';
  }

  function buildMealCard(dayKey, mi, meal) {
    const isTodayView = dayKey === todayDayKey();
    const dateIso = todayISO();
    const skipped = meal.optional && isTodayView && isMealSkipped(dateIso, mi);

    const classes = ['meal', mealTypeClass(meal)];
    if (meal.optional) classes.push('is-optional');
    if (skipped)        classes.push('is-skipped');
    const card = el('div', classes.join(' '));
    card.id = 'meal-' + dayKey + '-' + mi;

    const head = el('div', 'meal-head');
    head.innerHTML =
      '<div class="meal-title-wrap">'
      +   '<div class="meal-eyebrow">' + mealEyebrow(meal)
      +     (meal.optional ? ' <span class="optional-pill">Optional</span>' : '')
      +   '</div>'
      +   '<div class="meal-title">' + meal.title + '</div>'
      + '</div>'
      + '<div class="meal-time">' + meal.time + '</div>';
    card.appendChild(head);

    const activities = getMealActivities(meal);
    // pre-meal activities
    activities.prefix.forEach(act => card.appendChild(buildActivityRow(act)));

    // Eating-order reminder — lunch only
    if (meal.title && meal.title.toLowerCase() === 'lunch') {
      const banner = el('div', 'eating-order-banner');
      banner.innerHTML =
        '<span class="eo-icon">🧠</span>'
        + '<span><b>Eating order:</b> salad first → dal / sabzi → roti or rice last. '
        + 'Flattens the glucose curve and cuts afternoon brain fog.</span>';
      card.appendChild(banner);
    }

    meal.items.forEach((it, ii) => {
      const { item, swapped } = getItem(dayKey, mi, ii);
      const row = el('div', 'item-row' + (swapped ? ' swapped' : ''));

      const main = el('div', 'item-main');
      const nameLine = el('div', 'item-name');
      if (item.supp) {
        const pill = el('span', 'supp-pill', 'Supplement');
        nameLine.appendChild(pill);
      }
      nameLine.appendChild(document.createTextNode(item.name));
      if (swapped) {
        const tag = el('span', 'swap-tag', 'swapped');
        nameLine.appendChild(tag);
      }
      main.appendChild(nameLine);

      if (item.p || item.f || item.c) {
        const macros = el('div', 'item-macros');
        macros.innerHTML =
          '<span class="p"><b>' + item.p + '</b>P</span>'
          + '<span class="f"><b>' + item.f + '</b>F</span>'
          + '<span class="c"><b>' + item.c + '</b>C</span>';
        main.appendChild(macros);
      }

      const actions = el('div', 'item-actions');
      if (item.altKey && !item.supp) {
        const btn = el('button', 'swap-btn' + (swapped ? ' restore' : ''));
        btn.textContent = swapped ? 'Reset' : 'Swap';
        btn.addEventListener('click', () => {
          if (swapped) {
            clearSwap(dayKey, mi, ii);
          } else {
            openSwapSheet(dayKey, mi, ii);
          }
        });
        actions.appendChild(btn);
      }

      row.appendChild(main);
      row.appendChild(actions);
      card.appendChild(row);
    });

    // post-meal activities
    activities.suffix.forEach(act => card.appendChild(buildActivityRow(act)));

    // Skip-today button for optional meals (only when viewing today's plan)
    if (meal.optional && isTodayView) {
      const skipRow = el('div', 'meal-skip-row');
      const btn = el('button', 'skip-btn' + (skipped ? ' undo' : ''));
      btn.textContent = skipped ? '↺ Unskip' : 'Skip today';
      btn.addEventListener('click', () => {
        toggleMealSkip(dateIso, mi);
        renderMeals();
      });
      skipRow.appendChild(btn);
      card.appendChild(skipRow);
    }

    // meal macro footer
    const mm = mealMacros(dayKey, mi);
    if (mm.p || mm.f || mm.c) {
      const footer = el('div', 'meal-macros');
      footer.innerHTML =
        '<span class="lead"><b>' + mm.cal + '</b> kcal</span>'
        + '<span>P&nbsp;<b>' + mm.p + '</b>g</span>'
        + '<span>F&nbsp;<b>' + mm.f + '</b>g</span>'
        + '<span>C&nbsp;<b>' + mm.c + '</b>g</span>';
      card.appendChild(footer);
    }

    return card;
  }

  function clearSwap(dayKey, mi, ii) {
    delete state.swaps[swapKey(dayKey, mi, ii)];
    save(STORAGE.swaps, state.swaps);
    renderMeals();
  }

  /* ============================================================
   *  SWAP BOTTOM SHEET
   * ============================================================ */

  const sheet = document.getElementById('bottom-sheet');
  const sheetBackdrop = document.getElementById('sheet-backdrop');
  const sheetTitle = document.getElementById('sheet-title');
  const sheetSub = document.getElementById('sheet-sub');
  const sheetBody = document.getElementById('sheet-body');
  const sheetCancel = document.getElementById('sheet-cancel');

  function openSwapSheet(dayKey, mi, ii) {
    const original = MEAL_PLAN[dayKey][mi].items[ii];
    const alts = ITEM_ALTS[original.altKey] || [];
    const { item: current } = getItem(dayKey, mi, ii);

    sheetTitle.textContent = 'Swap: ' + original.name.split(' + ')[0].split(' (')[0];
    sheetSub.textContent = MEAL_PLAN[dayKey][mi].title + ' · ' + MEAL_PLAN[dayKey][mi].time;

    sheetBody.innerHTML = '';
    alts.forEach(alt => {
      const row = el('button', 'alt-row');
      if (alt.name === current.name) row.classList.add('current');
      row.innerHTML =
        '<span class="alt-name">' + alt.name + '</span>'
        + '<span class="alt-macros">'
        +   '<span style="color:var(--protein)">' + alt.p + 'P</span> · '
        +   '<span style="color:var(--fat)">' + alt.f + 'F</span> · '
        +   '<span style="color:var(--carbs)">' + alt.c + 'C</span>'
        + '</span>';
      row.addEventListener('click', () => {
        applySwap(dayKey, mi, ii, alt);
        closeSheet();
      });
      sheetBody.appendChild(row);
    });

    openSheet();
  }

  /* ---------- Shift bottom sheet ---------- */
  function openShiftSheet(item) {
    if (item.anchor) return; // defensive: shift button isn't rendered on anchors

    sheetTitle.textContent = 'Shift: ' + item.title;
    sheetSub.textContent = 'Planned ' + formatTime12(item.plannedTime)
      + ((item.shifted || item.cascaded)
          ? ' · currently ' + formatTime12(item.time)
          : '');

    sheetBody.innerHTML = '';

    const wrap = el('div', 'shift-sheet');

    // Time input
    const inputRow = el('div', 'shift-input-row');
    const label = el('label', 'shift-label');
    label.textContent = 'When did you / will you do this?';
    label.htmlFor = 'shift-time-input';
    const input = el('input', 'shift-input');
    input.id = 'shift-time-input';
    input.type = 'time';
    input.step = '300'; // 5-minute increments
    input.value = item.time;
    inputRow.appendChild(label);
    inputRow.appendChild(input);
    wrap.appendChild(inputRow);

    // Helper chips for quick +/- shifts
    const chipRow = el('div', 'shift-chips');
    [-30, -15, '+15', '+30', '+60'].forEach(d => {
      const n = typeof d === 'number' ? d : parseInt(d, 10);
      const chip = el('button', 'shift-chip', (n > 0 ? '+' : '') + n + ' min');
      chip.type = 'button';
      chip.addEventListener('click', () => {
        const next = addMinutesHHMM(input.value, n);
        input.value = next;
        simulate(input.value);
      });
      chipRow.appendChild(chip);
    });
    wrap.appendChild(chipRow);

    // Live preview of downstream cascade + warnings
    const preview = el('div', 'shift-preview');
    wrap.appendChild(preview);

    // Actions
    const actions = el('div', 'shift-actions');
    const applyBtn = el('button', 'btn-primary shift-apply', 'Apply shift');
    applyBtn.type = 'button';
    actions.appendChild(applyBtn);

    const isExplicit = !!todayShiftMap()[item.id];
    if (isExplicit) {
      const resetBtn = el('button', 'btn-secondary shift-reset', 'Reset to planned');
      resetBtn.type = 'button';
      resetBtn.addEventListener('click', () => {
        const map = { ...todayShiftMap() };
        delete map[item.id];
        writeTodayShifts(map);
        closeSheet();
        renderToday();
      });
      actions.appendChild(resetBtn);
    }
    wrap.appendChild(actions);

    sheetBody.appendChild(wrap);

    function simulate(newTime) {
      if (!/^\d{2}:\d{2}$/.test(newTime || '')) {
        preview.innerHTML = '<div class="shift-hint">Pick a time to preview the ripple.</div>';
        return;
      }
      const hypo = { ...todayShiftMap() };
      if (newTime === item.plannedTime) delete hypo[item.id];
      else hypo[item.id] = newTime;
      const base = buildPlannedTimeline(todayDayKey());
      const shifted = applyShiftsToTimeline(base, hypo);
      const warnings = computeShiftWarnings(shifted);
      const delta = minuteOfDay(newTime) - minuteOfDay(item.plannedTime);
      const affected = shifted.filter(i =>
        i.id !== item.id
        && !i.anchor
        && minuteOfDay(i.plannedTime) > minuteOfDay(item.plannedTime)
        && !hypo[i.id]
        && i.time !== i.plannedTime
      ).length;

      let html = '';
      if (delta === 0) {
        html += '<div class="shift-hint">No change — same as planned.</div>';
      } else {
        html += '<div class="shift-delta">Δ '
          + (delta > 0 ? '+' : '') + delta + ' min'
          + (affected > 0
              ? ' · <b>' + affected + '</b> downstream event' + (affected > 1 ? 's' : '') + ' will cascade'
              : ' · no downstream cascade')
          + '</div>';
      }
      if (warnings.length) {
        html += warnings.map(w => '<div class="shift-warn">⚠ ' + w + '</div>').join('');
      } else if (delta !== 0) {
        html += '<div class="shift-ok">✓ Guardrails still met.</div>';
      }
      preview.innerHTML = html;
    }

    input.addEventListener('input', () => simulate(input.value));
    simulate(input.value);

    applyBtn.addEventListener('click', () => {
      const t = input.value;
      if (!/^\d{2}:\d{2}$/.test(t)) { input.focus(); return; }
      const map = { ...todayShiftMap() };
      if (t === item.plannedTime) delete map[item.id];
      else map[item.id] = t;
      writeTodayShifts(map);
      closeSheet();
      renderToday();
    });

    openSheet();
  }

  function applySwap(dayKey, mi, ii, alt) {
    const key = swapKey(dayKey, mi, ii);
    const original = MEAL_PLAN[dayKey][mi].items[ii];
    if (alt.name === original.name && alt.p === original.p && alt.f === original.f && alt.c === original.c) {
      delete state.swaps[key];
    } else {
      state.swaps[key] = { name: alt.name, p: alt.p, f: alt.f, c: alt.c };
    }
    save(STORAGE.swaps, state.swaps);
    renderMeals();
  }

  function openSheet() {
    sheet.classList.add('open');
    sheetBackdrop.classList.add('open');
    sheet.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';

  function closeSheet() {
    sheet.classList.remove('open');
    sheetBackdrop.classList.remove('open');
    sheet.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    // tear down any video iframe to stop audio
    setTimeout(() => {
      const iframe = sheetBody.querySelector('iframe');
      if (iframe) iframe.src = '';
    }, 200);

  function openVideoSheet(ex, block) {
    sheetTitle.textContent = ex.name;
    sheetSub.textContent = (block && block.title ? block.title : '') + ' · ' + (ex.sets || '');

    const searchQuery = encodeURIComponent(ex.search || (ex.name + ' form'));
    const ytLink = 'https://www.youtube.com/results?search_query=' + searchQuery;
    const videoIds = Array.isArray(ex.videoIds) ? ex.videoIds.slice()
      : (ex.videoId ? [ex.videoId] : []);

    sheetBody.innerHTML = '';

    // Video container — state is captured in closure variables.
    const vw = el('div', 'video-wrap');
    let activeIdx = 0;
    let loaded = false;

    function renderVideo() {
      vw.innerHTML = '';
      const vid = videoIds[activeIdx];
      if (!vid) {
        const empty = el('div', 'video-thumb');
        empty.style.background = 'var(--grad-primary)';
        empty.innerHTML = '<span class="video-play"></span>';
        vw.appendChild(empty);
        return;
      }
      if (loaded) {
        const iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube-nocookie.com/embed/' + vid
          + '?rel=0&modestbranding=1&autoplay=1&playsinline=1';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        vw.appendChild(iframe);
      } else {
        const thumbEl = el('button', 'video-thumb');
        thumbEl.style.backgroundImage =
          "url('https://i.ytimg.com/vi/" + vid + "/hqdefault.jpg')";
        thumbEl.innerHTML = '<span class="video-play"></span>';
        thumbEl.addEventListener('click', () => {
          loaded = true;
          renderVideo();
        });
        vw.appendChild(thumbEl);
      }
    }
    renderVideo();
    sheetBody.appendChild(vw);

    // Thumbnail strip — only shown when there are multiple videos.
    // Horizontal-scrollable portrait thumbs; tap one to swap the main player.
    if (videoIds.length > 1) {
      const label = el('div', 'video-strip-label');
      label.innerHTML =
        '<span class="lbl">Form demos</span>'
        + '<span class="count">' + videoIds.length + ' variants</span>';
      sheetBody.appendChild(label);

      const wrap = el('div', 'video-strip-wrap');
      const strip = el('div', 'video-strip');
      videoIds.forEach((vid, i) => {
        const thumb = el('button', 'video-thumb-mini' + (i === activeIdx ? ' active' : ''));
        thumb.style.backgroundImage =
          "url('https://i.ytimg.com/vi/" + vid + "/hqdefault.jpg')";
        thumb.setAttribute('aria-label', 'Demo ' + (i + 1));
        thumb.innerHTML =
          '<span class="mini-num">' + (i + 1) + '</span>'
          + '<span class="mini-play"></span>';
        thumb.addEventListener('click', () => {
          if (i === activeIdx) return;
          activeIdx = i;
          strip.querySelectorAll('.video-thumb-mini').forEach((t, ti) => {
            t.classList.toggle('active', ti === activeIdx);
          });
          // If a video is already loaded, swap to the new one; else keep
          // the tap-to-play thumb showing the newly-selected variant.
          renderVideo();
          // Scroll the tapped thumb fully into view on the strip.
          thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        });
        strip.appendChild(thumb);
      });
      wrap.appendChild(strip);
      sheetBody.appendChild(wrap);
    }

    // meta chips
    const meta = el('div', 'video-meta');
    if (ex.sets) meta.appendChild(el('span', 'video-chip strong', ex.sets));
    if (ex.rest && ex.rest !== '—') meta.appendChild(el('span', 'video-chip', 'rest ' + ex.rest));
    sheetBody.appendChild(meta);

    // cues
    if (ex.cues && ex.cues.length) {
      const label = el('div', 'section-label');
      label.textContent = 'Form cues';
      label.style.margin = '14px 2px 4px';
      sheetBody.appendChild(label);
      const ul = el('ul', 'cues-list');
      ex.cues.forEach(c => ul.appendChild(el('li', null, c)));
      sheetBody.appendChild(ul);
    }

    // description fallback
    if (!ex.cues && ex.desc) {
      const p = el('p');
      p.style.marginTop = '12px';
      p.style.color = 'var(--text-2)';
      p.textContent = ex.desc;
      sheetBody.appendChild(p);
    }

    // YouTube search link (fallback + for alternative demos)
    const link = document.createElement('a');
    link.className = 'yt-link';
    link.href = ytLink;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = 'Search more demos on YouTube';
    sheetBody.appendChild(link);

    openSheet();
  }

  /* ============================================================

  /* Post-lunch energy tracking (1-10). Target 7+ means the meal
     isn't blowing up afternoon focus. */
  function plBand(v) {
    if (v >= 8) return 'high';
    if (v >= 5) return 'mid';
    return 'low';
  }

  /* Bloating band — inverted vs plenergy since low bloat is the goal.
     1-3 = green (target), 4-6 = amber, 7-10 = red. */
  function bloatBand(v) {
    if (v <= 3) return 'high';  // green in the shared CSS
    if (v <= 6) return 'mid';   // amber
    return 'low';                // red
  }
  function bloatLast14Days() {
    const pts = [];
    const now = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      const iso = d.getFullYear() + '-' + padT(d.getMonth()+1) + '-' + padT(d.getDate());
      pts.push({ iso, val: state.bloat[iso] || null });
    }
    return pts;
  }
  function bloatRecentAvg(days) {
    const pts = bloatLast14Days().slice(-days).filter(p => p.val != null);
    if (pts.length < 3) return null;
    const sum = pts.reduce((s, p) => s + p.val, 0);
    return sum / pts.length;
  }
  function plEnergyLast14Days() {
    const pts = [];
    const now = new Date();
    for (let i = 13; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(now.getDate() - i);
      const iso = d.getFullYear() + '-' + padT(d.getMonth()+1) + '-' + padT(d.getDate());
      pts.push({ iso, val: state.plEnergy[iso] || null });
    }
    return pts;
  }
  function plEnergyRecentAvg(days) {
    const pts = plEnergyLast14Days().slice(-days).filter(p => p.val != null);
    if (pts.length === 0) return null;
    return pts.reduce((a, p) => a + p.val, 0) / pts.length;
  }
  function buildPlEnergySpark(points) {
    const W = 320, H = 64, PAD_X = 6, PAD_Y = 8;
    const n = points.length;
    const stepX = (W - 2 * PAD_X) / (n - 1);
    const yFor = v => H - PAD_Y - ((v - 1) / 9) * (H - 2 * PAD_Y);

    let path = '';
    let dots = '';
    let inSeg = false;
    points.forEach((p, idx) => {
      if (p.val == null) { inSeg = false; return; }
      const x = PAD_X + idx * stepX;
      const y = yFor(p.val);
      path += (inSeg ? ' L' : ' M') + x.toFixed(1) + ' ' + y.toFixed(1);
      inSeg = true;
      const isLast = idx === n - 1 && p.val != null;
      const r = isLast ? 4 : 2.5;
      const fill = isLast ? 'var(--accent)' : 'var(--primary-3)';
      dots += '<circle cx="' + x.toFixed(1) + '" cy="' + y.toFixed(1) + '" r="' + r + '" fill="' + fill + '"/>';
    });

    // Reference band lines at 5 and 7 (targets)
    const y5 = yFor(5);
    const y7 = yFor(7);
    const bg =
      '<rect x="' + PAD_X + '" y="' + y7.toFixed(1) + '" width="' + (W - 2 * PAD_X) + '" height="' + (H - PAD_Y - y7).toFixed(1) + '" fill="rgba(58,181,105,0.08)"/>'
      + '<line x1="' + PAD_X + '" y1="' + y5.toFixed(1) + '" x2="' + (W - PAD_X) + '" y2="' + y5.toFixed(1) + '" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"/>';

    return '<svg class="plenergy-spark" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">'
      + bg
      + '<path d="' + path.trim() + '" stroke="var(--primary-3)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
      + dots
      + '</svg>';
  }

  function buildGoalRow(icon, label, got, want, color) {
    const pips = [];
    for (let i = 0; i < want; i++) {
      pips.push('<span class="goal-pip' + (i < got ? ' on' : '') + '" style="--c:' + color + '"></span>');
    }
    const hit = got >= want;
    return (
      '<div class="goal-row">'
      +   '<div class="goal-head">'
      +     '<span class="goal-icon">' + icon + '</span>'
      +     '<span class="goal-label">' + label + '</span>'
      +     '<span class="goal-count' + (hit ? ' hit' : '') + '">' + got + ' / ' + want + (hit ? ' ✓' : '') + '</span>'
      +   '</div>'
      +   '<div class="goal-pips">' + pips.join('') + '</div>'
      + '</div>'
    );
  }

        if (state.workouts[k]) delete state.workouts[k];

        save(STORAGE.workouts, state.workouts);
        openWorkoutDaySheet(dayKey);
        if (state.currentView === 'tracker') renderTracker();
      });
      list.appendChild(row);
    });
    sheetBody.appendChild(list);

    openSheet();
  }

  /* ============================================================
   *  TIPS TAB
   * ============================================================ */

  function renderTips() {
    const root = document.getElementById('view-tips');
    root.innerHTML = '';
    TIPS.forEach(t => {
      const box = el('div', 'tip-box ' + t.type);
      const header = el('h3');
      header.innerHTML =

        list.appendChild(li);
      });
      box.appendChild(list);
      root.appendChild(box);
    });

  /* ============================================================
   *  SHOPPING TAB
   * ============================================================ */

  function renderShopping() {
    const root = document.getElementById('view-shopping');
    root.innerHTML = '';

    // === Stock for next 2 days (today + tomorrow) ===
    const stock = buildStockFor2Days();
    const todayDay = DAYS.find(d => d.key === stock.todayKey);
    const tomDay = DAYS.find(d => d.key === stock.tomKey);

    const stockCard = el('div', 'card stock-card');
    stockCard.innerHTML =
      '<div class="stock-head">'
      +   '<div class="stock-head-top">'
      +     '<h2>Stock for next 2 days</h2>'
      +     '<span class="stock-days-chip">'
      +       '<span class="chip-today">' + todayDay.short + '</span>'
      +       '<span class="sep">→</span>'
      +       '<span class="chip-tom">' + tomDay.short + '</span>'
      +     '</span>'
      +   '</div>'
      +   '<p class="muted small" style="margin:0">'
      +     'Each row shows the total across both days, with a per-day split underneath.'
      +   '</p>'
      + '</div>';

    stock.grouped.forEach(g => {
      const sec = el('div', 'stock-section');
      sec.innerHTML = '<h3 class="stock-cat">' + g.label + '</h3>';
      const list = el('div', 'stock-list');
      g.items.forEach(i => {
        const row = el('div', 'stock-row');
        let bd;
        if (i.today > 0 && i.tomorrow > 0) {
          bd =
            '<span class="bd-today">Today</span> ' + formatStockQty(i.today, i.unit)
            + ' <span class="bd-sep">·</span> '
            + '<span class="bd-tom">Tomorrow</span> ' + formatStockQty(i.tomorrow, i.unit);
        } else if (i.today > 0) {
          bd = '<span class="bd-today">Today only</span>';
        } else {
          bd = '<span class="bd-tom">Tomorrow only</span>';
        }
        row.innerHTML =
          '<div class="stock-main">'
          +   '<span class="stock-name">' + i.name + '</span>'
          +   '<span class="stock-breakdown">' + bd + '</span>'
          + '</div>'
          + '<span class="stock-qty">' + formatStockQty(i.total, i.unit) + '</span>';
        list.appendChild(row);
      });
      sec.appendChild(list);
      stockCard.appendChild(sec);
    });

    root.appendChild(stockCard);

    // === Weekly stock (computed from the active meal plan × 7 days) ===
    const weekGroups = buildStockForWeek();
    // Flatten for counting + category checks
    const flatKeys = [];
    weekGroups.forEach(g => g.items.forEach(i => flatKeys.push(keyShopWeek(i))));
    const total = flatKeys.length;
    let done = 0;
    flatKeys.forEach(k => { if (state.shopping[k]) done++; });

    const pct = total > 0 ? Math.round(100 * done / total) : 0;
    const status = el('div', 'card shop-status');
    status.innerHTML =
      '<div class="row-flex-between">'
      +   '<div>'
      +     '<h2 style="margin-bottom:4px">Weekly stock</h2>'
      +     '<div class="muted small">'
      +       '<b style="color:var(--text)">' + done + '</b> of ' + total + ' checked · '
      +       'computed from your <b style="color:var(--text)">7-day plan</b>'
      +     '</div>'
      +   '</div>'
      +   '<div class="shop-status-ring" style="--pct:' + pct + '%"><span>' + pct + '%</span></div>'
      + '</div>';
    root.appendChild(status);

    const toolbar = el('div', 'shop-toolbar');
    const resetBtn = el('button', 'shop-btn', 'Reset list');
    resetBtn.addEventListener('click', () => {
      if (!confirm('Clear all checks?')) return;
      state.shopping = {};
      save(STORAGE.shopping, state.shopping);
      renderShopping();
    });
    const allBtn = el('button', 'shop-btn primary', 'Check all');
    allBtn.addEventListener('click', () => {
      flatKeys.forEach(k => { state.shopping[k] = true; });
      save(STORAGE.shopping, state.shopping);
      renderShopping();
    });
    toolbar.appendChild(resetBtn);
    toolbar.appendChild(allBtn);
    root.appendChild(toolbar);

    weekGroups.forEach(g => {
      const card = el('div', 'card shop-section');
      let secDone = 0;
      g.items.forEach(i => { if (state.shopping[keyShopWeek(i)]) secDone++; });
      const h = el('h3');
      h.innerHTML =
        '<span>' + g.label + '</span>'
        + '<span class="count">' + secDone + '/' + g.items.length + '</span>';
      card.appendChild(h);
      g.items.forEach(i => {
        const k = keyShopWeek(i);
        const isChecked = !!state.shopping[k];
        const row = el('button', 'shop-item' + (isChecked ? ' checked' : ''));
        row.innerHTML =
          '<span class="shop-check' + (isChecked ? ' checked' : '') + '"></span>'
          + '<span class="shop-name">' + i.name + '</span>'
          + '<span class="shop-qty">' + formatStockQty(i.qty, i.unit) + '</span>';
        row.addEventListener('click', () => {
          if (state.shopping[k]) delete state.shopping[k];
          else state.shopping[k] = true;
          save(STORAGE.shopping, state.shopping);
          renderShopping();
        });
        card.appendChild(row);
      });
      root.appendChild(card);
    });
  }

  // Check-off key for weekly shopping — stable across weeks.
  function keyShopWeek(item) {
    return item.name + '|' + item.unit;
  }

  /* ============================================================
   *  TRACKER TAB
   * ============================================================ */

  function renderTracker() {
    const root = document.getElementById('view-tracker');
    root.innerHTML = '';

    // === Phase banner (Week N of 12) ===
    const info = planWeekInfo();
    const phaseCard = el('div', 'phase-banner');
    if (info) {
      const capWeek = Math.min(info.weekNum, 12);
      const pct = Math.min(100, Math.round((info.daysSince / 84) * 100));
      phaseCard.innerHTML =
        '<div class="phase-top">'
        +   '<span class="phase-week">Week ' + capWeek + ' / 12</span>'
        +   '<span class="phase-name">' + info.phase + '</span>'
        + '</div>'
        + '<div class="phase-bar"><div class="phase-fill" style="width:' + pct + '%"></div></div>'
        + '<div class="phase-sub">Day ' + info.daysSince + ' · started ' + fmtDate(state.planStart) + ' · <button class="phase-reset-btn" type="button">reset</button></div>';
      phaseCard.querySelector('.phase-reset-btn').addEventListener('click', () => {
        if (!confirm('Reset plan start date? Progress bar resets to zero.')) return;
        state.planStart = null;
        save(STORAGE.planStart, null);
        renderTracker();
      });
    } else {
      phaseCard.innerHTML =
        '<h2 style="margin:0 0 4px 0; color:#fff">Plan not started</h2>'
        + '<p class="phase-sub" style="margin:0 0 10px 0">Mark today as your v4 Day 1. This drives the 12-week phase tracker: gut adaptation → reintroduction → build → fat loss.</p>';
      const startBtn = el('button', 'btn-primary', 'Start plan today');
      startBtn.style.width = '100%';
      startBtn.addEventListener('click', () => {
        state.planStart = todayISO();
        save(STORAGE.planStart, state.planStart);
        renderTracker();
      });
      phaseCard.appendChild(startBtn);
    }
    root.appendChild(phaseCard);

    // Summary stats row
    const grid = el('div', 'tracker-grid-2');
    const latestW = state.weight[state.weight.length - 1];
    const prevW = state.weight[state.weight.length - 2];
    const wCard = el('div', 'stat-card weight');
    let wSubClass = '', wSubText = '';
    if (latestW && prevW) {
      if (latestW.kg < prevW.kg) {
        wSubClass = 'down';
        wSubText = '▼ ' + (prevW.kg - latestW.kg).toFixed(1) + ' kg from last';
      } else if (latestW.kg > prevW.kg) {
        wSubClass = 'up';
        wSubText = '▲ ' + (latestW.kg - prevW.kg).toFixed(1) + ' kg from last';
      } else wSubText = 'no change';
    } else if (latestW) wSubText = 'first entry';
    else wSubText = 'no entries yet';
    wCard.innerHTML =
      '<div class="stat-label">Weight</div>'
      + '<div class="stat-value">'
      +   (latestW ? latestW.kg.toFixed(1) : '—')
      +   '<span class="unit">kg</span></div>'
      + '<div class="stat-sub ' + wSubClass + '">' + wSubText + '</div>';
    grid.appendChild(wCard);

    const latestR = state.rhr[state.rhr.length - 1];
    const rhrCard = el('div', 'stat-card rhr');
    const rhrStatus = latestR
      ? (latestR.bpm > 85 ? '⚠ concerning' : (latestR.bpm > 75 ? '⚠ elevated' : '✓ normal'))
      : 'no entries yet';
    rhrCard.innerHTML =
      '<div class="stat-label">Resting HR</div>'
      + '<div class="stat-value">'
      +   (latestR ? latestR.bpm : '—')
      +   '<span class="unit">bpm</span></div>'
      + '<div class="stat-sub">' + rhrStatus + '</div>';
    grid.appendChild(rhrCard);
    root.appendChild(grid);

    // === Supplements today ===
    const suppsCard = el('div', 'card');
    suppsCard.innerHTML = '<h2>Today\'s supplements</h2>';
    const date = todayISO();
    const isSunday = todayDayKey() === 'sun';

    const suppList = [
      { key: 'chia',     name: 'Chia water',   sub: '6:30 AM · 1 tbsp soaked' },
      { key: 'nurokind', name: 'Nurokind-OD',  sub: '8:00 AM · 1500 mcg sublingual' },
    ];
    if (isSunday) {
      suppList.push({ key: 'uprise', name: 'Uprise-D3',   sub: 'Sunday lunch · 60,000 IU with paneer sabzi' });
    }

    suppList.forEach(s => {
      const k = date + '-' + s.key;
      const on = !!state.supps[k];
      const row = el('button', 'toggle-row');
      row.innerHTML =
        '<div class="toggle-info">'
        +   '<div class="toggle-name">' + s.name + '</div>'
        +   '<div class="toggle-sub">' + s.sub + '</div>'
        + '</div>'
        + '<div class="toggle-switch' + (on ? ' on' : '') + '"></div>';
      row.addEventListener('click', () => {
        if (state.supps[k]) delete state.supps[k];
        else state.supps[k] = true;
        save(STORAGE.supps, state.supps);
        renderTracker();
      });
      suppsCard.appendChild(row);
    });

    // Digestive enzyme — only shows during the Weeks 1-2 gut adaptation window.
    // Keyed per-day with lunch + dinner sub-entries in state.enzyme.
    if (info && info.weekNum <= 2) {
      const enToday = state.enzyme[date] || {};
      [
        { key: 'lunch',  name: 'Digestive enzyme · lunch',  sub: 'Unienzyme / Aristozyme · 1 tab with lunch' },
        { key: 'dinner', name: 'Digestive enzyme · dinner', sub: 'Unienzyme / Aristozyme · 1 tab with dinner' },
      ].forEach(s => {
        const on = !!enToday[s.key];
        const row = el('button', 'toggle-row');
        row.innerHTML =
          '<div class="toggle-info">'
          +   '<div class="toggle-name">' + s.name + '</div>'
          +   '<div class="toggle-sub">' + s.sub + '</div>'
          + '</div>'
          + '<div class="toggle-switch' + (on ? ' on' : '') + '"></div>';
        row.addEventListener('click', () => {
          const rec = state.enzyme[date] ? { ...state.enzyme[date] } : {};
          if (rec[s.key]) delete rec[s.key];
          else rec[s.key] = true;
          if (Object.keys(rec).length === 0) delete state.enzyme[date];
          else state.enzyme[date] = rec;
          save(STORAGE.enzyme, state.enzyme);
          renderTracker();
        });
        suppsCard.appendChild(row);
      });
    }
    root.appendChild(suppsCard);

    // === Weekly goal ===
    const totals = weeklyWorkoutTotals();
    const goalCard = el('div', 'card');
    goalCard.innerHTML =
      '<h2>Weekly goal</h2>'
      + '<p class="muted small" style="margin-bottom:12px">Target from your plan: 3 strength + 3 cardio sessions.</p>'
      + buildGoalRow('💪', 'Strength', totals.got.strength, totals.want.strength, 'var(--protein)')
      + buildGoalRow('🚶', 'Cardio',   totals.got.cardio,   totals.want.cardio,   'var(--carbs)');
    root.appendChild(goalCard);

    // === Workouts this week (interactive) ===
    const wkCard = el('div', 'card');
    wkCard.innerHTML =
      '<h2>Workouts this week</h2>'
      + '<p class="muted small" style="margin-bottom:10px">Tap any day to check off exercises.</p>';
    const wSum = el('div', 'workout-sum');
    const today = todayDayKey();
    DAYS.forEach(d => {
      const count = workoutCountForDay(d.key);
      let state3 = 'none';
      if (count.total === 0) state3 = 'rest';
      else if (count.done === 0) state3 = 'none';
      else if (count.done >= count.total) state3 = 'full';
      else state3 = 'partial';

      const block = plannedBlockForDay(d.key);
      const cell = el('button',
        'wk-cell ' + state3 + (d.key === today ? ' today' : ''));
      cell.setAttribute('aria-label', d.name + (block ? ' — ' + block.short : ' — rest day'));
      const countLabel = count.total > 0
        ? '<span class="wk-count">' + count.done + '/' + count.total + '</span>'
        : '<span class="wk-count muted">rest</span>';
      cell.innerHTML =
        '<span class="d">' + d.short + '</span>'
        + '<span class="dot"></span>'
        + countLabel;
      cell.addEventListener('click', () => openWorkoutDaySheet(d.key));
      wSum.appendChild(cell);
    });
    wkCard.appendChild(wSum);
    root.appendChild(wkCard);

    // === Weight log ===
    const wLog = el('div', 'card');
    wLog.innerHTML = '<h2>Weight log</h2><p class="muted small" style="margin-bottom:8px">Log Sunday 7 AM, after toilet, before eating.</p>';
    const wRow = el('div', 'inline-input-row');
    const wInput = el('input', 'inline-input');
    wInput.type = 'number';
    wInput.inputMode = 'decimal';
    wInput.step = '0.1';
    wInput.placeholder = 'kg (e.g. 102.4)';
    const wBtn = el('button', 'btn-primary', 'Add');
    wBtn.addEventListener('click', () => {
      const v = parseFloat(wInput.value);
      if (!v || v < 30 || v > 250) { wInput.focus(); return; }
      state.weight.push({ date: todayISO(), kg: v });
      state.weight.sort((a, b) => a.date.localeCompare(b.date));
      save(STORAGE.weight, state.weight);
      wInput.value = '';
      renderTracker();
    });
    wRow.appendChild(wInput);
    wRow.appendChild(wBtn);
    wLog.appendChild(wRow);

    if (state.weight.length === 0) {
      const empty = el('div', 'no-data', 'No weight entries yet.');
      wLog.appendChild(empty);
    } else {
      const list = el('div', 'log-list');
      const sorted = [...state.weight].sort((a,b) => b.date.localeCompare(a.date));
      sorted.forEach((entry, idx) => {
        const row = el('div', 'log-row');
        const origIdx = state.weight.findIndex(e => e.date === entry.date && e.kg === entry.kg);
        row.innerHTML =
          '<span class="log-date">' + fmtDate(entry.date) + '</span>'
          + '<span><span class="log-val">' + entry.kg.toFixed(1) + ' kg</span>'
          + '<button class="log-del" data-i="' + origIdx + '" aria-label="Delete">×</button></span>';
        list.appendChild(row);
      });
      list.addEventListener('click', (e) => {
        const btn = e.target.closest('.log-del');
        if (!btn) return;
        const i = parseInt(btn.dataset.i, 10);
        if (!confirm('Delete this entry?')) return;
        state.weight.splice(i, 1);
        save(STORAGE.weight, state.weight);
        renderTracker();
      });
      wLog.appendChild(list);
    }
    root.appendChild(wLog);

    // === RHR log ===
    const rLog = el('div', 'card');
    rLog.innerHTML = '<h2>Resting heart rate</h2><p class="muted small" style="margin-bottom:8px">Log daily. Flag if consistently >85 BPM.</p>';
    const rRow = el('div', 'inline-input-row');
    const rInput = el('input', 'inline-input');
    rInput.type = 'number';
    rInput.inputMode = 'numeric';
    rInput.step = '1';
    rInput.placeholder = 'BPM (e.g. 68)';
    const rBtn = el('button', 'btn-primary', 'Add');
    rBtn.addEventListener('click', () => {
      const v = parseInt(rInput.value, 10);
      if (!v || v < 30 || v > 200) { rInput.focus(); return; }
      state.rhr.push({ date: todayISO(), bpm: v });
      state.rhr.sort((a, b) => a.date.localeCompare(b.date));
      save(STORAGE.rhr, state.rhr);
      rInput.value = '';
      renderTracker();
    });
    rRow.appendChild(rInput);
    rRow.appendChild(rBtn);
    rLog.appendChild(rRow);

    if (state.rhr.length === 0) {
      const empty = el('div', 'no-data', 'No RHR entries yet.');
      rLog.appendChild(empty);
    } else {
      const list = el('div', 'log-list');
      const sorted = [...state.rhr].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 14);
      sorted.forEach((entry) => {
        const row = el('div', 'log-row');
        const badge = entry.bpm > 85 ? '⚠' : (entry.bpm > 75 ? '•' : '✓');
        row.innerHTML =
          '<span class="log-date">' + fmtDate(entry.date) + '</span>'
          + '<span class="log-val">' + badge + ' ' + entry.bpm + ' bpm</span>';
        list.appendChild(row);
      });
      rLog.appendChild(list);
    }
    root.appendChild(rLog);

    // === Post-lunch energy log ===
    const plCard = el('div', 'card');
    const plToday = todayISO();
    const plTodayVal = state.plEnergy[plToday] || null;
    const plVals14 = plEnergyLast14Days();
    const plAvg = plEnergyRecentAvg(7);

    plCard.innerHTML =
      '<div class="row-flex-between" style="margin-bottom:4px">'
      +   '<div>'
      +     '<h2 style="margin-bottom:2px">Post-lunch energy</h2>'
      +     '<p class="muted small" style="margin:0">How alert ~2 PM? Target 7+ — sleepiness means lunch was too heavy.</p>'
      +   '</div>'
      +   '<div class="plenergy-current' + (plTodayVal ? ' has' : '') + '">'
      +     '<span class="plenergy-num">' + (plTodayVal != null ? plTodayVal : '—') + '</span>'
      +     '<span class="plenergy-unit">/10 today</span>'
      +   '</div>'
      + '</div>';

    const scale = el('div', 'plenergy-scale');
    for (let i = 1; i <= 10; i++) {
      const b = el('button', 'plenergy-btn' + (plTodayVal === i ? ' active' : '') + ' band-' + plBand(i));
      b.textContent = String(i);
      b.addEventListener('click', () => {
        if (state.plEnergy[plToday] === i) delete state.plEnergy[plToday];
        else state.plEnergy[plToday] = i;
        save(STORAGE.plEnergy, state.plEnergy);
        renderTracker();
      });
      scale.appendChild(b);
    }
    plCard.appendChild(scale);

    if (plVals14.some(p => p.val != null)) {
      const sparkWrap = el('div');
      sparkWrap.innerHTML = buildPlEnergySpark(plVals14);
      plCard.appendChild(sparkWrap);
      const caption = el('div', 'plenergy-caption');
      caption.innerHTML = '14-day trend · '
        + (plAvg != null ? '7-day avg: <b>' + plAvg.toFixed(1) + '</b>' : 'not enough data yet');
      plCard.appendChild(caption);
    } else {
      plCard.appendChild(el('div', 'no-data', 'Log today\'s value to start tracking.'));
    }

    root.appendChild(plCard);

    // === Bloating log (daily 1-10, inverse of plenergy — low = good) ===
    const blCard = el('div', 'card');
    const blToday = todayISO();
    const blTodayVal = state.bloat[blToday] || null;
    const bl14 = bloatLast14Days();
    const blAvg = bloatRecentAvg(7);

    blCard.innerHTML =
      '<div class="row-flex-between" style="margin-bottom:4px">'
      +   '<div>'
      +     '<h2 style="margin-bottom:2px">Bloating</h2>'
      +     '<p class="muted small" style="margin:0">Rate ~9 PM. Target &lt;3 by end of Week 2. If &gt;5 for 3 days, simplify lunch.</p>'
      +   '</div>'
      +   '<div class="plenergy-current' + (blTodayVal ? ' has' : '') + '">'
      +     '<span class="plenergy-num">' + (blTodayVal != null ? blTodayVal : '—') + '</span>'
      +     '<span class="plenergy-unit">/10 today</span>'
      +   '</div>'
      + '</div>';

    const blScale = el('div', 'plenergy-scale');
    for (let i = 1; i <= 10; i++) {
      const b = el('button', 'plenergy-btn' + (blTodayVal === i ? ' active' : '') + ' band-' + bloatBand(i));
      b.textContent = String(i);
      b.addEventListener('click', () => {
        if (state.bloat[blToday] === i) delete state.bloat[blToday];
        else state.bloat[blToday] = i;
        save(STORAGE.bloat, state.bloat);
        renderTracker();
      });
      blScale.appendChild(b);
    }
    blCard.appendChild(blScale);

    if (bl14.some(p => p.val != null)) {
      const cap = el('div', 'plenergy-caption');
      cap.innerHTML = '14-day tracking · '
        + (blAvg != null ? '7-day avg: <b>' + blAvg.toFixed(1) + '</b>' : 'need 3+ days');
      blCard.appendChild(cap);
    } else {
      blCard.appendChild(el('div', 'no-data', 'Log today\'s value to start tracking.'));
    }
    root.appendChild(blCard);

    // === Waist log (monthly measurement from the plan) ===
    const waistCard = el('div', 'card');
    const latestWaist = state.waist[state.waist.length - 1];
    const prevWaist = state.waist[state.waist.length - 2];
    let waistDelta = '';
    if (latestWaist && prevWaist) {
      const d = latestWaist.cm - prevWaist.cm;
      if (d < 0) waistDelta = '<span class="stat-sub down">▼ ' + Math.abs(d).toFixed(1) + ' cm from last</span>';
      else if (d > 0) waistDelta = '<span class="stat-sub up">▲ ' + d.toFixed(1) + ' cm from last</span>';
      else waistDelta = '<span class="stat-sub">no change</span>';
    } else if (latestWaist) {
      waistDelta = '<span class="stat-sub">first entry</span>';
    }
    waistCard.innerHTML =
      '<div class="row-flex-between" style="margin-bottom:8px">'
      +   '<div>'
      +     '<h2 style="margin-bottom:2px">Waist</h2>'
      +     '<p class="muted small" style="margin:0">Measure monthly. Use a tape measure at navel level.</p>'
      +   '</div>'
      +   '<div style="text-align:right">'
      +     '<div class="stat-value" style="font-size:22px">'
      +       (latestWaist ? latestWaist.cm.toFixed(1) : '—')
      +       '<span class="unit">cm</span></div>'
      +     waistDelta
      +   '</div>'
      + '</div>';
    const waistRow = el('div', 'inline-input-row');
    const waistInput = el('input', 'inline-input');
    waistInput.type = 'number';
    waistInput.inputMode = 'decimal';
    waistInput.step = '0.1';
    waistInput.placeholder = 'cm (e.g. 102.5)';
    const waistBtn = el('button', 'btn-primary', 'Add');
    waistBtn.addEventListener('click', () => {
      const v = parseFloat(waistInput.value);
      if (!v || v < 40 || v > 200) { waistInput.focus(); return; }
      state.waist.push({ date: todayISO(), cm: v });
      state.waist.sort((a, b) => a.date.localeCompare(b.date));
      save(STORAGE.waist, state.waist);
      waistInput.value = '';
      renderTracker();
    });
    waistRow.appendChild(waistInput);
    waistRow.appendChild(waistBtn);
    waistCard.appendChild(waistRow);

    if (state.waist.length === 0) {
      waistCard.appendChild(el('div', 'no-data', 'No waist entries yet.'));
    } else {
      const list = el('div', 'log-list');
      const sorted = [...state.waist].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach((entry) => {
        const origIdx = state.waist.findIndex(e => e.date === entry.date && e.cm === entry.cm);
        const row = el('div', 'log-row');
        row.innerHTML =
          '<span class="log-date">' + fmtDate(entry.date) + '</span>'
          + '<span><span class="log-val">' + entry.cm.toFixed(1) + ' cm</span>'
          + '<button class="log-del" data-i="' + origIdx + '" aria-label="Delete">×</button></span>';
        list.appendChild(row);
      });
      list.addEventListener('click', (e) => {
        const btn = e.target.closest('.log-del');
        if (!btn) return;
        if (!confirm('Delete this entry?')) return;
        state.waist.splice(parseInt(btn.dataset.i, 10), 1);
        save(STORAGE.waist, state.waist);
        renderTracker();
      });
      waistCard.appendChild(list);
    }
    root.appendChild(waistCard);


    // === Sunday review symptoms ===
    const sympCard = el('div', 'card');
    sympCard.innerHTML = '<h2>Sunday review — symptoms</h2><p class="muted small" style="margin-bottom:4px">Tap severity. Resets weekly.</p>';
    const wk = weekKey();
    SYMPTOMS_WATCH.forEach(s => {
      const row = el('div', 'symp-row');
      const name = el('div', 'symp-name', s.name);
      const opts = el('div', 'symp-opts');
      const curKey = wk + '-' + s.key;
      const cur = state.symptoms[curKey];
      [{ l: 0, t: 'None' }, { l: 1, t: 'Mild' }, { l: 2, t: 'Bad' }].forEach(o => {
        const btn = el('button', 'symp-opt' + (cur === o.l ? ' active' : ''), o.t);
        btn.dataset.level = o.l;
        btn.addEventListener('click', () => {
          if (cur === o.l) delete state.symptoms[curKey];
          else state.symptoms[curKey] = o.l;
          save(STORAGE.symptoms, state.symptoms);
          renderTracker();
        });
        opts.appendChild(btn);
      });
      row.appendChild(name);
      row.appendChild(opts);
      sympCard.appendChild(row);
    });
    root.appendChild(sympCard);

    // === 12-week milestones ===
    const msCard = el('div', 'card');
    msCard.innerHTML =
      '<h2 style="margin-bottom:2px">12-week milestones</h2>'
      + '<p class="muted small" style="margin-bottom:4px">Checkpoints to know the plan is working. Missing one = redesign, not push harder.</p>';
    const msList = el('ul', 'milestones-list');
    const milestones = [
      { wk: 'Week 2',  goal: '<b>Bloating &lt;3</b> most days. Post-lunch energy 7+. If not → lunch still too heavy, drop roti or dal.' },
      { wk: 'Week 4',  goal: 'All v4 foods reintroduced (chaas, sprouts, chana). Off the digestive enzyme. If bloating returns, roll back that food.' },
      { wk: 'Week 6',  goal: '<b>-3 kg</b> from start. Waist down ~2 cm. Strength lifts feel lighter at same weight.' },
      { wk: 'Week 8',  goal: '<b>RHR &lt;75</b> for a full week. Cardio comfortable at higher speed. Thyroid re-check with doctor.' },
      { wk: 'Week 10', goal: 'Lift progression: add 2.5 kg on main lifts. Sleep 7+ h. Morning energy stable.' },
      { wk: 'Week 12', goal: '<b>-6 kg</b> total. Waist -5 cm. Bloodwork: B12 &gt;500, LFT improving, TSH in range.' },
    ];
    milestones.forEach(m => {
      const li = document.createElement('li');
      li.innerHTML = '<span class="ms-week">' + m.wk + '</span><span class="ms-goal">' + m.goal + '</span>';
      msList.appendChild(li);
    });
    msCard.appendChild(msList);
    root.appendChild(msCard);

    // === Export / reset ===
    const dangerCard = el('div', 'card');
    dangerCard.innerHTML = '<h2>Data</h2>'
      + '<p class="muted small" style="margin-bottom:6px">All data is saved locally on this device only.</p>';
    const exportBtn = el('button', 'shop-btn primary', 'Export as JSON');
    exportBtn.style.width = '100%';
    exportBtn.style.marginBottom = '8px';
    exportBtn.addEventListener('click', exportData);
    dangerCard.appendChild(exportBtn);

    const resetAll = el('button', 'bigred-btn', 'Reset all saved data');
    resetAll.addEventListener('click', () => {
      if (!confirm('Erase ALL saved data (swaps, shopping, weights, RHR, supplements, workouts, bloat, enzyme, plan start)? This cannot be undone.')) return;
      Object.values(STORAGE).forEach(k => { try { localStorage.removeItem(k); } catch(_){} });
      state.swaps = {}; state.shopping = {}; state.weight = []; state.rhr = [];
      state.waist = []; state.supps = {}; state.workouts = {}; state.symptoms = {};
      state.skips = {}; state.plEnergy = {};
      state.bloat = {}; state.planStart = null; state.enzyme = {};
      state.shifts = {};
      renderTracker();
    });
    dangerCard.appendChild(resetAll);
    root.appendChild(dangerCard);
  }

  function dateKeyForDayOfWeek(dayKey) {
    // Return the ISO date of the most recent occurrence of dayKey that
    // falls within the current Sunday-started week.
    const target = DAYS.findIndex(d => d.key === dayKey);
    const now = new Date();
    const todayIdx = now.getDay();
    const diff = target - todayIdx;
    const d = new Date(now);
    d.setDate(now.getDate() + diff);
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  }

  function exportData() {
    const data = {
      exportedAt: new Date().toISOString(),
      planStart: state.planStart,
      swaps: state.swaps,
      shopping: state.shopping,
      weight: state.weight,
      rhr: state.rhr,
      waist: state.waist,
      supps: state.supps,
      workouts: state.workouts,
      symptoms: state.symptoms,
      skips: state.skips,
      plEnergy: state.plEnergy,
      bloat: state.bloat,
      enzyme: state.enzyme,
      shifts: state.shifts,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'atul-health-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 100);
  }

  /* ============================================================
   *  INIT
   * ============================================================ */

  state.currentDay = load(STORAGE.curDay, todayDayKey());
  if (!MEAL_PLAN[state.currentDay]) state.currentDay = todayDayKey();

  // Clear any shifts from previous days (shifts are day-scoped, not cumulative)
  pruneOldShifts();

  let initial = 'today';
  try {
    const saved = localStorage.getItem(STORAGE.lastTab);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (TAB_META[parsed]) initial = parsed;
    }
  } catch (_) {}
  setView(initial);

  window.HealthApp = { state, setView, MEAL_PLAN, ITEM_ALTS, DAYS };
})();
</script>
</body>
</html>
