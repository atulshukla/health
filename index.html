<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atul Health">
<meta name="theme-color" content="#1a4d7a">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a4d7a'/><path d='M90 138 L52 100 a22 22 0 1 1 31-31 l7 7 7-7 a22 22 0 1 1 31 31 Z' fill='%23ffffff'/></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a4d7a'/><path d='M90 138 L52 100 a22 22 0 1 1 31-31 l7 7 7-7 a22 22 0 1 1 31 31 Z' fill='%23ffffff'/></svg>">
<title>Atul Health</title>
<style>
  :root {
    /* Cool + warm palette — navy primary, coral accent */
    --primary:      #0a2540;
    --primary-2:    #163a61;
    --primary-3:    #1f5a9a;
    --primary-soft: #eaf1fa;
    --primary-tint: #f4f8fc;

    --accent:       #ff7a59;
    --accent-2:     #ff9b7a;
    --accent-soft:  #fff0eb;

    /* Macro colors — softer, friendlier */
    --protein:      #f26464;
    --protein-2:    #ff8f8f;
    --fat:          #f5a05e;
    --fat-2:        #ffbc85;
    --carbs:        #5b8def;
    --carbs-2:      #8fb2ff;

    --green:        #3ab569;
    --green-2:      #5fd38c;
    --yellow:       #f2c94c;
    --red:          #ef5a5a;
    --purple:       #8e5fc9;

    /* Warm-tinted surfaces (not sterile cool gray) */
    --bg:           #f4f6fa;
    --bg-deep:      #ebeff5;
    --bg-warm:      #faf7f4;
    --card:         #ffffff;
    --card-alt:     #fbfcfd;

    --text:         #0e1a2b;
    --text-2:       #2d3b4e;
    --muted:        #64748b;
    --muted-2:      #9aa5b3;
    --border:       #e6ebf1;
    --border-strong:#d0d8e2;

    /* Layered shadows for depth without drama */
    --shadow-xs: 0 1px 2px rgba(12, 30, 55, 0.05);
    --shadow-sm: 0 1px 2px rgba(12, 30, 55, 0.05), 0 2px 6px rgba(12, 30, 55, 0.04);
    --shadow-md: 0 2px 8px rgba(12, 30, 55, 0.06), 0 10px 28px rgba(12, 30, 55, 0.06);
    --shadow-lg: 0 6px 18px rgba(12, 30, 55, 0.08), 0 18px 40px rgba(12, 30, 55, 0.10);

    --nav-h: 68px;
    --header-h: 58px;
    --radius-xs: 8px;
    --radius-sm: 12px;
    --radius:    16px;
    --radius-lg: 20px;
    --radius-xl: 26px;

    --grad-primary: linear-gradient(135deg, #163a61 0%, #1f5a9a 55%, #2a7bc9 100%);
    --grad-accent:  linear-gradient(135deg, #ff7a59 0%, #ff9b7a 100%);
    --grad-bg:      radial-gradient(1200px 600px at 10% -10%, #eaf1fa 0%, transparent 60%),
                    radial-gradient(800px 500px at 110% 10%, #fff0eb 0%, transparent 50%),
                    linear-gradient(180deg, #f4f6fa 0%, #f4f6fa 100%);

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* Keep old name alias so older rules don't break before they're updated */
  :root { --primary-dark: var(--primary); }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    color: var(--text);
    background: var(--bg);
  }
  body {
    background: var(--grad-bg) fixed;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
    min-height: 100vh;
    min-height: 100dvh;
  }
  h1, h2, h3 { letter-spacing: -0.02em; }
  input, select, textarea, button { font: inherit; color: inherit; }
  button { background: none; border: 0; padding: 0; cursor: pointer; }
  input { font-size: 16px; } /* prevent iOS zoom */

  /* ===== Header ===== */
  .app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding-top: var(--safe-top);
    background: var(--grad-primary);
    color: #fff;
    z-index: 10;
    box-shadow: 0 4px 14px rgba(10, 37, 64, 0.18);
  }
  .app-header::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -20px;
    height: 20px;
    background: linear-gradient(to bottom, rgba(10,37,64,0.05), transparent);
    pointer-events: none;
  }
  .app-header-inner {
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
  }
  .app-header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .app-header .subtitle {
    font-size: 13px;
    opacity: 0.82;
    font-weight: 500;
    letter-spacing: 0.01em;
  }

  /* ===== Main ===== */
  main {
    padding-top: calc(var(--header-h) + var(--safe-top));
    /* Extra clearance so content doesn't hide behind the floating Today button */
    padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 80px);
    min-height: 100vh;
    min-height: 100dvh;
  }
  .view { display: none; padding: 14px 16px 0; }
  .view.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== Generic card ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .card h2 { margin: 0 0 8px; font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin: 16px 2px 8px;
    font-weight: 700;
  }

  /* ===== Day selector pills ===== */
  .day-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 16px 12px;
    margin: 0 -16px;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-pill {
    flex: 0 0 auto;
    min-width: 62px;
    min-height: 76px;
    padding: 10px 8px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--muted);
    font-weight: 600;
    box-shadow: var(--shadow-xs);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .day-pill:active { transform: scale(0.96); }
  .day-pill .d {
    font-size: 10.5px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted-2);
  }
  .day-pill .n { font-size: 20px; line-height: 1; color: var(--text); }
  .day-pill.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 122, 89, 0.12);
  }
  .day-pill.today .d { color: var(--accent); }
  .day-pill.active {
    background: var(--grad-primary);
    border-color: transparent;
    color: #fff;
    box-shadow: var(--shadow-md), 0 8px 20px rgba(31, 90, 154, 0.28);
    transform: translateY(-1px);
  }
  .day-pill.active .d { color: rgba(255,255,255,0.82); }
  .day-pill.active .n { color: #fff; }
  .day-pill.today.active {
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(255, 122, 89, 0.22);
  }

  /* ===== Day header ===== */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 4px 2px 14px;
  }
  .day-header .day-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .day-header .day-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 2px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge.strength { background: #fde8e4; color: #c94a35; }
  .badge.cardio   { background: #e2efff; color: #2563a8; }
  .badge.rest     { background: #f0e6f9; color: #6c3a9e; }

  /* ===== Macro card ===== */
  .macro-card {
    padding: 20px;
    background:
      radial-gradient(600px 200px at 100% -10%, rgba(255,122,89,0.08), transparent 60%),
      var(--card);
    position: relative;
    overflow: hidden;
  }
  .macro-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .macro-cal-wrap { line-height: 1; }
  .macro-cal-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .macro-cal {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, var(--text) 0%, #2d3b4e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .macro-cal .unit {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    margin-left: 6px;
    -webkit-text-fill-color: var(--muted);
  }
  .macro-target {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }
  .macro-target .big {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .macro-row {
    display: grid;
    grid-template-columns: 62px 1fr 82px;
    gap: 12px;
    align-items: center;
    margin-top: 12px;
  }
  .macro-name {
    font-size: 11.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
  .macro-bar {
    height: 10px;
    background: var(--bg-deep);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .macro-fill {
    height: 100%;
    width: 0;
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.2,0.8,0.3,1);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.3);
  }
  .macro-value {
    font-size: 12.5px;
    font-weight: 600;
    text-align: right;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .macro-value .cur {
    color: var(--text);
    font-weight: 700;
  }
  .macro-fill.fill-protein { background: linear-gradient(90deg, var(--protein) 0%, var(--protein-2) 100%); }
  .macro-fill.fill-fat     { background: linear-gradient(90deg, var(--fat) 0%, var(--fat-2) 100%); }
  .macro-fill.fill-carbs   { background: linear-gradient(90deg, var(--carbs) 0%, var(--carbs-2) 100%); }

  /* ===== Meal card ===== */
  .meal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .meal::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--border);
    border-radius: 4px 0 0 4px;
  }
  .meal.is-breakfast::before { background: linear-gradient(180deg, var(--fat), var(--fat-2)); }
  .meal.is-lunch::before     { background: linear-gradient(180deg, var(--carbs), var(--carbs-2)); }
  .meal.is-dinner::before    { background: linear-gradient(180deg, var(--primary-2), var(--primary-3)); }
  .meal.is-snack::before     { background: linear-gradient(180deg, var(--green), var(--green-2)); }
  .meal.is-workout::before   { background: linear-gradient(180deg, var(--protein), var(--protein-2)); }
  .meal.is-wake::before      { background: linear-gradient(180deg, var(--accent), var(--accent-2)); }

  .meal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
  }
  .meal-title-wrap { display: flex; flex-direction: column; }
  .meal-eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .meal-title {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.02em;
  }
  .meal-time {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    background: var(--bg);
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .meal-macros {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .meal-macros span b { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }
  .meal-macros .lead b { font-size: 14px; }

  .item-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    min-height: 48px;
  }
  .item-row:last-of-type { border-bottom: 0; }
  .item-main { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14.5px;
    line-height: 1.4;
    word-break: break-word;
    color: var(--text-2);
  }
  .item-name .swap-tag {
    display: inline-block;
    font-size: 9.5px;
    font-weight: 800;
    color: var(--primary-3);
    background: var(--primary-soft);
    padding: 2px 7px;
    border-radius: 5px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    vertical-align: 1px;
  }
  .item-row.swapped .item-name { color: var(--primary-3); font-weight: 600; }
  .item-macros {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .item-macros b { font-weight: 700; }
  .item-macros .p b { color: var(--protein); }
  .item-macros .f b { color: var(--fat); }
  .item-macros .c b { color: var(--carbs); }

  .item-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }
  .swap-btn {
    min-height: 34px;
    padding: 7px 13px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    background: var(--primary-soft);
    color: var(--primary-3);
    letter-spacing: 0.01em;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .swap-btn:active { transform: scale(0.94); background: #d9e7f5; }
  .swap-btn.restore { background: #fde8e4; color: #c94a35; }
  .swap-btn.restore:active { background: #fad4cc; }

  .supp-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #f0e6fb, #e4d6f5);
    color: var(--purple);
    text-transform: uppercase;
    margin-right: 7px;
    vertical-align: 1px;
  }
  .supp-pill::before {
    content: "💊";
    font-size: 9px;
  }

  /* Activity rows (water-before / walk-after meals) */
  .item-row.activity {
    padding: 9px 0;
    border-bottom: 1px dashed var(--border);
    min-height: 0;
  }
  .item-row.activity .item-name {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }
  .activity-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-right: 7px;
    vertical-align: 1px;
  }
  .activity-pill.water {
    background: linear-gradient(135deg, #e2efff, #cfe4ff);
    color: #2563a8;
  }
  .activity-pill.water::before {
    content: "💧";
    font-size: 9px;
  }
  .activity-pill.walk {
    background: linear-gradient(135deg, #d9f2e2, #c2ecd0);
    color: #1e6b3d;
  }
  .activity-pill.walk::before {
    content: "🚶";
    font-size: 10px;
  }

  /* ===== Bottom nav ===== */
  .bottom-nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: rgba(255,255,255,0.78);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-top: 1px solid rgba(230, 235, 241, 0.7);
    padding: 6px 10px calc(4px + var(--safe-bottom));
    z-index: 20;
    box-shadow: 0 -8px 24px rgba(12, 30, 55, 0.04);
  }
  .bottom-nav button {
    height: var(--nav-h);
    min-height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    color: var(--muted-2);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.2px;
    border-radius: 14px;
    transition: color 0.15s ease, transform 0.1s ease, background 0.2s ease;
  }
  .bottom-nav button svg {
    width: 24px; height: 24px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .bottom-nav button.active {
    color: var(--primary-3);
    background: var(--primary-soft);
  }
  .bottom-nav button.active svg {
    stroke-width: 2.2;
  }
  .bottom-nav button:active { transform: scale(0.92); }

  /* ===== Floating Today button ===== */
  .today-fab {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: calc(var(--safe-bottom) + var(--nav-h) + 14px);
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: var(--grad-primary);
    color: #fff;
    z-index: 25;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 0 5px var(--bg),
      0 8px 22px rgba(10, 37, 64, 0.32),
      0 4px 10px rgba(10, 37, 64, 0.18);
    transition: transform 0.2s cubic-bezier(0.2,0.8,0.3,1), box-shadow 0.2s ease, background 0.2s ease;
  }
  .today-fab:active {
    transform: translateX(-50%) scale(0.93);
  }
  .today-fab.active {
    background: var(--grad-accent);
    box-shadow:
      0 0 0 5px var(--bg),
      0 8px 24px rgba(255, 122, 89, 0.45),
      0 4px 10px rgba(255, 122, 89, 0.24);
  }
  .today-fab svg {
    width: 26px; height: 26px;
    stroke: #fff;
    fill: none;
  }
  .today-fab-label {
    position: absolute;
    bottom: -17px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    white-space: nowrap;
  }
  .today-fab.active + /* no-op: fab-label follows fab */
  .today-fab-label { color: var(--accent); }
  .today-fab.active .today-fab-label { color: var(--accent); }

  /* ===== Today view ===== */
  .today-header {
    padding: 6px 2px 14px;
  }
  .today-eyebrow {
    font-size: 11.5px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .today-greeting {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin: 0 0 10px;
    line-height: 1.1;
  }
  .today-header .badge {
    margin-top: 2px;
  }

  .today-next {
    background: var(--grad-primary);
    color: #fff;
    padding: 18px 20px;
    border: 0;
    width: 100%;
    text-align: left;
    display: block;
    box-shadow: 0 6px 20px rgba(10, 37, 64, 0.25), 0 12px 36px rgba(31, 90, 154, 0.18);
    transition: transform 0.12s ease;
    margin-bottom: 14px;
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
  }
  .today-next:active { transform: scale(0.99); }
  .today-next::before {
    content: "";
    position: absolute;
    right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255, 122, 89, 0.4), transparent 60%);
    pointer-events: none;
  }
  .next-label {
    font-size: 10.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.85;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .next-time {
    font-size: 12.5px;
    opacity: 0.85;
    font-weight: 700;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .next-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .next-sub {
    font-size: 13px;
    opacity: 0.9;
    margin-top: 6px;
    line-height: 1.4;
  }

  /* Timeline */
  .today-tl-card { padding: 14px 10px 8px; }
  .today-tl-card h2 { margin: 4px 6px 10px; }
  .timeline { display: flex; flex-direction: column; }
  .tl-item {
    display: grid;
    grid-template-columns: 66px 20px 1fr;
    gap: 0;
    align-items: stretch;
    padding: 0;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    cursor: pointer;
    position: relative;
  }
  .tl-item:not(:last-child) .tl-line::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 22px;
    bottom: -6px;
    width: 2px;
    background: var(--border);
    transform: translateX(-50%);
  }
  .tl-time {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    padding-top: 16px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    padding-right: 10px;
    letter-spacing: 0.02em;
  }
  .tl-line {
    position: relative;
    display: flex;
    justify-content: center;
  }
  .tl-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border-strong);
    margin-top: 14px;
    z-index: 1;
    position: relative;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border-strong);
    transition: all 0.2s ease;
  }
  .tl-content {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 12px;
    background: var(--card);
    margin: 6px 0 6px 6px;
    border: 1px solid var(--border);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .tl-item:active .tl-content { transform: scale(0.98); }
  .tl-icon { font-size: 18px; line-height: 1; flex: 0 0 auto; }
  .tl-text { flex: 1; min-width: 0; }
  .tl-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .tl-sub {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.35;
  }
  .tl-arrow {
    font-size: 20px;
    color: var(--muted-2);
    font-weight: 400;
    padding: 0 2px;
    flex: 0 0 auto;
  }

  /* Type-specific dot colors */
  .tl-item.type-water .tl-dot    { background: var(--carbs);  box-shadow: 0 0 0 1px var(--carbs); }
  .tl-item.type-meal .tl-dot     { background: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .tl-item.type-walk .tl-dot     { background: var(--green);  box-shadow: 0 0 0 1px var(--green); }
  .tl-item.type-workout .tl-dot  { background: var(--protein); box-shadow: 0 0 0 1px var(--protein); }
  .tl-item.type-supp .tl-dot     { background: var(--purple); box-shadow: 0 0 0 1px var(--purple); }

  /* Past → faded */
  .tl-item.past .tl-content { background: transparent; border-color: transparent; }
  .tl-item.past .tl-time,
  .tl-item.past .tl-title,
  .tl-item.past .tl-sub,
  .tl-item.past .tl-icon { opacity: 0.45; }
  .tl-item.past .tl-dot {
    background: var(--border-strong);
    box-shadow: 0 0 0 1px var(--border-strong);
  }

  /* Now → highlighted with pulse */
  .tl-item.now .tl-content {
    background: var(--accent-soft);
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(255, 122, 89, 0.18);
  }
  .tl-item.now .tl-title { color: #a93e25; }
  .tl-item.now .tl-time {
    color: var(--accent);
    font-weight: 800;
  }
  .tl-item.now .tl-dot {
    transform: scale(1.25);
    animation: tlPulse 2s ease-in-out infinite;
  }
  @keyframes tlPulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--accent), 0 0 0 4px rgba(255, 122, 89, 0.25); }
    50%      { box-shadow: 0 0 0 1px var(--accent), 0 0 0 10px rgba(255, 122, 89, 0.03); }
  }

  /* No nav — timeline without pointer hand if non-navigable */
  .tl-item.no-nav { cursor: default; }
  .tl-item.no-nav .tl-arrow { display: none; }

  /* ===== Bottom sheet ===== */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 25, 47, 0.42);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.24s ease;
    z-index: 40;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .bottom-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--card);
    border-top-left-radius: var(--radius-xl);
    border-top-right-radius: var(--radius-xl);
    padding: 8px 0 calc(14px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.2,0.8,0.2,1);
    z-index: 50;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -12px 40px rgba(12, 30, 55, 0.2);
  }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 44px;
    height: 5px;
    border-radius: 3px;
    background: var(--border-strong);
    margin: 8px auto 12px;
  }
  .sheet-head {
    padding: 4px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-title { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
  .sheet-sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; font-weight: 500; }
  .sheet-body {
    padding: 8px 10px 4px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .alt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px;
    border-radius: 12px;
    min-height: 56px;
    transition: background 0.15s ease;
    text-align: left;
    width: 100%;
  }
  .alt-row:active { background: var(--primary-soft); }
  .alt-name {
    font-size: 14.5px;
    font-weight: 500;
    flex: 1;
    padding-right: 12px;
    color: var(--text-2);
  }
  .alt-macros {
    font-size: 11.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    white-space: nowrap;
  }
  .alt-row.current {
    background: var(--primary-soft);
  }
  .alt-row.current .alt-name {
    color: var(--primary-3);
    font-weight: 700;
  }
  .alt-row.current .alt-name::before {
    content: "✓ ";
    color: var(--primary-3);
    font-weight: 800;
  }
  .sheet-foot {
    padding: 10px 16px 4px;
    border-top: 1px solid var(--border);
  }
  .ghost-btn {
    width: 100%;
    min-height: 46px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    font-weight: 700;
    color: var(--muted);
  }
  .ghost-btn:active { background: var(--bg); }

  /* ===== Exercise ===== */
  .week-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .week-table th, .week-table td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .week-table tr:last-child td { border-bottom: 0; }
  .week-table th {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    font-weight: 800;
    padding-top: 0;
  }
  .week-table tr.today td {
    background: var(--accent-soft);
  }
  .week-table tr.today td:first-child { color: var(--accent); font-weight: 800; }
  .week-table td:first-child { font-weight: 700; }

  .ex-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    min-height: 60px;
  }
  .ex-row:last-child { border-bottom: 0; }
  .ex-check {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border-radius: 10px;
    border: 2px solid var(--border-strong);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: transform 0.1s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .ex-check:active { transform: scale(0.9); }
  .ex-check.done {
    background: linear-gradient(135deg, var(--green), var(--green-2));
    border-color: transparent;
    box-shadow: 0 3px 10px rgba(58, 181, 105, 0.35);
  }
  .ex-check.done::after {
    content: "";
    width: 11px;
    height: 6px;
    border-left: 2.4px solid #fff;
    border-bottom: 2.4px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .ex-desc {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.45;
  }
  .ex-sets {
    font-size: 12px;
    color: var(--primary-3);
    font-weight: 700;
    margin-top: 5px;
    letter-spacing: 0.01em;
  }
  .ex-row.done .ex-name { color: var(--muted-2); text-decoration: line-through; }
  .ex-row.done .ex-desc, .ex-row.done .ex-sets { opacity: 0.6; }

  .ex-demo {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0;
    box-shadow: 0 4px 12px rgba(255, 122, 89, 0.35);
    transition: transform 0.12s ease;
  }
  .ex-demo:active { transform: scale(0.92); }
  .ex-demo svg { width: 16px; height: 16px; fill: #fff; }

  .ex-card h3 {
    margin-bottom: 2px;
    font-size: 17px;
  }
  .ex-card .meta {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .warmup-note {
    background: linear-gradient(135deg, var(--primary-soft), var(--primary-tint));
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12.5px;
    color: var(--primary-2);
    margin-bottom: 10px;
    font-weight: 600;
    border: 1px solid rgba(31, 90, 154, 0.12);
  }

  /* Video sheet (YouTube Shorts → portrait) */
  .video-wrap {
    position: relative;
    aspect-ratio: 9 / 16;
    height: min(50vh, 520px);
    width: auto;
    max-width: 100%;
    margin: 0 auto;
    background: #0e1a2b;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: 0;
  }
  .video-thumb {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .video-thumb::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.45) 100%);
  }
  .video-play {
    position: relative;
    z-index: 2;
    width: 68px; height: 68px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }
  .video-play::after {
    content: "";
    width: 0; height: 0;
    border-left: 16px solid var(--primary);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 4px;
  }
  .cues-list {
    margin: 16px 0 0;
    padding: 0;
    list-style: none;
  }
  .cues-list li {
    padding: 9px 0 9px 26px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .cues-list li:last-child { border-bottom: 0; }
  .cues-list li::before {
    content: "";
    position: absolute;
    left: 4px; top: 15px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 2px solid var(--accent);
  }
  /* Horizontal thumbnail strip for exercise variants.
     Portrait thumbs (9:16) cropped via background-size: cover so Shorts'
     black letterbox bars in the landscape thumbnail are hidden. */
  .video-strip-label {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 16px 2px 0;
  }
  .video-strip-label .lbl {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .video-strip-label .count {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted-2);
    font-variant-numeric: tabular-nums;
  }
  .video-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    margin: 8px -10px 0;
    padding: 6px 14px 12px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .video-strip::-webkit-scrollbar { display: none; }
  .video-thumb-mini {
    flex: 0 0 auto;
    width: 86px;
    height: 148px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    background-color: #0e1a2b;
    position: relative;
    overflow: hidden;
    scroll-snap-align: start;
    padding: 0;
    border: 0;
    cursor: pointer;
    transition: transform 0.15s ease, outline-color 0.2s ease;
    box-shadow: 0 2px 6px rgba(12, 30, 55, 0.12);
  }
  .video-thumb-mini::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.15) 0%,
      transparent 35%,
      transparent 70%,
      rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .video-thumb-mini .mini-num {
    position: absolute;
    top: 7px; left: 7px;
    z-index: 2;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10.5px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 6px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .video-thumb-mini .mini-play {
    position: absolute;
    right: 7px; bottom: 7px;
    z-index: 2;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .video-thumb-mini .mini-play::after {
    content: "";
    width: 0; height: 0;
    border-left: 9px solid var(--primary);
    border-top: 5.5px solid transparent;
    border-bottom: 5.5px solid transparent;
    margin-left: 2px;
  }
  .video-thumb-mini.active {
    outline: 3px solid var(--primary-3);
    outline-offset: 3px;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(31, 90, 154, 0.35);
  }
  .video-thumb-mini.active .mini-play {
    background: var(--primary-3);
  }
  .video-thumb-mini.active .mini-play::after {
    border-left-color: #fff;
  }
  .video-thumb-mini:active { transform: scale(0.96); }
  /* Fade edges to signal scroll affordance */
  .video-strip-wrap {
    position: relative;
  }
  .video-strip-wrap::before,
  .video-strip-wrap::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 16px;
    pointer-events: none;
    z-index: 1;
  }
  .video-strip-wrap::before {
    left: 0;
    background: linear-gradient(90deg, var(--card) 0%, rgba(255,255,255,0) 100%);
  }
  .video-strip-wrap::after {
    right: 0;
    background: linear-gradient(270deg, var(--card) 0%, rgba(255,255,255,0) 100%);
  }

  .video-meta {
    margin: 14px 0 6px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .video-chip {
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .video-chip.strong { background: var(--primary-soft); color: var(--primary-3); }
  .yt-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 48px;
    padding: 12px;
    border-radius: 12px;
    background: var(--text);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    margin-top: 12px;
  }
  .yt-link:active { opacity: 0.9; }
  .yt-link::before {
    content: "▶";
    font-size: 12px;
    color: #ff0000;
    background: #fff;
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ===== Tips: colored boxes ===== */
  .tip-box {
    padding: 16px 18px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
    position: relative;
    overflow: hidden;
  }
  .tip-box::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
  }
  .tip-box h3 {
    margin: 0 0 10px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tip-box h3 .tip-icon {
    width: 30px; height: 30px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .tip-box ol, .tip-box ul { margin: 8px 0 0; padding-left: 20px; }
  .tip-box li {
    margin-bottom: 6px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-2);
  }
  .tip-box li::marker { font-weight: 700; }
  .tip-box li b { color: var(--text); font-weight: 700; }

  .tip-box.rules::before   { background: linear-gradient(180deg, var(--green), var(--green-2)); }
  .tip-box.rules           { background: linear-gradient(180deg, #effaf3 0%, #ffffff 100%); }
  .tip-box.rules h3        { color: #1e6b3d; }
  .tip-box.rules h3 .tip-icon { background: #d9f2e2; color: #1e6b3d; }

  .tip-box.tips::before    { background: linear-gradient(180deg, #f2c94c, #f6d673); }
  .tip-box.tips            { background: linear-gradient(180deg, #fefaed 0%, #ffffff 100%); }
  .tip-box.tips h3         { color: #8a6d0b; }
  .tip-box.tips h3 .tip-icon { background: #faecb7; color: #8a6d0b; }

  .tip-box.warning::before { background: linear-gradient(180deg, var(--red), #f67a7a); }
  .tip-box.warning         { background: linear-gradient(180deg, #fef2f0 0%, #ffffff 100%); }
  .tip-box.warning h3      { color: #a93226; }
  .tip-box.warning h3 .tip-icon { background: #fbdad5; color: #a93226; }

  .tip-box.medical::before { background: linear-gradient(180deg, var(--purple), #a97ad5); }
  .tip-box.medical         { background: linear-gradient(180deg, #f7f1fc 0%, #ffffff 100%); }
  .tip-box.medical h3      { color: #5b2c6f; }
  .tip-box.medical h3 .tip-icon { background: #ecdff5; color: #5b2c6f; }

  /* ===== Shopping ===== */
  .shop-toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .shop-btn {
    flex: 1;
    min-height: 44px;
    padding: 10px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 13.5px;
    font-weight: 700;

    width: 100%;
    text-align: left;

    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border-strong);

    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: background 0.2s ease, border-color 0.2s ease;

    box-shadow: 0 2px 8px rgba(58, 181, 105, 0.3);

    content: "";

    height: 5px;
    border-left: 2.2px solid #fff;

    width: 56px; height: 56px;
    border-radius: 50%;
    background:
      conic-gradient(var(--green) var(--pct, 0%), var(--bg-deep) 0);

    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
    position: relative;

    content: "";
    position: absolute;
    inset: 4px;
    background: var(--card);
    border-radius: 50%;

    gap: 10px;
    margin-bottom: 14px;

    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .stat-card.weight {
    background:
      radial-gradient(300px 150px at 110% -10%, rgba(31, 90, 154, 0.1), transparent),
      var(--card);
  }
  .stat-card.rhr {
    background:
      radial-gradient(300px 150px at 110% -10%, rgba(242, 100, 100, 0.08), transparent),
      var(--card);
  }

    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    font-weight: 800;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 800;
    margin-top: 6px;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    margin-left: 4px;

    font-size: 11.5px;
    color: var(--muted);
    margin-top: 8px;
    font-weight: 600;

  .stat-sub.down { color: var(--green); }

    display: flex;
    gap: 10px;
    align-items: center;
  }

    flex: 1;

    font-size: 16px;
    font-weight: 600;
    color: var(--text);

    min-height: 46px;

  .row-flex-between { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .muted { color: var(--muted); }
  .small { font-size: 12px; }
  .no-data { color: var(--muted); font-style: italic; font-size: 13px; padding: 10px 0; text-align: center; }

</head>

  function todayDayKey() {
    return DAYS[new Date().getDay()].key;
  }
  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  }
  function weekKey() {
    // ISO-ish: year-W-num (Sunday-start week for simplicity)
    const d = new Date();
    const start = new Date(d.getFullYear(), 0, 1);
    const diff = Math.floor((d - start) / 86400000);
    return d.getFullYear() + '-W' + Math.ceil((diff + start.getDay() + 1) / 7);
  }
  function fmtDate(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }
  function calOf(p, f, c) { return Math.round(p*4 + f*9 + c*4); }
  function el(tag, cls, text) {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }

  //   `YYYY-MM-DD-<blockId>-e<exerciseIdx>`
  function workoutKey(dateIso, blockId, exIdx) {
    return dateIso + '-' + blockId + '-e' + exIdx;
  }

  // Planned session(s) for a given day-of-week.
  // Mon/Fri → Strength A, Wed → Strength B, Tue/Thu → Cardio, Sat → Long cardio, Sun → rest.
  function plannedBlockForDay(dayKey) {
    if (dayKey === 'mon' || dayKey === 'fri') return STRENGTH_A;
    if (dayKey === 'wed') return STRENGTH_B;
    if (dayKey === 'tue' || dayKey === 'thu') return CARDIO_DAY;
    if (dayKey === 'sat') return SATURDAY_LONG;
    return null; // sun: rest
  }

  // Count {done, total} for the planned block on a given day of this week.
  function workoutCountForDay(dayKey) {
    const block = plannedBlockForDay(dayKey);
    if (!block) return { done: 0, total: 0, blockId: null };
    const dateIso = dateKeyForDayOfWeek(dayKey);
    let done = 0;
    for (let i = 0; i < block.exercises.length; i++) {
      if (state.workouts[workoutKey(dateIso, block.id, i)]) done++;
    }
    return { done, total: block.exercises.length, blockId: block.id };
  }

  // Weekly totals by session type, to drive the "Weekly goal" card.
  function weeklyWorkoutTotals() {
    const want = { strength: 3, cardio: 3 };
    const got = { strength: 0, cardio: 0 };
    DAYS.forEach(d => {
      const c = workoutCountForDay(d.key);
      // A session "counts" for the weekly goal if ≥ half its exercises done.
      if (c.total === 0 || c.done < Math.ceil(c.total / 2)) return;
      if (c.blockId === 'strA' || c.blockId === 'strB') got.strength++;
      else if (c.blockId === 'cardio' || c.blockId === 'satLong') got.cardio++;
    });
    return { want, got };
  }

  /* ============================================================
   *  TODAY TIMELINE helpers
   * ============================================================ */

  function padT(n) { return String(n).padStart(2, '0'); }
  function minuteOfDay(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
  }
  function currentMinute() {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  }
  function formatTime12(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    return h12 + ':' + padT(m) + ' ' + period;
  }
  function addMinutesHHMM(hhmm, mins) {
    const total = minuteOfDay(hhmm) + mins;
    return padT(Math.floor(total / 60)) + ':' + padT(total % 60);
  }
  function greeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    if (h < 21) return 'Good evening';
    return 'Good night';
  }
  function iconForTimelineType(t) {
    return { water: '💧', meal: '🍽️', walk: '🚶', workout: '💪', supp: '💊' }[t] || '•';
  }

  // Timeline for a given day-of-week. Each item: { time, type, title, subtitle, navMi, navTo }
  //   navMi  → meal-card index to scroll to in Meals tab
  //   navTo  → tab name to switch to (e.g. 'exercise', 'tracker')
  function buildTodayTimeline(dayKey) {
    const plannedWorkout = plannedBlockForDay(dayKey);
    const isSun = dayKey === 'sun';
    const isSat = dayKey === 'sat';
    const isStrength = dayKey === 'mon' || dayKey === 'wed' || dayKey === 'fri';
    const isCardioSplit = dayKey === 'tue' || dayKey === 'thu';
    const meals = MEAL_PLAN[dayKey];
    const mealsCount = meals.length;
    const items = [];

    // 06:30 — wake
    items.push({ time: '06:30', type: 'water', title: 'Chia water + 500 ml water',
                 subtitle: '1 tbsp chia soaked overnight · 90 min before Nurokind',
                 navMi: 0 });

    // 07:00 — morning movement (Sat replaces with long cardio)
    if (isSat) {
      items.push({ time: '07:00', type: 'workout', title: 'Long cardio intervals',
                   subtitle: '50 min · warm-up → 10× intervals → cool-down',
                   navTo: 'exercise' });
    } else {
      items.push({ time: '07:00', type: 'walk', title: '20-min morning treadmill walk',
                   subtitle: '5 km/h · wakes up NEAT for the day',
                   navTo: 'exercise' });
    }

    // 07:45 — pre-breakfast water
    items.push({ time: '07:45', type: 'water', title: '250 ml water',
                 subtitle: 'Before breakfast' });

    // 08:00 / 09:00 — breakfast + Nurokind
    const bkTime = isSun ? '09:00' : '08:00';
    items.push({ time: bkTime, type: 'meal', title: 'Breakfast',
                 subtitle: isSun ? 'Moong dal chilla + paneer + curd' : null,
                 navMi: 1 });
    items.push({ time: addMinutesHHMM(bkTime, 5), type: 'supp',
                 title: 'Nurokind-OD 1500 mcg',
                 subtitle: 'Sublingual 1–2 min · no water for 10 min',
                 navTo: 'tracker' });

    // 10:30 — mid-morning water
    items.push({ time: '10:30', type: 'water', title: '250 ml water', subtitle: null });

    // 11:00 — mid-morning snack
    items.push({ time: '11:00', type: 'meal', title: 'Mid-morning',
                 subtitle: 'Whey shake + sprouts/chana',
                 navMi: 2 });

    // 13:15 — pre-lunch water
    items.push({ time: '13:15', type: 'water', title: '250 ml water',
                 subtitle: 'Before lunch' });

    // 13:30 — lunch (+ Uprise-D on Sunday)
    items.push({ time: '13:30', type: 'meal',
                 title: 'Lunch' + (isSun ? ' + Uprise-D3 sachet' : ''),
                 subtitle: isSun ? 'Weekly vitamin D — take with paneer sabzi' : null,
                 navMi: 3 });

    // 13:45 — post-lunch walk
    items.push({ time: '13:45', type: 'walk', title: '10-min slow walk',
                 subtitle: 'Post-lunch glucose control',
                 navTo: 'exercise' });

    // 14:00 — chaas
    items.push({ time: '14:00', type: 'meal', title: 'Chaas',
                 subtitle: '60g dahi + water + salt + jeera',
                 navMi: 4 });

    // 15:30 — water
    items.push({ time: '15:30', type: 'water', title: '250 ml water', subtitle: null });

    // 17:00 — pre-workout fuel / evening snack
    items.push({ time: '17:00', type: 'meal',
                 title: isStrength ? 'Pre-workout fuel' : 'Evening snack',
                 subtitle: isStrength ? 'Coffee + apple/banana, 45–60 min before lifting' : null,
                 navMi: 5 });

    // 17:45 — water
    items.push({ time: '17:45', type: 'water', title: '250 ml water', subtitle: null });

    // 18:00 — strength workout
    if (isStrength && plannedWorkout) {
      items.push({ time: '18:00', type: 'workout', title: plannedWorkout.short,
                   subtitle: '40 min · ' + plannedWorkout.exercises.length + ' exercises',
                   navTo: 'exercise' });
      items.push({ time: '19:00', type: 'meal', title: 'Post-workout shake',
                   subtitle: '60g whey + 250 ml toned milk — within 60 min',
                   navMi: 6 });
    }

    // 20:15 — pre-dinner water
    items.push({ time: '20:15', type: 'water', title: '250 ml water',
                 subtitle: 'Before dinner' });

    // Dinner (Sunday earlier)
    const dinnerTime = isSun ? '20:00' : '20:30';
    items.push({ time: dinnerTime, type: 'meal',
                 title: 'Dinner' + (isSun ? ' (earlier)' : ''),
                 subtitle: null,
                 navMi: mealsCount - 1 });

    // Post-dinner walk
    items.push({ time: addMinutesHHMM(dinnerTime, 30), type: 'walk',
                 title: '15-min walk after dinner',
                 subtitle: null,
                 navTo: 'exercise' });

    // 21:00 — cardio split evening walk
    if (isCardioSplit) {
      items.push({ time: '21:00', type: 'workout', title: 'Evening walk (PM split)',
                   subtitle: '20 min at 5 km/h',
                   navTo: 'exercise' });
    }

    // Late-evening hydration
    items.push({ time: '21:30', type: 'water', title: '500 ml water (split in 2)',
                 subtitle: null });
    items.push({ time: '22:30', type: 'water', title: '250 ml water',
                 subtitle: 'Before bed' });

    return items.sort((a, b) => a.time.localeCompare(b.time));
  }

  /* ============================================================
   *  ROUTER
   * ============================================================ */

  const TAB_META = {
    today:    { title: 'Today',    render: renderToday },
    meals:    { title: 'Meals',    render: renderMeals },
    exercise: { title: 'Exercise', render: renderExercise },
    tips:     { title: 'Tips',     render: renderTips },
    shopping: { title: 'Shopping', render: renderShopping },
    tracker:  { title: 'Tracker',  render: renderTracker },
  };

  const nav = document.getElementById('bottom-nav');
  const fabToday = document.getElementById('today-fab');
  const headerTitle = document.getElementById('header-title');
  const headerSubtitle = document.getElementById('header-subtitle');

  function setView(key, options) {
    options = options || {};
    state.currentView = key;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + key).classList.add('active');
    nav.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === key);
    });
    fabToday.classList.toggle('active', key === 'today');
    headerTitle.textContent = TAB_META[key].title;
    updateHeaderSubtitle();

    TAB_META[key].render();
    save(STORAGE.lastTab, key);

    if (options.scrollToId) {
      requestAnimationFrame(() => {
        const target = document.getElementById(options.scrollToId);
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo(0, 0);
        }
      });
    } else {
      window.scrollTo(0, 0);
    }
  }

  // FAB click
  document.getElementById('today-fab').addEventListener('click', () => setView('today'));

  function updateHeaderSubtitle() {
    if (state.currentView === 'meals' && state.currentDay) {
      const d = DAYS.find(x => x.key === state.currentDay);
      headerSubtitle.textContent = d ? d.name : '';
    } else if (state.currentView === 'today') {
      const d = DAYS.find(x => x.key === todayDayKey());
      headerSubtitle.textContent = d ? d.name : '';
    } else {
      headerSubtitle.textContent = '';
    }
  }

  nav.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-view]');
    if (!btn) return;
    setView(btn.dataset.view);
  });

  /* ============================================================
   *  TODAY TAB
   * ============================================================ */

  function navFromTimeline(item, dayKey) {
    if (item.navTo) {
      setView(item.navTo);
      return;
    }
    if (item.navMi !== undefined) {
      state.currentDay = dayKey;
      save(STORAGE.curDay, dayKey);
      setView('meals', { scrollToId: 'meal-' + dayKey + '-' + item.navMi });
    }
  }

  function renderToday() {
    const root = document.getElementById('view-today');
    root.innerHTML = '';

    const dayKey = todayDayKey();
    const day = DAYS.find(d => d.key === dayKey);
    const timeline = buildTodayTimeline(dayKey);
    const now = currentMinute();

    // Header
    const header = el('div', 'today-header');
    const dateStr = new Date().toLocaleDateString(undefined,
      { weekday: 'long', month: 'long', day: 'numeric' });
    header.innerHTML =
      '<div class="today-eyebrow">' + dateStr + '</div>'
      + '<h1 class="today-greeting">' + greeting() + ', Atul</h1>'
      + '<span class="badge ' + day.type + '">' + day.badge + '</span>';
    root.appendChild(header);

    // Next-up card (shows the first future item)
    const nextIdx = timeline.findIndex(t => minuteOfDay(t.time) > now);
    if (nextIdx >= 0) {
      const next = timeline[nextIdx];
      const mins = minuteOfDay(next.time) - now;
      const whenStr = mins < 60
        ? 'in ' + mins + ' min'
        : 'in ' + Math.floor(mins / 60) + 'h ' + (mins % 60) + 'm';
      const nextCard = el('button', 'today-next');
      nextCard.innerHTML =
        '<div class="next-label">' + iconForTimelineType(next.type) + ' Coming up</div>'
        + '<div class="next-time">' + formatTime12(next.time) + ' · ' + whenStr + '</div>'
        + '<div class="next-title">' + next.title + '</div>'
        + (next.subtitle ? '<div class="next-sub">' + next.subtitle + '</div>' : '');
      if (next.navMi !== undefined || next.navTo) {
        nextCard.addEventListener('click', () => navFromTimeline(next, dayKey));
      } else {
        nextCard.style.cursor = 'default';
      }
      root.appendChild(nextCard);
    } else {
      // End of day
      const done = el('div', 'card');
      done.innerHTML =
        '<h2>That\'s a wrap</h2>'
        + '<p class="muted small" style="margin:0">All of today\'s milestones have passed. '
        + 'Tomorrow\'s plan will appear after midnight.</p>';
      root.appendChild(done);
    }

    // Timeline
    const tlCard = el('div', 'card today-tl-card');
    tlCard.innerHTML = '<h2>Today\'s timeline</h2>';
    const tl = el('div', 'timeline');
    timeline.forEach(item => {
      const mm = minuteOfDay(item.time);
      let stateClass = 'future';
      if (mm < now - 15) stateClass = 'past';
      else if (mm >= now - 15 && mm <= now + 15) stateClass = 'now';

      const hasNav = item.navMi !== undefined || item.navTo;
      const row = el('button',
        'tl-item type-' + item.type + ' ' + stateClass + (hasNav ? '' : ' no-nav'));
      row.innerHTML =
        '<div class="tl-time">' + formatTime12(item.time) + '</div>'
        + '<div class="tl-line"><div class="tl-dot"></div></div>'
        + '<div class="tl-content">'
        +   '<div class="tl-icon">' + iconForTimelineType(item.type) + '</div>'
        +   '<div class="tl-text">'
        +     '<div class="tl-title">' + item.title + '</div>'
        +     (item.subtitle ? '<div class="tl-sub">' + item.subtitle + '</div>' : '')
        +   '</div>'
        +   (hasNav ? '<div class="tl-arrow">›</div>' : '')
        + '</div>';
      if (hasNav) {
        row.addEventListener('click', () => navFromTimeline(item, dayKey));
      }
      tl.appendChild(row);
    });
    tlCard.appendChild(tl);
    root.appendChild(tlCard);
  }

  /* ============================================================
   *  MEALS TAB
   * ============================================================ */

  function getItem(dayKey, mealIdx, itemIdx) {
    const key = dayKey + '-' + mealIdx + '-' + itemIdx;
    const original = MEAL_PLAN[dayKey][mealIdx].items[itemIdx];
    const swapped = state.swaps[key];
    if (!swapped) return { item: original, swapped: false };
    return {
      item: { ...original, name: swapped.name, p: swapped.p, f: swapped.f, c: swapped.c },
      swapped: true,
      originalName: original.name,
    };
  }

  function dayMacros(dayKey) {
    let P = 0, F = 0, C = 0;
    MEAL_PLAN[dayKey].forEach((meal, mi) => {
      meal.items.forEach((it, ii) => {
        const { item } = getItem(dayKey, mi, ii);
        P += item.p; F += item.f; C += item.c;
      });
    });
    return { p: P, f: F, c: C, cal: calOf(P, F, C) };
  }

  function mealMacros(dayKey, mi) {
    let P = 0, F = 0, C = 0;
    MEAL_PLAN[dayKey][mi].items.forEach((it, ii) => {
      const { item } = getItem(dayKey, mi, ii);
      P += item.p; F += item.f; C += item.c;
    });
    return { p: P, f: F, c: C, cal: calOf(P, F, C) };
  }

  function renderMeals() {
    const root = document.getElementById('view-meals');
    root.innerHTML = '';

    if (!state.currentDay) state.currentDay = todayDayKey();
    const dayKey = state.currentDay;
    const day = DAYS.find(d => d.key === dayKey);

    // Day strip
    const strip = el('div', 'day-strip');
    const today = todayDayKey();
    DAYS.forEach(d => {
      const pill = el('button', 'day-pill');
      if (d.key === today) pill.classList.add('today');
      if (d.key === dayKey) pill.classList.add('active');
      pill.innerHTML = '<span class="d">' + d.short + '</span><span class="n">' + shortBadge(d) + '</span>';
      pill.addEventListener('click', () => {
        state.currentDay = d.key;
        save(STORAGE.curDay, d.key);
        updateHeaderSubtitle();
        renderMeals();
      });
      strip.appendChild(pill);
    });
    root.appendChild(strip);

    // Day header
    const head = el('div', 'day-header');
    const mealCount = MEAL_PLAN[dayKey].length;
    head.innerHTML =
      '<div>'
      +   '<div class="day-name">' + day.name + '</div>'
      +   '<div class="day-sub">' + mealCount + ' meals · ' + dayKey.toUpperCase() + '</div>'
      + '</div>'
      + '<span class="badge ' + day.type + '">' + day.badge + '</span>';
    root.appendChild(head);

    // Macro bar card
    root.appendChild(buildMacroCard(dayKey));

    // Meal cards
    MEAL_PLAN[dayKey].forEach((meal, mi) => {
      root.appendChild(buildMealCard(dayKey, mi, meal));
    });
  }

  function shortBadge(d) {
    // single char icon in day pill
    if (d.type === 'strength') return '💪';
    if (d.type === 'cardio') return '🚶';
    return '☀️';
  }

  function buildMacroCard(dayKey) {
    const m = dayMacros(dayKey);
    const card = el('div', 'card macro-card');

    const top = el('div', 'macro-top');
    top.innerHTML =
      '<div class="macro-cal-wrap">'
      +   '<div class="macro-cal-label">Today\'s total</div>'
      +   '<div class="macro-cal">' + m.cal + '<span class="unit">kcal</span></div>'
      + '</div>'
      + '<div class="macro-target">'
      +   '<span class="big">1,700–1,900</span>'
      +   'target range'
      + '</div>';
    card.appendChild(top);

    card.appendChild(buildMacroRow('Protein', m.p, 135, 'var(--protein)', 'fill-protein'));
    card.appendChild(buildMacroRow('Fat',     m.f, 60,  'var(--fat)',     'fill-fat'));
    card.appendChild(buildMacroRow('Carbs',   m.c, 160, 'var(--carbs)',   'fill-carbs'));
    return card;
  }

  function buildMacroRow(label, cur, target, color, fillClass) {
    const row = el('div', 'macro-row');
    const pct = Math.min(100, Math.round(100 * cur / target));
    row.innerHTML =
      '<div class="macro-name" style="color:' + color + '">' + label + '</div>'
      + '<div class="macro-bar"><div class="macro-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>'
      + '<div class="macro-value"><span class="cur">' + Math.round(cur) + 'g</span> / ' + target + 'g</div>';
    return row;
  }

  /* Activity items are synthetic (not stored in MEAL_PLAN) so they
     never shift swap indices or affect macro totals. Rendered as
     lightweight rows with a water/walk pill. */
  function getMealActivities(meal) {
    const title = (meal.title || '').toLowerCase();
    const prefix = [];
    const suffix = [];

    if (title.includes('wake')) {
      suffix.push({ kind: 'walk', text: '20-min morning treadmill walk at 5 km/h (~7:00 AM)' });
    }
    if (title.includes('breakfast')) {
      prefix.push({ kind: 'water', text: '250 ml water at 7:45 AM, before eating' });
    }
    if (title.includes('mid-morning')) {
      prefix.push({ kind: 'water', text: '250 ml water at 10:30 AM' });
    }
    // "Lunch" but not "Post-lunch"
    if (title.includes('lunch') && !title.includes('post')) {
      prefix.push({ kind: 'water', text: '250 ml water at 1:15 PM, before eating' });
      suffix.push({ kind: 'walk',  text: '10-min slow walk after lunch (glucose control)' });
    }
    if (title.includes('evening') || title.includes('pre-workout')) {
      prefix.push({ kind: 'water', text: '250 ml water at 3:30 PM' });
      suffix.push({ kind: 'water', text: '250 ml water at 5:45 PM' });
    }
    if (title.includes('dinner')) {
      prefix.push({ kind: 'water', text: '250 ml water at 8:15 PM, before eating' });
      suffix.push({ kind: 'walk',  text: '15-min walk after dinner' });
      suffix.push({ kind: 'water', text: '500 ml water by 9:30 PM (split in 2)' });
      suffix.push({ kind: 'water', text: '250 ml water at 10:30 PM, before bed' });
    }
    return { prefix, suffix };
  }

  function buildActivityRow(act) {
    const row = el('div', 'item-row activity activity-' + act.kind);
    const main = el('div', 'item-main');
    const nameLine = el('div', 'item-name');
    const pill = el('span', 'activity-pill ' + act.kind);
    pill.textContent = act.kind === 'water' ? 'Hydrate' : 'Move';
    nameLine.appendChild(pill);
    nameLine.appendChild(document.createTextNode(act.text));
    main.appendChild(nameLine);
    row.appendChild(main);
    return row;
  }

  function mealTypeClass(meal) {
    const t = (meal.title || '').toLowerCase();
    if (t.includes('wake')) return 'is-wake';
    if (t.includes('breakfast')) return 'is-breakfast';
    if (t.includes('lunch')) return 'is-lunch';
    if (t.includes('dinner')) return 'is-dinner';
    if (t.includes('workout')) return 'is-workout';
    return 'is-snack';
  }
  function mealEyebrow(meal) {
    const t = (meal.title || '').toLowerCase();
    if (t.includes('wake')) return 'Morning hydration';
    if (t.includes('breakfast')) return 'Breakfast';
    if (t.includes('mid-morning')) return 'Snack';
    if (t.includes('lunch') && !t.includes('post-lunch')) return 'Lunch';
    if (t.includes('post-lunch')) return 'After lunch';
    if (t.includes('pre-workout')) return 'Fuel';
    if (t.includes('post-workout')) return 'Recovery';
    if (t.includes('evening')) return 'Evening snack';
    if (t.includes('dinner')) return 'Dinner';
    return 'Meal';
  }

  function buildMealCard(dayKey, mi, meal) {
    const card = el('div', 'meal ' + mealTypeClass(meal));
    card.id = 'meal-' + dayKey + '-' + mi;

    const head = el('div', 'meal-head');
    head.innerHTML =
      '<div class="meal-title-wrap">'
      +   '<div class="meal-eyebrow">' + mealEyebrow(meal) + '</div>'
      +   '<div class="meal-title">' + meal.title + '</div>'
      + '</div>'
      + '<div class="meal-time">' + meal.time + '</div>';
    card.appendChild(head);

    const activities = getMealActivities(meal);
    // pre-meal activities
    activities.prefix.forEach(act => card.appendChild(buildActivityRow(act)));

    meal.items.forEach((it, ii) => {
      const { item, swapped } = getItem(dayKey, mi, ii);
      const row = el('div', 'item-row' + (swapped ? ' swapped' : ''));

      const main = el('div', 'item-main');
      const nameLine = el('div', 'item-name');
      if (item.supp) {
        const pill = el('span', 'supp-pill', 'Supplement');
        nameLine.appendChild(pill);
      }
      nameLine.appendChild(document.createTextNode(item.name));
      if (swapped) {
        const tag = el('span', 'swap-tag', 'swapped');
        nameLine.appendChild(tag);
      }
      main.appendChild(nameLine);

      if (item.p || item.f || item.c) {
        const macros = el('div', 'item-macros');
        macros.innerHTML =
          '<span class="p"><b>' + item.p + '</b>P</span>'
          + '<span class="f"><b>' + item.f + '</b>F</span>'
          + '<span class="c"><b>' + item.c + '</b>C</span>';
        main.appendChild(macros);
      }

      const actions = el('div', 'item-actions');
      if (item.altKey && !item.supp) {
        const btn = el('button', 'swap-btn' + (swapped ? ' restore' : ''));
        btn.textContent = swapped ? 'Reset' : 'Swap';
        btn.addEventListener('click', () => {
          if (swapped) {
            clearSwap(dayKey, mi, ii);
          } else {
            openSwapSheet(dayKey, mi, ii);
          }
        });
        actions.appendChild(btn);
      }

      row.appendChild(main);
      row.appendChild(actions);
      card.appendChild(row);
    });

    // post-meal activities
    activities.suffix.forEach(act => card.appendChild(buildActivityRow(act)));

    // meal macro footer
    const mm = mealMacros(dayKey, mi);
    if (mm.p || mm.f || mm.c) {
      const footer = el('div', 'meal-macros');
      footer.innerHTML =
        '<span class="lead"><b>' + mm.cal + '</b> kcal</span>'
        + '<span>P&nbsp;<b>' + mm.p + '</b>g</span>'
        + '<span>F&nbsp;<b>' + mm.f + '</b>g</span>'
        + '<span>C&nbsp;<b>' + mm.c + '</b>g</span>';
      card.appendChild(footer);
    }

    return card;
  }

  function clearSwap(dayKey, mi, ii) {
    const key = dayKey + '-' + mi + '-' + ii;
    delete state.swaps[key];
    save(STORAGE.swaps, state.swaps);
    renderMeals();
  }

  /* ============================================================
   *  SWAP BOTTOM SHEET
   * ============================================================ */

  const sheet = document.getElementById('bottom-sheet');
  const sheetBackdrop = document.getElementById('sheet-backdrop');
  const sheetTitle = document.getElementById('sheet-title');
  const sheetSub = document.getElementById('sheet-sub');
  const sheetBody = document.getElementById('sheet-body');
  const sheetCancel = document.getElementById('sheet-cancel');

  function openSwapSheet(dayKey, mi, ii) {
    const original = MEAL_PLAN[dayKey][mi].items[ii];
    const alts = ITEM_ALTS[original.altKey] || [];
    const { item: current } = getItem(dayKey, mi, ii);

    sheetTitle.textContent = 'Swap: ' + original.name.split(' + ')[0].split(' (')[0];
    sheetSub.textContent = MEAL_PLAN[dayKey][mi].title + ' · ' + MEAL_PLAN[dayKey][mi].time;

    sheetBody.innerHTML = '';
    alts.forEach(alt => {
      const row = el('button', 'alt-row');
      if (alt.name === current.name) row.classList.add('current');
      row.innerHTML =
        '<span class="alt-name">' + alt.name + '</span>'
        + '<span class="alt-macros">'
        +   '<span style="color:var(--protein)">' + alt.p + 'P</span> · '
        +   '<span style="color:var(--fat)">' + alt.f + 'F</span> · '
        +   '<span style="color:var(--carbs)">' + alt.c + 'C</span>'
        + '</span>';
      row.addEventListener('click', () => {
        applySwap(dayKey, mi, ii, alt);
        closeSheet();
      });
      sheetBody.appendChild(row);
    });

    openSheet();
  }

  function applySwap(dayKey, mi, ii, alt) {
    const key = dayKey + '-' + mi + '-' + ii;
    const original = MEAL_PLAN[dayKey][mi].items[ii];
    if (alt.name === original.name && alt.p === original.p && alt.f === original.f && alt.c === original.c) {
      delete state.swaps[key];
    } else {
      state.swaps[key] = { name: alt.name, p: alt.p, f: alt.f, c: alt.c };
    }
    save(STORAGE.swaps, state.swaps);
    renderMeals();
  }

  function openSheet() {
    sheet.classList.add('open');
    sheetBackdrop.classList.add('open');
    sheet.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet() {
    sheet.classList.remove('open');
    sheetBackdrop.classList.remove('open');
    sheet.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    // tear down any video iframe to stop audio
    setTimeout(() => {
      const iframe = sheetBody.querySelector('iframe');
      if (iframe) iframe.src = '';
    }, 200);
  }
  sheetBackdrop.addEventListener('click', closeSheet);
  sheetCancel.addEventListener('click', closeSheet);

  function openVideoSheet(ex, block) {
    sheetTitle.textContent = ex.name;
    sheetSub.textContent = (block && block.title ? block.title : '') + ' · ' + (ex.sets || '');

    const searchQuery = encodeURIComponent(ex.search || (ex.name + ' form'));
    const ytLink = 'https://www.youtube.com/results?search_query=' + searchQuery;
    const videoIds = Array.isArray(ex.videoIds) ? ex.videoIds.slice()
      : (ex.videoId ? [ex.videoId] : []);

    sheetBody.innerHTML = '';

    // Video container — state is captured in closure variables.
    const vw = el('div', 'video-wrap');
    let activeIdx = 0;
    let loaded = false;

    function renderVideo() {
      vw.innerHTML = '';
      const vid = videoIds[activeIdx];
      if (!vid) {
        const empty = el('div', 'video-thumb');
        empty.style.background = 'var(--grad-primary)';
        empty.innerHTML = '<span class="video-play"></span>';
        vw.appendChild(empty);
        return;
      }
      if (loaded) {
        const iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube-nocookie.com/embed/' + vid
          + '?rel=0&modestbranding=1&autoplay=1&playsinline=1';
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
        iframe.allowFullscreen = true;
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        vw.appendChild(iframe);
      } else {
        const thumbEl = el('button', 'video-thumb');
        thumbEl.style.backgroundImage =
          "url('https://i.ytimg.com/vi/" + vid + "/hqdefault.jpg')";
        thumbEl.innerHTML = '<span class="video-play"></span>';
        thumbEl.addEventListener('click', () => {
          loaded = true;
          renderVideo();
        });
        vw.appendChild(thumbEl);
      }
    }
    renderVideo();
    sheetBody.appendChild(vw);

    // Thumbnail strip — only shown when there are multiple videos.
    // Horizontal-scrollable portrait thumbs; tap one to swap the main player.
    if (videoIds.length > 1) {
      const label = el('div', 'video-strip-label');
      label.innerHTML =
        '<span class="lbl">Form demos</span>'
        + '<span class="count">' + videoIds.length + ' variants</span>';
      sheetBody.appendChild(label);

      const wrap = el('div', 'video-strip-wrap');
      const strip = el('div', 'video-strip');
      videoIds.forEach((vid, i) => {
        const thumb = el('button', 'video-thumb-mini' + (i === activeIdx ? ' active' : ''));
        thumb.style.backgroundImage =
          "url('https://i.ytimg.com/vi/" + vid + "/hqdefault.jpg')";
        thumb.setAttribute('aria-label', 'Demo ' + (i + 1));
        thumb.innerHTML =
          '<span class="mini-num">' + (i + 1) + '</span>'
          + '<span class="mini-play"></span>';
        thumb.addEventListener('click', () => {
          if (i === activeIdx) return;
          activeIdx = i;
          strip.querySelectorAll('.video-thumb-mini').forEach((t, ti) => {
            t.classList.toggle('active', ti === activeIdx);
          });
          // If a video is already loaded, swap to the new one; else keep
          // the tap-to-play thumb showing the newly-selected variant.
          renderVideo();
          // Scroll the tapped thumb fully into view on the strip.
          thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        });
        strip.appendChild(thumb);
      });
      wrap.appendChild(strip);
      sheetBody.appendChild(wrap);
    }

    // meta chips
    const meta = el('div', 'video-meta');
    if (ex.sets) meta.appendChild(el('span', 'video-chip strong', ex.sets));
    if (ex.rest && ex.rest !== '—') meta.appendChild(el('span', 'video-chip', 'rest ' + ex.rest));
    sheetBody.appendChild(meta);

    // cues
    if (ex.cues && ex.cues.length) {
      const label = el('div', 'section-label');
      label.textContent = 'Form cues';
      label.style.margin = '14px 2px 4px';
      sheetBody.appendChild(label);
      const ul = el('ul', 'cues-list');
      ex.cues.forEach(c => ul.appendChild(el('li', null, c)));
      sheetBody.appendChild(ul);
    }

    // description fallback
    if (!ex.cues && ex.desc) {
      const p = el('p');
      p.style.marginTop = '12px';
      p.style.color = 'var(--text-2)';
      p.textContent = ex.desc;
      sheetBody.appendChild(p);
    }

    // YouTube search link (fallback + for alternative demos)
    const link = document.createElement('a');
    link.className = 'yt-link';
    link.href = ytLink;
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = 'Search more demos on YouTube';
    sheetBody.appendChild(link);

    openSheet();
  }

  /* ============================================================
   *  EXERCISE TAB
   * ============================================================ */

  function renderExercise() {
    const root = document.getElementById('view-exercise');
    root.innerHTML = '';

    const today = todayDayKey();
    const todayIso = todayISO();
    const dayType = DAYS.find(d => d.key === today).type;

    // Today's session note
    const todayCard = el('div', 'card');
    const todayEntry = EXERCISE_WEEK.find(w => w.key === today);
    todayCard.innerHTML =
      '<div class="section-label" style="margin:0 0 6px">Today</div>'
      + '<h2>' + todayEntry.session + '</h2>'
      + '<p class="muted small">' + todayEntry.duration + ' · ' + todayEntry.time + '</p>';
    root.appendChild(todayCard);

    // Weekly schedule
    const wkCard = el('div', 'card');
    wkCard.innerHTML = '<h2>Weekly schedule</h2>';
    const table = el('table', 'week-table');
    table.innerHTML =
      '<thead><tr><th>Day</th><th>Session</th><th>Time</th></tr></thead>';
    const tbody = el('tbody');
    EXERCISE_WEEK.forEach(w => {
      const tr = el('tr');
      if (w.key === today) tr.classList.add('today');
      const dayName = DAYS.find(x => x.key === w.key).short;
      tr.innerHTML =
        '<td>' + dayName + '</td>'
        + '<td>' + w.session + '</td>'
        + '<td class="muted small">' + w.time + '</td>';
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wkCard.appendChild(table);
    root.appendChild(wkCard);

    // Pre / Post workout rules
    const rules = el('div', 'tip-box tips');
    rules.innerHTML =
      '<h3>Pre / Post workout</h3>'
      + '<ul>'
      +   '<li><b>Before lifting (45–60 min):</b> 150ml black coffee + 1 apple OR 1 banana</li>'
      +   '<li><b>After lifting (within 60 min):</b> 60g whey (2 scoops) + 250ml toned milk — non-negotiable</li>'
      +   '<li><b>Thyroid caution:</b> only progress weight if no palpitations, chest tightness, or excess fatigue</li>'
      + '</ul>';
    root.appendChild(rules);

    // Pick today's session block to show first
    const blocks = [];
    if (dayType === 'strength') {
      // Mon/Fri → A, Wed → B
      if (today === 'wed') blocks.push(STRENGTH_B, STRENGTH_A);
      else blocks.push(STRENGTH_A, STRENGTH_B);
    } else if (today === 'sat') {
      blocks.push(SATURDAY_LONG, STRENGTH_A, STRENGTH_B, CARDIO_DAY);
    } else if (dayType === 'cardio') {
      blocks.push(CARDIO_DAY, STRENGTH_A, STRENGTH_B, SATURDAY_LONG);
    } else {
      blocks.push(STRENGTH_A, STRENGTH_B, CARDIO_DAY, SATURDAY_LONG);
    }

    blocks.forEach((block) => {
      root.appendChild(buildExerciseBlock(block, todayIso));
    });
  }

  function buildExerciseBlock(block, todayIso) {
    const card = el('div', 'card ex-card');
    card.innerHTML =
      '<div class="meta">' + block.meta + '</div>'
      + '<h3>' + block.title + '</h3>';
    if (block.warmup) {
      const w = el('div', 'warmup-note', block.warmup);
      card.appendChild(w);
    }
    block.exercises.forEach((ex, i) => {
      const rowKey = workoutKey(todayIso, block.id, i);
      const done = !!state.workouts[rowKey];
      const row = el('div', 'ex-row' + (done ? ' done' : ''));

      const check = el('button', 'ex-check' + (done ? ' done' : ''));
      check.setAttribute('aria-label', 'Mark done');
      check.addEventListener('click', () => {
        if (state.workouts[rowKey]) delete state.workouts[rowKey];
        else state.workouts[rowKey] = true;
        save(STORAGE.workouts, state.workouts);
        renderExercise();
      });

      const body = el('div', 'ex-body');
      body.innerHTML =
        '<div class="ex-name">' + ex.name + '</div>'
        + '<div class="ex-desc">' + ex.desc + '</div>'
        + '<div class="ex-sets">' + ex.sets + (ex.rest && ex.rest !== '—' ? ' · rest ' + ex.rest : '') + '</div>';

      row.appendChild(check);
      row.appendChild(body);

      if (ex.videoId || ex.search) {
        const demo = el('button', 'ex-demo');
        demo.setAttribute('aria-label', 'Watch demo');
        demo.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        demo.addEventListener('click', (e) => {
          e.stopPropagation();
          openVideoSheet(ex, block);
        });
        row.appendChild(demo);
      }

      card.appendChild(row);
    });
    if (block.cooldown) {
      const c = el('div', 'warmup-note', block.cooldown);
      c.style.marginTop = '8px';
      c.style.marginBottom = '0';
      card.appendChild(c);
    }
    return card;
  }

  /* ============================================================
