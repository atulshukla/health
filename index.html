<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Atul Health">
<meta name="theme-color" content="#1a4d7a">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a4d7a'/><path d='M90 138 L52 100 a22 22 0 1 1 31-31 l7 7 7-7 a22 22 0 1 1 31 31 Z' fill='%23ffffff'/></svg>">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231a4d7a'/><path d='M90 138 L52 100 a22 22 0 1 1 31-31 l7 7 7-7 a22 22 0 1 1 31 31 Z' fill='%23ffffff'/></svg>">
<title>Atul Health</title>
<style>
  :root {
    /* Cool + warm palette — navy primary, coral accent */
    --primary:      #0a2540;
    --primary-2:    #163a61;
    --primary-3:    #1f5a9a;
    --primary-soft: #eaf1fa;
    --primary-tint: #f4f8fc;

    --accent:       #ff7a59;
    --accent-2:     #ff9b7a;
    --accent-soft:  #fff0eb;

    /* Macro colors — softer, friendlier */
    --protein:      #f26464;
    --protein-2:    #ff8f8f;
    --fat:          #f5a05e;
    --fat-2:        #ffbc85;
    --carbs:        #5b8def;
    --carbs-2:      #8fb2ff;

    --green:        #3ab569;
    --green-2:      #5fd38c;
    --yellow:       #f2c94c;
    --red:          #ef5a5a;
    --purple:       #8e5fc9;

    /* Warm-tinted surfaces (not sterile cool gray) */
    --bg:           #f4f6fa;
    --bg-deep:      #ebeff5;
    --bg-warm:      #faf7f4;
    --card:         #ffffff;
    --card-alt:     #fbfcfd;

    --text:         #0e1a2b;
    --text-2:       #2d3b4e;
    --muted:        #64748b;
    --muted-2:      #9aa5b3;
    --border:       #e6ebf1;
    --border-strong:#d0d8e2;

    /* Layered shadows for depth without drama */
    --shadow-xs: 0 1px 2px rgba(12, 30, 55, 0.05);
    --shadow-sm: 0 1px 2px rgba(12, 30, 55, 0.05), 0 2px 6px rgba(12, 30, 55, 0.04);
    --shadow-md: 0 2px 8px rgba(12, 30, 55, 0.06), 0 10px 28px rgba(12, 30, 55, 0.06);
    --shadow-lg: 0 6px 18px rgba(12, 30, 55, 0.08), 0 18px 40px rgba(12, 30, 55, 0.10);

    --nav-h: 68px;
    --header-h: 58px;
    --radius-xs: 8px;
    --radius-sm: 12px;
    --radius:    16px;
    --radius-lg: 20px;
    --radius-xl: 26px;

    --grad-primary: linear-gradient(135deg, #163a61 0%, #1f5a9a 55%, #2a7bc9 100%);
    --grad-accent:  linear-gradient(135deg, #ff7a59 0%, #ff9b7a 100%);
    --grad-bg:      radial-gradient(1200px 600px at 10% -10%, #eaf1fa 0%, transparent 60%),
                    radial-gradient(800px 500px at 110% 10%, #fff0eb 0%, transparent 50%),
                    linear-gradient(180deg, #f4f6fa 0%, #f4f6fa 100%);

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* Keep old name alias so older rules don't break before they're updated */
  :root { --primary-dark: var(--primary); }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    color: var(--text);
    background: var(--bg);
  }
  body {
    background: var(--grad-bg) fixed;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
    min-height: 100vh;
    min-height: 100dvh;
  }
  h1, h2, h3 { letter-spacing: -0.02em; }
  input, select, textarea, button { font: inherit; color: inherit; }
  button { background: none; border: 0; padding: 0; cursor: pointer; }
  input { font-size: 16px; } /* prevent iOS zoom */

  /* ===== Header ===== */
  .app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding-top: var(--safe-top);
    background: var(--grad-primary);
    color: #fff;
    z-index: 10;
    box-shadow: 0 4px 14px rgba(10, 37, 64, 0.18);
  }
  .app-header::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -20px;
    height: 20px;
    background: linear-gradient(to bottom, rgba(10,37,64,0.05), transparent);
    pointer-events: none;
  }
  .app-header-inner {
    height: var(--header-h);
    display: flex;
    align-items: center;
    padding: 0 14px 0 18px;
    gap: 10px;
  }
  .app-header-left {
    flex: 1;
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
  }
  .app-header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .app-header .subtitle {
    font-size: 13px;
    opacity: 0.82;
    font-weight: 500;
    letter-spacing: 0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .header-btn {
    width: 38px;
    height: 38px;
    border-radius: 11px;
    background: rgba(255, 255, 255, 0.14);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .header-btn svg {
    width: 20px; height: 20px;
  }
  .header-btn:active {
    background: rgba(255, 255, 255, 0.26);
    transform: scale(0.94);
  }
  .header-btn.active {
    background: rgba(255, 255, 255, 0.28);
    box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.35);
  }

  /* ===== Main ===== */
  main {
    padding-top: calc(var(--header-h) + var(--safe-top));
    padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
    min-height: 100vh;
    min-height: 100dvh;
  }
  .view { display: none; padding: 14px 16px 0; }
  .view.active { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== Generic card ===== */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
  }
  .card h2 { margin: 0 0 8px; font-size: 17px; font-weight: 700; letter-spacing: -0.02em; }
  .card h3 { margin: 0 0 6px; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin: 16px 2px 8px;
    font-weight: 700;
  }

  /* ===== Day selector pills ===== */
  .day-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 4px 16px 12px;
    margin: 0 -16px;
    scrollbar-width: none;
  }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-pill {
    flex: 0 0 auto;
    min-width: 62px;
    min-height: 76px;
    padding: 10px 8px;
    border-radius: var(--radius);
    background: var(--card);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--muted);
    font-weight: 600;
    box-shadow: var(--shadow-xs);
    transition: transform 0.15s ease, box-shadow 0.2s ease;
  }
  .day-pill:active { transform: scale(0.96); }
  .day-pill .d {
    font-size: 10.5px;
    letter-spacing: 0.9px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--muted-2);
  }
  .day-pill .n { font-size: 20px; line-height: 1; color: var(--text); }
  .day-pill.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(255, 122, 89, 0.12);
  }
  .day-pill.today .d { color: var(--accent); }
  .day-pill.active {
    background: var(--grad-primary);
    border-color: transparent;
    color: #fff;
    box-shadow: var(--shadow-md), 0 8px 20px rgba(31, 90, 154, 0.28);
    transform: translateY(-1px);
  }
  .day-pill.active .d { color: rgba(255,255,255,0.82); }
  .day-pill.active .n { color: #fff; }
  .day-pill.today.active {
    box-shadow: var(--shadow-md), 0 0 0 3px rgba(255, 122, 89, 0.22);
  }

  /* ===== Day header ===== */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 4px 2px 14px;
  }
  .day-header .day-name {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .day-header .day-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 2px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge.strength { background: #fde8e4; color: #c94a35; }
  .badge.cardio   { background: #e2efff; color: #2563a8; }
  .badge.rest     { background: #f0e6f9; color: #6c3a9e; }

  /* ===== Macro card ===== */
  .macro-card {
    padding: 20px;
    background:
      radial-gradient(600px 200px at 100% -10%, rgba(255,122,89,0.08), transparent 60%),
      var(--card);
    position: relative;
    overflow: hidden;
  }
  .macro-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .macro-cal-wrap { line-height: 1; }
  .macro-cal-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .macro-cal {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, var(--text) 0%, #2d3b4e 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .macro-cal .unit {
    font-size: 14px;
    color: var(--muted);
    font-weight: 600;
    margin-left: 6px;
    -webkit-text-fill-color: var(--muted);
  }
  .macro-target {
    text-align: right;
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }
  .macro-target .big {
    display: block;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-bottom: 2px;
  }
  .macro-row {
    display: grid;
    grid-template-columns: 62px 1fr 82px;
    gap: 12px;
    align-items: center;
    margin-top: 12px;
  }
  .macro-name {
    font-size: 11.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }
  .macro-bar {
    height: 10px;
    background: var(--bg-deep);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .macro-fill {
    height: 100%;
    width: 0;
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.2,0.8,0.3,1);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.3);
  }
  .macro-value {
    font-size: 12.5px;
    font-weight: 600;
    text-align: right;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .macro-value .cur {
    color: var(--text);
    font-weight: 700;
  }
  .macro-fill.fill-protein { background: linear-gradient(90deg, var(--protein) 0%, var(--protein-2) 100%); }
  .macro-fill.fill-fat     { background: linear-gradient(90deg, var(--fat) 0%, var(--fat-2) 100%); }
  .macro-fill.fill-carbs   { background: linear-gradient(90deg, var(--carbs) 0%, var(--carbs-2) 100%); }

  /* ===== Meal card ===== */
  .meal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
  }
  .meal::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--border);
    border-radius: 4px 0 0 4px;
  }
  .meal.is-breakfast::before { background: linear-gradient(180deg, var(--fat), var(--fat-2)); }
  .meal.is-lunch::before     { background: linear-gradient(180deg, var(--carbs), var(--carbs-2)); }
  .meal.is-dinner::before    { background: linear-gradient(180deg, var(--primary-2), var(--primary-3)); }
  .meal.is-snack::before     { background: linear-gradient(180deg, var(--green), var(--green-2)); }
  .meal.is-workout::before   { background: linear-gradient(180deg, var(--protein), var(--protein-2)); }
  .meal.is-wake::before      { background: linear-gradient(180deg, var(--accent), var(--accent-2)); }

  .meal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
  }
  .meal-title-wrap { display: flex; flex-direction: column; }
  .meal-eyebrow {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 3px;
  }
  .meal-title {
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.02em;
  }
  .meal-time {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    background: var(--bg);
    padding: 4px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }

  .meal-macros {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }
  .meal-macros span b { color: var(--text); font-weight: 700; font-variant-numeric: tabular-nums; }
  .meal-macros .lead b { font-size: 14px; }

  .item-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    min-height: 48px;
  }
  .item-row:last-of-type { border-bottom: 0; }
  .item-main { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14.5px;
    line-height: 1.4;
    word-break: break-word;
    color: var(--text-2);
  }
  .item-name .swap-tag {
    display: inline-block;
    font-size: 9.5px;
    font-weight: 800;
    color: var(--primary-3);
    background: var(--primary-soft);
    padding: 2px 7px;
    border-radius: 5px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    vertical-align: 1px;
  }
  .item-row.swapped .item-name { color: var(--primary-3); font-weight: 600; }
  .item-macros {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 4px;
    font-variant-numeric: tabular-nums;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .item-macros b { font-weight: 700; }
  .item-macros .p b { color: var(--protein); }
  .item-macros .f b { color: var(--fat); }
  .item-macros .c b { color: var(--carbs); }

  .item-actions {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-shrink: 0;
  }
  .swap-btn {
    min-height: 34px;
    padding: 7px 13px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    background: var(--primary-soft);
    color: var(--primary-3);
    letter-spacing: 0.01em;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .swap-btn:active { transform: scale(0.94); background: #d9e7f5; }
  .swap-btn.restore { background: #fde8e4; color: #c94a35; }
  .swap-btn.restore:active { background: #fad4cc; }

  .supp-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.5px;
    background: linear-gradient(135deg, #f0e6fb, #e4d6f5);
    color: var(--purple);
    text-transform: uppercase;
    margin-right: 7px;
    vertical-align: 1px;
  }
  .supp-pill::before {
    content: "💊";
    font-size: 9px;
  }

  /* Optional + skipped meal states */
  .optional-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    background: #fff2ea;
    color: #c94a35;
    margin-left: 6px;
    vertical-align: 1px;
  }
  .meal.is-optional {
    background: var(--card-alt);
  }
  .meal.is-optional .meal-title {
    color: var(--text-2);
    font-weight: 700;
  }
  /* Skipped — dim everything except the skip button so undo stays tappable */
  .meal.is-skipped .meal-head,
  .meal.is-skipped .item-row,
  .meal.is-skipped .meal-macros {
    opacity: 0.42;
  }
  .meal.is-skipped .meal-title { text-decoration: line-through; }
  .meal.is-skipped::before { opacity: 0.3; }
  .meal-skip-row {
    display: flex;
    justify-content: center;
    padding: 10px 0 2px;
    margin-top: 6px;
    border-top: 1px dashed var(--border);
  }
  .skip-btn {
    background: transparent;
    border: 1px solid var(--border-strong);
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 10px;
    font-size: 12.5px;
    font-weight: 700;
    min-height: 36px;
    transition: background 0.15s ease, transform 0.1s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .skip-btn:active {
    transform: scale(0.96);
    background: var(--bg);
  }
  .skip-btn.undo {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Eating-order banner on lunch card */
  .eating-order-banner {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: linear-gradient(135deg, #fef9e7 0%, #fffdf5 100%);
    border: 1px solid rgba(242, 201, 76, 0.36);
    border-radius: 10px;
    margin: 2px 0 10px;
    font-size: 12.5px;
    color: #7a5a0c;
    line-height: 1.45;
  }
  .eating-order-banner .eo-icon { font-size: 14px; flex: 0 0 auto; line-height: 1.2; }
  .eating-order-banner b { color: #5a4400; font-weight: 800; }

  /* Post-lunch energy tracker card */
  .plenergy-current {
    text-align: right;
    line-height: 1;
  }
  .plenergy-current .plenergy-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--muted-2);
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .plenergy-current.has .plenergy-num {
    color: var(--primary-3);
  }
  .plenergy-current .plenergy-unit {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-left: 4px;
  }
  .plenergy-scale {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    margin: 12px 0 10px;
  }
  .plenergy-btn {
    min-height: 42px;
    border-radius: 9px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-size: 13.5px;
    font-weight: 800;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
  }
  .plenergy-btn:active { transform: scale(0.92); }
  .plenergy-btn.active.band-low  { background: var(--red);    border-color: var(--red);    color: #fff; }
  .plenergy-btn.active.band-mid  { background: var(--yellow); border-color: var(--yellow); color: #5a4700; }
  .plenergy-btn.active.band-high { background: var(--green);  border-color: var(--green);  color: #fff; }
  .plenergy-spark {
    width: 100%;
    height: 64px;
    display: block;
    margin-top: 4px;
  }
  .plenergy-caption {
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 600;
    text-align: center;
    margin-top: 4px;
  }
  .plenergy-caption b { color: var(--text); font-weight: 800; }

  /* Activity rows (water-before / walk-after meals) */
  .item-row.activity {
    padding: 9px 0;
    border-bottom: 1px dashed var(--border);
    min-height: 0;
  }
  .item-row.activity .item-name {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.4;
  }
  .activity-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-right: 7px;
    vertical-align: 1px;
  }
  .activity-pill.water {
    background: linear-gradient(135deg, #e2efff, #cfe4ff);
    color: #2563a8;
  }
  .activity-pill.water::before {
    content: "💧";
    font-size: 9px;
  }
  .activity-pill.walk {
    background: linear-gradient(135deg, #d9f2e2, #c2ecd0);
    color: #1e6b3d;
  }
  .activity-pill.walk::before {
    content: "🚶";
    font-size: 10px;
  }

  /* ===== Bottom nav ===== */
  .bottom-nav {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: rgba(255,255,255,0.78);
    backdrop-filter: saturate(180%) blur(24px);
    -webkit-backdrop-filter: saturate(180%) blur(24px);
    border-top: 1px solid rgba(230, 235, 241, 0.7);
    padding: 6px 10px calc(4px + var(--safe-bottom));
    z-index: 20;
    box-shadow: 0 -8px 24px rgba(12, 30, 55, 0.04);
  }
  .bottom-nav button {
    height: var(--nav-h);
    min-height: 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    color: var(--muted-2);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.2px;
    border-radius: 14px;
    transition: color 0.15s ease, transform 0.1s ease, background 0.2s ease;
  }
  .bottom-nav button svg {
    width: 24px; height: 24px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .bottom-nav button.active {
    color: var(--primary-3);
    background: var(--primary-soft);
  }
  .bottom-nav button.active svg {
    stroke-width: 2.2;
  }
  .bottom-nav button:active { transform: scale(0.92); }

  /* Subtle accent for the central Today tab — slightly bolder stroke
     and a warm highlight when active, so the "home" feels anchoring
     without needing a floating button. */
  .bottom-nav button.is-today svg {
    stroke-width: 2.1;
  }
  .bottom-nav button.is-today.active {
    color: var(--accent);
    background: var(--accent-soft);
  }
  .bottom-nav button.is-today.active svg {
    stroke-width: 2.3;
  }

  /* ===== Today view ===== */
  .today-header {
    padding: 6px 2px 14px;
  }
  .today-eyebrow {
    font-size: 11.5px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .today-greeting {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin: 0 0 10px;
    line-height: 1.1;
  }
  .today-header .badge {
    margin-top: 2px;
  }

  .today-next {
    background: var(--grad-primary);
    color: #fff;
    padding: 18px 20px;
    border: 0;
    width: 100%;
    text-align: left;
    display: block;
    box-shadow: 0 6px 20px rgba(10, 37, 64, 0.25), 0 12px 36px rgba(31, 90, 154, 0.18);
    transition: transform 0.12s ease;
    margin-bottom: 14px;
    border-radius: var(--radius);
    position: relative;
    overflow: hidden;
  }
  .today-next:active { transform: scale(0.99); }
  .today-next::before {
    content: "";
    position: absolute;
    right: -40px; top: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255, 122, 89, 0.4), transparent 60%);
    pointer-events: none;
  }
  .next-label {
    font-size: 10.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    opacity: 0.85;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .next-time {
    font-size: 12.5px;
    opacity: 0.85;
    font-weight: 700;
    margin-bottom: 6px;
    font-variant-numeric: tabular-nums;
  }
  .next-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.25;
  }
  .next-sub {
    font-size: 13px;
    opacity: 0.9;
    margin-top: 6px;
    line-height: 1.4;
  }

  /* Hydration progress card (assumes user follows the water schedule) */
  .hydration-card {
    background:
      radial-gradient(500px 200px at 100% -20%, rgba(91, 141, 239, 0.15), transparent 60%),
      linear-gradient(180deg, #eef4fc 0%, #ffffff 100%);
    position: relative;
    overflow: hidden;
    padding: 16px 18px 14px;
    border: 1px solid rgba(91, 141, 239, 0.16);
  }
  .hydration-card::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--carbs), var(--carbs-2));
  }
  .hydro-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .hydro-title {
    font-size: 11.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.9px;
    color: var(--carbs);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hydro-icon { font-size: 14px; }
  .hydro-pct {
    font-size: 13px;
    font-weight: 800;
    color: var(--carbs);
    font-variant-numeric: tabular-nums;
    background: rgba(91, 141, 239, 0.14);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .hydro-pct.done {
    color: var(--green);
    background: rgba(58, 181, 105, 0.14);
  }
  .hydro-totals {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .hydro-current {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .hydro-unit {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
  }
  .hydro-sep { color: var(--border-strong); font-weight: 500; margin: 0 2px; }
  .hydro-target {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
  }
  .hydro-bar {
    height: 10px;
    background: rgba(91, 141, 239, 0.14);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 10px;
    position: relative;
  }
  .hydro-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--carbs), var(--carbs-2));
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.2,0.8,0.3,1);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.4);
  }
  .hydro-ticks {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }
  .hydro-tick {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(255, 255, 255, 0.55);
    transform: translateX(-1px);
  }
  .hydro-sub {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .hydro-sub .hydro-left b { color: var(--text); font-weight: 800; }
  .hydro-sub .hydro-slots-text { font-variant-numeric: tabular-nums; }
  .hydro-next {
    font-size: 12.5px;
    color: var(--muted-2);
    font-weight: 600;
    padding-top: 8px;
    border-top: 1px solid rgba(91, 141, 239, 0.16);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .hydro-next b {
    color: var(--carbs);
    font-weight: 800;
  }
  .hydro-next .next-time-chip {
    background: rgba(91, 141, 239, 0.12);
    color: var(--carbs);
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hydro-done-banner {
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(58, 181, 105, 0.12);
    color: #1e6b3d;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
  }

  /* Timeline */
  .today-tl-card { padding: 14px 10px 8px; }
  .today-tl-card h2 { margin: 4px 6px 10px; }
  .timeline { display: flex; flex-direction: column; }
  .tl-item {
    display: grid;
    grid-template-columns: 66px 20px 1fr;
    gap: 0;
    align-items: stretch;
    padding: 0;
    background: transparent;
    border: 0;
    text-align: left;
    width: 100%;
    cursor: pointer;
    position: relative;
  }
  .tl-item:not(:last-child) .tl-line::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 22px;
    bottom: -6px;
    width: 2px;
    background: var(--border);
    transform: translateX(-50%);
  }
  .tl-time {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    padding-top: 16px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    padding-right: 10px;
    letter-spacing: 0.02em;
  }
  .tl-line {
    position: relative;
    display: flex;
    justify-content: center;
  }
  .tl-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--border-strong);
    margin-top: 14px;
    z-index: 1;
    position: relative;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 1px var(--border-strong);
    transition: all 0.2s ease;
  }
  .tl-content {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 12px;
    border-radius: 12px;
    background: var(--card);
    margin: 6px 0 6px 6px;
    border: 1px solid var(--border);
    transition: background 0.15s ease, transform 0.1s ease;
  }
  .tl-item:active .tl-content { transform: scale(0.98); }
  .tl-icon { font-size: 18px; line-height: 1; flex: 0 0 auto; }
  .tl-text { flex: 1; min-width: 0; }
  .tl-title {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.01em;
  }
  .tl-sub {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.35;
  }
  .tl-arrow {
    font-size: 20px;
    color: var(--muted-2);
    font-weight: 400;
    padding: 0 2px;
    flex: 0 0 auto;
  }

  /* Type-specific dot colors */
  .tl-item.type-water .tl-dot    { background: var(--carbs);  box-shadow: 0 0 0 1px var(--carbs); }
  .tl-item.type-meal .tl-dot     { background: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .tl-item.type-walk .tl-dot     { background: var(--green);  box-shadow: 0 0 0 1px var(--green); }
  .tl-item.type-workout .tl-dot  { background: var(--protein); box-shadow: 0 0 0 1px var(--protein); }
  .tl-item.type-supp .tl-dot     { background: var(--purple); box-shadow: 0 0 0 1px var(--purple); }

  /* Past → faded */
  .tl-item.past .tl-content { background: transparent; border-color: transparent; }
  .tl-item.past .tl-time,
  .tl-item.past .tl-title,
  .tl-item.past .tl-sub,
  .tl-item.past .tl-icon { opacity: 0.45; }
  .tl-item.past .tl-dot {
    background: var(--border-strong);
    box-shadow: 0 0 0 1px var(--border-strong);
  }

  /* Now → highlighted with pulse */
  .tl-item.now .tl-content {
    background: var(--accent-soft);
    border-color: var(--accent);
    box-shadow: 0 4px 14px rgba(255, 122, 89, 0.18);
  }
  .tl-item.now .tl-title { color: #a93e25; }
  .tl-item.now .tl-time {
    color: var(--accent);
    font-weight: 800;
  }
  .tl-item.now .tl-dot {
    transform: scale(1.25);
    animation: tlPulse 2s ease-in-out infinite;
  }
  @keyframes tlPulse {
    0%, 100% { box-shadow: 0 0 0 1px var(--accent), 0 0 0 4px rgba(255, 122, 89, 0.25); }
    50%      { box-shadow: 0 0 0 1px var(--accent), 0 0 0 10px rgba(255, 122, 89, 0.03); }
  }

  /* No nav — timeline without pointer hand if non-navigable */
  .tl-item.no-nav { cursor: default; }
  .tl-item.no-nav .tl-arrow { display: none; }

  /* Optional timeline items (Simple Mode mid-morning / 2 PM chaas / 5 PM snack) */
  .tl-item.is-optional .tl-content {
    background: var(--bg);
    border-style: dashed;
  }
  .tl-item.is-optional .tl-title { color: var(--muted); }
  .tl-item.is-optional.past .tl-title,
  .tl-item.is-optional.past .tl-sub { opacity: 0.35; }
  .tl-opt-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: var(--accent-soft);
    color: var(--accent);
    margin-left: 5px;
    vertical-align: 1px;
  }
  .today-next.is-optional::before { display: none; }
  .today-next.is-optional {
    background: linear-gradient(135deg, #334155 0%, #475569 100%);
  }
  .next-opt-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    background: rgba(255, 255, 255, 0.18);
    color: #fff;
    margin-left: 4px;
  }

  /* Sleep row — purple accent */
  .tl-item.type-sleep .tl-dot {
    background: #6b5fc9;
    box-shadow: 0 0 0 1px #6b5fc9;
  }

  /* ===== Today timeline: shift feature ===== */
  .today-tl-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin: 4px 6px 10px;
  }
  .today-tl-head h2 { margin: 0; }
  .tl-reset-btn {
    padding: 6px 11px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--muted);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .tl-reset-btn:active { background: var(--bg); }

  .tl-shift-info {
    margin: 0 8px 10px;
    padding: 8px 12px;
    background: var(--primary-soft);
    border-left: 3px solid var(--primary-3);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-2);
    line-height: 1.4;
  }
  .tl-shift-info .tl-warn-count {
    color: #b35d00;
    font-weight: 700;
  }
  .tl-warnings {
    margin: -4px 8px 12px;
    padding: 8px 12px;
    background: #fff8ec;
    border-left: 3px solid var(--yellow);
    border-radius: 8px;
    font-size: 12px;
    color: #8a6400;
  }
  .tl-warn-row { line-height: 1.45; padding: 2px 0; }
  .tl-warn-row + .tl-warn-row { border-top: 1px dashed rgba(138, 100, 0, 0.2); margin-top: 3px; padding-top: 5px; }

  /* Time column — shows current + original if shifted */
  .tl-time-col {
    padding-top: 12px;
    padding-right: 10px;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .tl-time-new {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
  }
  .tl-time-was {
    font-size: 9.5px;
    font-weight: 600;
    color: var(--muted-2);
    text-decoration: line-through;
    text-decoration-color: var(--muted-2);
    opacity: 0.75;
  }

  /* Shifted highlight */
  .tl-item.is-shifted .tl-content {
    border-color: var(--primary-3);
    box-shadow: inset 3px 0 0 var(--primary-3);
  }
  .tl-item.is-shifted .tl-time-new { color: var(--primary-3); }
  .tl-item.is-shifted.now .tl-time-new { color: var(--accent); }

  /* Anchor pill + anchored row */
  .tl-anchor-pill {
    display: inline-block;
    margin-left: 5px;
    font-size: 10px;
    vertical-align: 1px;
    opacity: 0.65;
  }
  .tl-item.is-anchor .tl-content {
    background: var(--bg);
    border-style: dashed;
  }

  /* Shift button (per row) */
  .tl-shift-btn {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--muted);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease, color 0.15s ease;
    padding: 0;
  }
  .tl-shift-btn:active { background: var(--primary-soft); transform: scale(0.92); }
  .tl-item.is-shifted .tl-shift-btn {
    background: var(--primary-soft);
    color: var(--primary-3);
    border-color: var(--primary-3);
  }
  .tl-item.past .tl-shift-btn { opacity: 0.35; }

  /* ===== Shift bottom-sheet ===== */
  .shift-sheet {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 14px 14px 4px;
  }
  .shift-input-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .shift-label {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .shift-input {
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--text);
    min-height: 48px;
    letter-spacing: 0.02em;
  }
  .shift-input:focus {
    outline: none;
    border-color: var(--primary-3);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .shift-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .shift-chip {
    flex: 1 0 auto;
    min-width: 60px;
    min-height: 40px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--text-2);
    font-size: 13px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .shift-chip:active {
    background: var(--primary-soft);
    color: var(--primary-3);
    border-color: var(--primary-3);
  }

  .shift-preview {
    padding: 12px 14px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.45;
    min-height: 46px;
  }
  .shift-hint { color: var(--muted); font-size: 12.5px; }
  .shift-delta {
    font-weight: 700;
    color: var(--primary-3);
    margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
  .shift-warn {
    color: #8a6400;
    background: #fff8ec;
    padding: 6px 10px;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 12px;
    line-height: 1.45;
  }
  .shift-ok {
    color: #1a7d45;
    background: #e6f5ec;
    padding: 6px 10px;
    border-radius: 8px;
    margin-top: 6px;
    font-size: 12px;
    font-weight: 600;
  }

  .shift-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 4px 0 0;
  }
  .btn-primary.shift-apply {
    width: 100%;
    min-height: 48px;
    padding: 12px;
    border-radius: 12px;
    border: 0;
    background: linear-gradient(135deg, var(--primary-3), var(--primary-2));
    color: #fff;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 0.01em;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(31, 90, 154, 0.22);
  }
  .btn-primary.shift-apply:active { transform: scale(0.99); }
  .btn-secondary.shift-reset {
    width: 100%;
    min-height: 44px;
    padding: 11px;
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    background: #fff;
    color: var(--muted);
    font-weight: 700;
    font-size: 13.5px;
    cursor: pointer;
  }
  .btn-secondary.shift-reset:active { background: var(--bg); }

  /* ===== Bottom sheet ===== */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(10, 25, 47, 0.42);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.24s ease;
    z-index: 40;
  }
  .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
  .bottom-sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    background: var(--card);
    border-top-left-radius: var(--radius-xl);
    border-top-right-radius: var(--radius-xl);
    padding: 8px 0 calc(14px + var(--safe-bottom));
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(0.2,0.8,0.2,1);
    z-index: 50;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -12px 40px rgba(12, 30, 55, 0.2);
  }
  .bottom-sheet.open { transform: translateY(0); }
  .sheet-handle {
    width: 44px;
    height: 5px;
    border-radius: 3px;
    background: var(--border-strong);
    margin: 8px auto 12px;
  }
  .sheet-head {
    padding: 4px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sheet-title { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; }
  .sheet-sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; font-weight: 500; }
  .sheet-body {
    padding: 8px 10px 4px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .alt-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 14px;
    border-radius: 12px;
    min-height: 56px;
    transition: background 0.15s ease;
    text-align: left;
    width: 100%;
  }
  .alt-row:active { background: var(--primary-soft); }
  .alt-name {
    font-size: 14.5px;
    font-weight: 500;
    flex: 1;
    padding-right: 12px;
    color: var(--text-2);
  }
  .alt-macros {
    font-size: 11.5px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    white-space: nowrap;
  }
  .alt-row.current {
    background: var(--primary-soft);
  }
  .alt-row.current .alt-name {
    color: var(--primary-3);
    font-weight: 700;
  }
  .alt-row.current .alt-name::before {
    content: "✓ ";
    color: var(--primary-3);
    font-weight: 800;
  }
  .sheet-foot {
    padding: 10px 16px 4px;
    border-top: 1px solid var(--border);
  }
  .ghost-btn {
    width: 100%;
    min-height: 46px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #fff;
    font-weight: 700;
    color: var(--muted);
  }
  .ghost-btn:active { background: var(--bg); }

  /* ===== Exercise ===== */
  .week-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .week-table th, .week-table td {
    padding: 10px 8px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .week-table tr:last-child td { border-bottom: 0; }
  .week-table th {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--muted);
    font-weight: 800;
    padding-top: 0;
  }
  .week-table tr.today td {
    background: var(--accent-soft);
  }
  .week-table tr.today td:first-child { color: var(--accent); font-weight: 800; }
  .week-table td:first-child { font-weight: 700; }

  .ex-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    min-height: 60px;
  }
  .ex-row:last-child { border-bottom: 0; }
  .ex-check {
    flex: 0 0 auto;
    width: 30px;
    height: 30px;
    border-radius: 10px;
    border: 2px solid var(--border-strong);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: transform 0.1s ease, background 0.2s ease, border-color 0.2s ease;
  }
  .ex-check:active { transform: scale(0.9); }
  .ex-check.done {
    background: linear-gradient(135deg, var(--green), var(--green-2));
    border-color: transparent;
    box-shadow: 0 3px 10px rgba(58, 181, 105, 0.35);
  }
  .ex-check.done::after {
    content: "";
    width: 11px;
    height: 6px;
    border-left: 2.4px solid #fff;
    border-bottom: 2.4px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .ex-desc {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.45;
  }
  .ex-sets {
    font-size: 12px;
    color: var(--primary-3);
    font-weight: 700;
    margin-top: 5px;
    letter-spacing: 0.01em;
  }
  .ex-row.done .ex-name { color: var(--muted-2); text-decoration: line-through; }
  .ex-row.done .ex-desc, .ex-row.done .ex-sets { opacity: 0.6; }

  .ex-demo {
    flex: 0 0 auto;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 0;
    box-shadow: 0 4px 12px rgba(255, 122, 89, 0.35);
    transition: transform 0.12s ease;
  }
  .ex-demo:active { transform: scale(0.92); }
  .ex-demo svg { width: 16px; height: 16px; fill: #fff; }

  .ex-card h3 {
    margin-bottom: 2px;
    font-size: 17px;
  }
  .ex-card .meta {
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 800;
    margin-bottom: 12px;
  }
  .warmup-note {
    background: linear-gradient(135deg, var(--primary-soft), var(--primary-tint));
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12.5px;
    color: var(--primary-2);
    margin-bottom: 10px;
    font-weight: 600;
    border: 1px solid rgba(31, 90, 154, 0.12);
  }

  /* Video sheet (YouTube Shorts → portrait) */
  .video-wrap {
    position: relative;
    aspect-ratio: 9 / 16;
    height: min(50vh, 520px);
    width: auto;
    max-width: 100%;
    margin: 0 auto;
    background: #0e1a2b;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .video-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: 0;
  }
  .video-thumb {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .video-thumb::before {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.45) 100%);
  }
  .video-play {
    position: relative;
    z-index: 2;
    width: 68px; height: 68px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  }
  .video-play::after {
    content: "";
    width: 0; height: 0;
    border-left: 16px solid var(--primary);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 4px;
  }
  .cues-list {
    margin: 16px 0 0;
    padding: 0;
    list-style: none;
  }
  .cues-list li {
    padding: 9px 0 9px 26px;
    font-size: 14px;
    line-height: 1.5;
    color: var(--text-2);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .cues-list li:last-child { border-bottom: 0; }
  .cues-list li::before {
    content: "";
    position: absolute;
    left: 4px; top: 15px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: 2px solid var(--accent);
  }
  /* Horizontal thumbnail strip for exercise variants.
     Portrait thumbs (9:16) cropped via background-size: cover so Shorts'
     black letterbox bars in the landscape thumbnail are hidden. */
  .video-strip-label {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 16px 2px 0;
  }
  .video-strip-label .lbl {
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }
  .video-strip-label .count {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted-2);
    font-variant-numeric: tabular-nums;
  }
  .video-strip {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    overflow-y: hidden;
    margin: 8px -10px 0;
    padding: 6px 14px 12px;
    scroll-snap-type: x proximity;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .video-strip::-webkit-scrollbar { display: none; }
  .video-thumb-mini {
    flex: 0 0 auto;
    width: 86px;
    height: 148px;
    border-radius: 12px;
    background-size: cover;
    background-position: center;
    background-color: #0e1a2b;
    position: relative;
    overflow: hidden;
    scroll-snap-align: start;
    padding: 0;
    border: 0;
    cursor: pointer;
    transition: transform 0.15s ease, outline-color 0.2s ease;
    box-shadow: 0 2px 6px rgba(12, 30, 55, 0.12);
  }
  .video-thumb-mini::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.15) 0%,
      transparent 35%,
      transparent 70%,
      rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }
  .video-thumb-mini .mini-num {
    position: absolute;
    top: 7px; left: 7px;
    z-index: 2;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 10.5px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 6px;
    letter-spacing: 0.04em;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .video-thumb-mini .mini-play {
    position: absolute;
    right: 7px; bottom: 7px;
    z-index: 2;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
  }
  .video-thumb-mini .mini-play::after {
    content: "";
    width: 0; height: 0;
    border-left: 9px solid var(--primary);
    border-top: 5.5px solid transparent;
    border-bottom: 5.5px solid transparent;
    margin-left: 2px;
  }
  .video-thumb-mini.active {
    outline: 3px solid var(--primary-3);
    outline-offset: 3px;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(31, 90, 154, 0.35);
  }
  .video-thumb-mini.active .mini-play {
    background: var(--primary-3);
  }
  .video-thumb-mini.active .mini-play::after {
    border-left-color: #fff;
  }
  .video-thumb-mini:active { transform: scale(0.96); }
  /* Fade edges to signal scroll affordance */
  .video-strip-wrap {
    position: relative;
  }
  .video-strip-wrap::before,
  .video-strip-wrap::after {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    width: 16px;
    pointer-events: none;
    z-index: 1;
  }
  .video-strip-wrap::before {
    left: 0;
    background: linear-gradient(90deg, var(--card) 0%, rgba(255,255,255,0) 100%);
  }
  .video-strip-wrap::after {
    right: 0;
    background: linear-gradient(270deg, var(--card) 0%, rgba(255,255,255,0) 100%);
  }

  .video-meta {
    margin: 14px 0 6px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .video-chip {
    padding: 6px 12px;
    border-radius: 999px;
    background: var(--bg);
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.02em;
  }
  .video-chip.strong { background: var(--primary-soft); color: var(--primary-3); }
  .yt-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    min-height: 48px;
    padding: 12px;
    border-radius: 12px;
    background: var(--text);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    margin-top: 12px;
  }
  .yt-link:active { opacity: 0.9; }
  .yt-link::before {
    content: "▶";
    font-size: 12px;
    color: #ff0000;
    background: #fff;
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* ===== Tips: colored boxes ===== */
  .tip-box {
    padding: 16px 18px;
    border-radius: var(--radius);
    margin-bottom: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-xs);
    position: relative;
    overflow: hidden;
  }
  .tip-box::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
  }
  .tip-box h3 {
    margin: 0 0 10px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tip-box h3 .tip-icon {
    width: 30px; height: 30px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .tip-box ol, .tip-box ul { margin: 8px 0 0; padding-left: 20px; }
  .tip-box li {
    margin-bottom: 6px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text-2);
  }
  .tip-box li::marker { font-weight: 700; }
  .tip-box li b { color: var(--text); font-weight: 700; }

  .tip-box.rules::before   { background: linear-gradient(180deg, var(--green), var(--green-2)); }
  .tip-box.rules           { background: linear-gradient(180deg, #effaf3 0%, #ffffff 100%); }
  .tip-box.rules h3        { color: #1e6b3d; }
  .tip-box.rules h3 .tip-icon { background: #d9f2e2; color: #1e6b3d; }

  .tip-box.tips::before    { background: linear-gradient(180deg, #f2c94c, #f6d673); }
  .tip-box.tips            { background: linear-gradient(180deg, #fefaed 0%, #ffffff 100%); }
  .tip-box.tips h3         { color: #8a6d0b; }
  .tip-box.tips h3 .tip-icon { background: #faecb7; color: #8a6d0b; }

  .tip-box.warning::before { background: linear-gradient(180deg, var(--red), #f67a7a); }
  .tip-box.warning         { background: linear-gradient(180deg, #fef2f0 0%, #ffffff 100%); }
  .tip-box.warning h3      { color: #a93226; }
  .tip-box.warning h3 .tip-icon { background: #fbdad5; color: #a93226; }

  .tip-box.medical::before { background: linear-gradient(180deg, var(--purple), #a97ad5); }
  .tip-box.medical         { background: linear-gradient(180deg, #f7f1fc 0%, #ffffff 100%); }
  .tip-box.medical h3      { color: #5b2c6f; }
  .tip-box.medical h3 .tip-icon { background: #ecdff5; color: #5b2c6f; }

  /* ===== Shopping ===== */
  .shop-toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }
  .shop-btn {
    flex: 1;
    min-height: 44px;
    padding: 10px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 13.5px;
    font-weight: 700;
    color: var(--muted);
    transition: transform 0.1s ease;
    box-shadow: var(--shadow-xs);
  }
  .shop-btn:active { transform: scale(0.96); }
  .shop-btn.primary {
    background: var(--grad-primary);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 14px rgba(31, 90, 154, 0.3);
  }
  .shop-section h3 {
    font-size: 11.5px;
    font-weight: 800;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
    margin: 0 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .shop-section h3 .count {
    padding: 2px 8px;
    background: var(--bg);
    color: var(--muted-2);
    border-radius: 999px;
    font-size: 10.5px;
    font-weight: 700;
  }
  .shop-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 4px;
    border-bottom: 1px solid var(--border);
    min-height: 48px;
    width: 100%;
    text-align: left;
    background: transparent;
    transition: transform 0.1s ease;
  }
  .shop-item:last-child { border-bottom: 0; }
  .shop-item:active { transform: scale(0.99); }
  .shop-check {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: 2px solid var(--border-strong);
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .shop-check.checked {
    background: linear-gradient(135deg, var(--green), var(--green-2));
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(58, 181, 105, 0.3);
  }
  .shop-check.checked::after {
    content: "";
    width: 9px;
    height: 5px;
    border-left: 2.2px solid #fff;
    border-bottom: 2.2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
  }
  .shop-name { flex: 1; font-size: 14.5px; font-weight: 500; color: var(--text-2); }
  .shop-qty {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .shop-item.checked .shop-name,
  .shop-item.checked .shop-qty {
    text-decoration: line-through;
    color: var(--muted-2);
  }

  .shop-status {
    background:
      radial-gradient(400px 200px at 100% 0%, rgba(58, 181, 105, 0.08), transparent),
      var(--card);
  }

  /* Stock-for-2-days card at the top of Shopping */
  .stock-card {
    background:
      radial-gradient(500px 200px at 100% -20%, rgba(255, 122, 89, 0.12), transparent 60%),
      linear-gradient(180deg, #fff7f4 0%, #ffffff 100%);
    position: relative;
    overflow: hidden;
    padding: 16px 18px 14px;
    border: 1px solid rgba(255, 122, 89, 0.18);
  }
  .stock-card::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
  }
  .stock-head { margin-bottom: 14px; }
  .stock-head-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
  }
  .stock-head h2 { margin: 0; }
  .stock-days-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 4px;
    border-radius: 999px;
    background: var(--bg);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .stock-days-chip .chip-today,
  .stock-days-chip .chip-tom {
    padding: 3px 9px;
    border-radius: 999px;
  }
  .stock-days-chip .chip-today {
    background: var(--accent);
    color: #fff;
  }
  .stock-days-chip .chip-tom {
    background: var(--primary-3);
    color: #fff;
  }
  .stock-days-chip .sep {
    color: var(--muted-2);
    font-weight: 500;
    font-size: 13px;
    padding: 0 2px;
  }
  .stock-section { margin-bottom: 14px; }
  .stock-section:last-child { margin-bottom: 0; }
  .stock-cat {
    font-size: 10.5px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin: 0 0 4px;
  }
  .stock-list {
    display: flex;
    flex-direction: column;
  }
  .stock-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 2px;
    border-bottom: 1px dashed var(--border);
    gap: 10px;
  }
  .stock-row:last-child { border-bottom: 0; }
  .stock-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stock-name {
    font-size: 14px;
    color: var(--text-2);
    font-weight: 600;
    line-height: 1.3;
  }
  .stock-breakdown {
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.35;
    font-variant-numeric: tabular-nums;
  }
  .stock-breakdown .bd-today {
    color: var(--accent);
    font-weight: 800;
    letter-spacing: 0.01em;
  }
  .stock-breakdown .bd-tom {
    color: var(--primary-3);
    font-weight: 800;
    letter-spacing: 0.01em;
  }
  .stock-breakdown .bd-sep {
    color: var(--muted-2);
    margin: 0 1px;
  }
  .stock-qty {
    font-size: 12.5px;
    font-weight: 800;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    background: var(--bg);

    gap: 10px;
    margin-bottom: 14px;

  .muted { color: var(--muted); }
  .small { font-size: 12px; }
  .no-data { color: var(--muted); font-style: italic; font-size: 13px; padding: 10px 0; text-align: center; }

</head>

  function todayDayKey() {
    return DAYS[new Date().getDay()].key;
  }
  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  }
  function weekKey() {
    // ISO-ish: year-W-num (Sunday-start week for simplicity)
    const d = new Date();
    const start = new Date(d.getFullYear(), 0, 1);
    const diff = Math.floor((d - start) / 86400000);
    return d.getFullYear() + '-W' + Math.ceil((diff + start.getDay() + 1) / 7);
  }

  // v4 phase tracker. Returns null until Atul hits "Start plan today"
  // in the tracker. Once set, computes week number (1-based) + phase name.
  function planWeekInfo() {
    if (!state.planStart) return null;
    const start = new Date(state.planStart + 'T00:00:00');
    if (isNaN(start.getTime())) return null;
    const today = new Date(todayISO() + 'T00:00:00');
    const daysSince = Math.max(0, Math.floor((today - start) / 86400000));
    const weekNum = Math.floor(daysSince / 7) + 1;
    let phase;
    if (weekNum <= 2)      phase = 'Gut adaptation';
    else if (weekNum <= 4) phase = 'Reintroduction';
    else if (weekNum <= 8) phase = 'Build';
    else if (weekNum <= 12) phase = 'Fat loss';
    else                    phase = 'Post-plan maintenance';
    return { weekNum, phase, daysSince };
  }
  function fmtDate(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }
  function calOf(p, f, c) { return Math.round(p*4 + f*9 + c*4); }
  function el(tag, cls, text) {
    const n = document.createElement(tag);
    if (cls) n.className = cls;
    if (text != null) n.textContent = text;
    return n;
  }

  /* ---------- Workout helpers ---------- */

  // Storage key format for a checked exercise:
  //   `YYYY-MM-DD-<blockId>-e<exerciseIdx>`
  function workoutKey(dateIso, blockId, exIdx) {
    return dateIso + '-' + blockId + '-e' + exIdx;
  }

  // Planned session(s) for a given day-of-week.
  // Mon/Fri → Strength A, Wed → Strength B, Tue/Thu → Cardio, Sat → Long cardio, Sun → rest.
  function plannedBlockForDay(dayKey) {
    if (dayKey === 'mon' || dayKey === 'fri') return STRENGTH_A;
    if (dayKey === 'wed') return STRENGTH_B;
    if (dayKey === 'tue' || dayKey === 'thu') return CARDIO_DAY;
    if (dayKey === 'sat') return SATURDAY_LONG;
    return null; // sun: rest
  }

  // Count {done, total} for the planned block on a given day of this week.
  function workoutCountForDay(dayKey) {
    const block = plannedBlockForDay(dayKey);
    if (!block) return { done: 0, total: 0, blockId: null };
    const dateIso = dateKeyForDayOfWeek(dayKey);
    let done = 0;
    for (let i = 0; i < block.exercises.length; i++) {
      if (state.workouts[workoutKey(dateIso, block.id, i)]) done++;
    }
    return { done, total: block.exercises.length, blockId: block.id };
  }

    const got = { strength: 0, cardio: 0 };
    DAYS.forEach(d => {
      const c = workoutCountForDay(d.key);
      // A session "counts" for the weekly goal if ≥ half its exercises done.
      if (c.total === 0 || c.done < Math.ceil(c.total / 2)) return;
      if (c.blockId === 'strA' || c.blockId === 'strB') got.strength++;
      else if (c.blockId === 'cardio' || c.blockId === 'satLong') got.cardio++;
    });
    return { want, got };
  }

  function tomorrowDayKey() {

  // Sums raw ingredients for today + tomorrow, tracking per-day qty.
  function buildStockFor2Days() {
    const todayKey = todayDayKey();
    const tomKey = tomorrowDayKey();
    const aggT = new Map();  // today
    const aggM = new Map();  // tomorrow

    function addDay(dayKey, into) {
      MEAL_PLAN[dayKey].forEach((meal, mi) => {
        meal.items.forEach((origItem, ii) => {
          // Respect swaps: resolve to the currently-selected item (swap or original).
          // Fallback to the original item if the swapped name has no stock mapping yet.
          const current = getItem(dayKey, mi, ii).item;
          let list = ITEM_STOCK[current.name];
          if (!list) list = ITEM_STOCK[origItem.name];
          if (!list || !list.length) return;

            const [name, qty, unit] = tup;
            const k = name + '::' + unit;
            if (into.has(k)) into.get(k).qty += qty;
            else into.set(k, { name, qty, unit });
          });
        });

    addDay(todayKey, aggT);
    addDay(tomKey, aggM);

  function formatStockQty(qty, unit) {
    if (unit === 'g' && qty >= 1000) {
      const kg = qty / 1000;
      return (kg % 1 === 0 ? kg.toFixed(0) : kg.toFixed(2)) + ' kg';
    }
    if (unit === 'ml' && qty >= 1000) {
      const l = qty / 1000;
      return (l % 1 === 0 ? l.toFixed(0) : l.toFixed(2)) + ' L';
    }
    const q = qty % 1 === 0 ? String(qty) : qty.toFixed(1);
    return q + ' ' + unit;
  }

  /* ============================================================
   *  TODAY TIMELINE helpers
   * ============================================================ */

  function padT(n) { return String(n).padStart(2, '0'); }
  function minuteOfDay(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    return h * 60 + m;
  }
  function currentMinute() {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  }
  function formatTime12(hhmm) {
    const [h, m] = hhmm.split(':').map(Number);
    const period = h >= 12 ? 'PM' : 'AM';
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    return h12 + ':' + padT(m) + ' ' + period;
  }
  function addMinutesHHMM(hhmm, mins) {
    const total = minuteOfDay(hhmm) + mins;
    return padT(Math.floor(total / 60)) + ':' + padT(total % 60);
  }
  function greeting() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    if (h < 21) return 'Good evening';
    return 'Good night';
  }
  function iconForTimelineType(t) {
    return { water: '💧', meal: '🍽️', walk: '🚶', workout: '💪', supp: '💊', sleep: '🛏️' }[t] || '•';
  }

  /* ---------- Today-schedule shift helpers ----------
     State model:
       state.shifts = { 'YYYY-MM-DD': { eventId: 'HH:MM' } }
     Only today's entry is ever consulted. Older days are pruned on init
     so the timeline always renders clean at midnight.

     Event IDs (stable per day):
       wake                → the wake/chia-water row
       meal-<mi>           → each meal from MEAL_PLAN (mi = meal index)
       supp-<mi>-<ii>      → supplement row derived from meal.items[ii]
       walk-morning        → morning treadmill or Sat long cardio
       walk-postlunch      → 10-min post-lunch walk
       walk-postdinner     → 15-min post-dinner walk
       workout-main        → Mon/Wed/Fri strength
       workout-evening     → Tue/Thu PM-split cardio
       water-<hhmm>        → each fixed water slot
       sleep               → bedtime sleep marker

     Anchors (never shift — medically or structurally fixed):
       wake, supp-Nurokind, water-22:30, sleep
  */
  function todayShiftMap() {
    return state.shifts[todayISO()] || {};
  }
  function writeTodayShifts(map) {
    const today = todayISO();
    if (!map || Object.keys(map).length === 0) delete state.shifts[today];
    else state.shifts[today] = map;
    save(STORAGE.shifts, state.shifts);
  }
  function pruneOldShifts() {
    const today = todayISO();
    let changed = false;
    Object.keys(state.shifts).forEach(k => {
      if (k !== today) { delete state.shifts[k]; changed = true; }
    });
    if (changed) save(STORAGE.shifts, state.shifts);
  }

  // Applies a shift map to a base timeline (items sorted by plannedTime).
  // Each item MUST have id, plannedTime, and optional anchor:true.
  // For each primary shift, computes delta from the item's current (possibly
  // already-cascaded) time and ripples to all later non-anchor items.
  // Returns a new array sorted by final time.
  // If optMap is omitted, uses today's saved shifts.
  function applyShiftsToTimeline(items, optMap) {
    const shifts = optMap || todayShiftMap();
    const out = items.map(i => ({ ...i, time: i.plannedTime, shifted: false, cascaded: false }));
    // Process shifts in planned order so earlier shifts cascade first,
    // then later explicit shifts override their own row + ripple further.
    out.forEach((it, idx) => {
      if (!shifts[it.id] || it.anchor) return;
      const newTime = shifts[it.id];
      if (newTime === it.time) return;
      const delta = minuteOfDay(newTime) - minuteOfDay(it.time);
      it.time = newTime;
      it.shifted = true;
      if (delta === 0) return;
      for (let j = idx + 1; j < out.length; j++) {
        const later = out[j];
        if (later.anchor) continue;
        // If later item has its own explicit shift, let it be processed on its
        // own iteration; skip cascading into it now.
        if (shifts[later.id]) continue;
        later.time = addMinutesHHMM(later.time, delta);
        later.cascaded = true;
      }
    });
    return out.sort((a, b) => a.time.localeCompare(b.time));
  }

  // Health guardrails. Returns warnings array (strings) — does NOT block.
  // Constraints Atul agreed to:
  //   • min 2.5 h (150 min) between breakfast and lunch
  //   • min 3 h   (180 min) between lunch and dinner
  //   • dinner should end by 21:30 (9:30 PM) — warn, don't clamp
  //   • last meal → bed gap ≥ 120 min (sleep quality + liver)
  function computeShiftWarnings(items) {
    const warnings = [];
    const findByTitle = (pred) => items.find(i => i.type === 'meal' && pred((i.title || '').toLowerCase()));
    const bf     = findByTitle(t => t.indexOf('break') >= 0);
    const lunch  = findByTitle(t => t.indexOf('lunch') >= 0);
    const dinner = findByTitle(t => t.indexOf('dinner') >= 0);
    const sleep  = items.find(i => i.id === 'sleep');

    if (bf && lunch) {
      const gap = minuteOfDay(lunch.time) - minuteOfDay(bf.time);
      if (gap < 150) warnings.push('Only ' + Math.round(gap) + ' min between breakfast and lunch. Target 2.5 h — body hasn\'t cleared breakfast yet.');
    }
    if (lunch && dinner) {
      const gap = minuteOfDay(dinner.time) - minuteOfDay(lunch.time);
      if (gap < 180) warnings.push('Only ' + Math.round(gap) + ' min between lunch and dinner. Target 3 h.');
    }
    if (dinner && minuteOfDay(dinner.time) > minuteOfDay('21:30')) {
      warnings.push('Dinner at ' + formatTime12(dinner.time) + ' — past 9:30 PM cap. Eat lighter or split into a snack now + smaller dinner.');
    }
    if (dinner && sleep) {
      const gap = minuteOfDay(sleep.time) - minuteOfDay(dinner.time);
      if (gap < 120) warnings.push('Only ' + Math.round(gap) + ' min from dinner to bed. Target 2 h for sleep + liver.');
    }
    return warnings;
  }

  // Idealized hydration state for today — assumes user follows the schedule.
  // Parses "N ml" out of each water item's title and sums by current time.
  function computeHydration(dayKey) {
    const now = currentMinute();
    const timeline = buildTodayTimeline(dayKey);
    const waterItems = timeline.filter(t => t.type === 'water');
    let consumed = 0, total = 0, completedSlots = 0;
    let nextSlot = null;
    const slotInfo = [];

    waterItems.forEach(item => {
      // Global match so titles like "Chia water (250 ml) + 500 ml water" sum cleanly
      const matches = [...item.title.matchAll(/(\d+)\s*ml/gi)];
      let amount = 0;
      matches.forEach(m => { amount += parseInt(m[1], 10); });
      if (!amount) return;

      total += amount;
      const mm = minuteOfDay(item.time);
      const slotPctOfDay = total;  // placeholder for tick offset; recomputed after loop
      slotInfo.push({ atMin: mm, amount, title: item.title, time: item.time });

      if (mm <= now) {
        consumed += amount;
        completedSlots++;
      } else if (!nextSlot) {
        nextSlot = { time: item.time, amount, title: item.title };
      }
    });

    // Tick positions as % of total volume (where each slot falls on the bar)
    let cum = 0;
    const ticks = slotInfo.map(s => {
      cum += s.amount;
      return total > 0 ? (cum / total) * 100 : 0;
    });

    return {
      consumed, total,
      completedSlots,
      totalSlots: waterItems.length,
      nextSlot,
      pct: total > 0 ? Math.round(100 * consumed / total) : 0,
      ticks,
    };
  }

  // Convert "8:00 AM" / "1:30 PM" etc. to 24-hour "HH:MM".
  function parseMealTime(timeStr) {
    if (!timeStr) return '00:00';
    const m = timeStr.trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
    if (!m) return '00:00';
    let h = parseInt(m[1], 10);
    const mins = parseInt(m[2], 10);
    const p = m[3].toUpperCase();
    if (p === 'PM' && h !== 12) h += 12;
    if (p === 'AM' && h === 12) h = 0;
    return padT(h) + ':' + padT(mins);
  }

  // Short subtitle showing the first 1-2 food items of a meal, stripped of
  // parenthetical portion notes so it reads cleanly at timeline scale.
  function buildMealSubtitleFromItems(meal) {
    const food = meal.items.filter(it => !it.supp);
    if (!food.length) return null;
    const parts = food.slice(0, 2).map(it => it.name.split(' (')[0].trim());
    return parts.join(' · ');
  }

  function suppShortName(full) {
    if (!full) return 'Supplement';
    if (full.indexOf('Nurokind') === 0) return 'Nurokind-OD 1500 mcg';
    if (full.indexOf('Uprise')   === 0) return 'Uprise-D3 60,000 IU';
    return full.split(' (')[0];
  }

  // Build today's timeline by DERIVING meal rows from MEAL_PLAN (the currently
  // active plan — Simple or Full). Water reminders, walks, and workouts are
  // still added as hardcoded slots since they're behavioral rules rather than
  // meal-plan data. Optional meals carry their `optional` flag through so the
  // render layer can downplay them.
  // Public: returns the timeline for today with any shifts applied.
  function buildTodayTimeline(dayKey) {
    return applyShiftsToTimeline(buildPlannedTimeline(dayKey));
  }

  // Internal: returns the base timeline with plannedTime + time (both = planned).
  function buildPlannedTimeline(dayKey) {
    const plannedWorkout = plannedBlockForDay(dayKey);
    const isSat = dayKey === 'sat';
    const isStrength = dayKey === 'mon' || dayKey === 'wed' || dayKey === 'fri';
    const isCardioSplit = dayKey === 'tue' || dayKey === 'thu';
    const meals = MEAL_PLAN[dayKey] || [];
    const items = [];

    // --- Meals from the active plan ---
    meals.forEach((meal, mi) => {
      const time24 = parseMealTime(meal.time);
      const titleLower = (meal.title || '').toLowerCase();

      if (titleLower.indexOf('wake') >= 0) {
        // Wake is an anchor — chia water is tied to waking up and must stay
        // 90 min before Nurokind to not interfere with sublingual absorption.
        let totalMl = 0;
        meal.items.forEach(it => {
          const matches = [...it.name.matchAll(/(\d+)\s*ml/gi)];
          matches.forEach(m => { totalMl += parseInt(m[1], 10); });
        });
        if (totalMl === 0) totalMl = 250;
        items.push({
          id: 'wake',
          plannedTime: time24,
          type: 'water',
          title: totalMl + ' ml chia water',
          subtitle: '1 tbsp chia soaked overnight · 90 min before Nurokind',
          navMi: mi,
          anchor: true,
        });
        return;
      }

      items.push({
        id: 'meal-' + mi,
        plannedTime: time24,
        type: 'meal',
        title: meal.title,
        subtitle: buildMealSubtitleFromItems(meal),
        navMi: mi,
        optional: meal.optional === true,
      });

      // Any supplement items become their own row at +5 min.
      // Nurokind-OD is anchored (sublingual absorption depends on empty stomach
      // + consistent timing). Uprise-D3 rides with lunch so it cascades with the
      // meal via its own explicit shift if needed.
      meal.items.forEach((s, ii) => {
        if (!s.supp) return;
        const isNurokind = s.name.indexOf('Nurokind') === 0;
        items.push({
          id: 'supp-' + mi + '-' + ii,
          plannedTime: addMinutesHHMM(time24, 5),
          type: 'supp',
          title: suppShortName(s.name),
          subtitle: isNurokind
            ? 'Sublingual 1–2 min · no water for 10 min'
            : (s.name.indexOf('Uprise') === 0
              ? 'Take with paneer sabzi — fat needed for D absorption'
              : null),
          navTo: 'tracker',
          anchor: isNurokind,
        });
      });
    });

    // --- Hardcoded hydration / movement / workout slots ---

    // Morning treadmill walk (or Saturday long cardio)
    if (isSat) {
      items.push({ id: 'workout-main', plannedTime: '07:00', type: 'workout',
                   title: 'Long cardio intervals',
                   subtitle: '50 min · warm-up → 10× intervals → cool-down',
                   navTo: 'exercise' });
    } else {
      items.push({ id: 'walk-morning', plannedTime: '07:00', type: 'walk',
                   title: '20-min morning treadmill walk',
                   subtitle: '5 km/h · wakes up NEAT for the day',
                   navTo: 'exercise' });
    }

    // Water slots — most shiftable, but the bedtime one is anchored.
    items.push({ id: 'water-0745', plannedTime: '07:45', type: 'water', title: '250 ml water',  subtitle: 'Before breakfast' });
    items.push({ id: 'water-1030', plannedTime: '10:30', type: 'water', title: '250 ml water',  subtitle: null });
    items.push({ id: 'water-1315', plannedTime: '13:15', type: 'water', title: '250 ml water',  subtitle: 'Before lunch' });
    items.push({ id: 'water-1530', plannedTime: '15:30', type: 'water', title: '250 ml water',  subtitle: null });
    items.push({ id: 'water-1745', plannedTime: '17:45', type: 'water', title: '250 ml water',  subtitle: null });
    items.push({ id: 'water-2015', plannedTime: '20:15', type: 'water', title: '250 ml water',  subtitle: 'Before dinner' });
    items.push({ id: 'water-2130', plannedTime: '21:30', type: 'water', title: '500 ml water (split in 2)', subtitle: null });
    items.push({ id: 'water-2230', plannedTime: '22:30', type: 'water', title: '250 ml water',  subtitle: 'Before bed', anchor: true });

    // Post-lunch walk — tied to lunch for glucose control.
    items.push({ id: 'walk-postlunch', plannedTime: '13:45', type: 'walk',
                 title: '10-min slow walk',
                 subtitle: 'Post-lunch glucose control',
                 navTo: 'exercise' });

    // Strength workout (Mon/Wed/Fri)
    if (isStrength && plannedWorkout) {
      items.push({ id: 'workout-main', plannedTime: '18:00', type: 'workout',
                   title: plannedWorkout.short,
                   subtitle: '40 min · ' + plannedWorkout.exercises.length + ' exercises',
                   navTo: 'exercise' });
    }

    // Post-dinner walk
    items.push({ id: 'walk-postdinner', plannedTime: '21:00', type: 'walk',
                 title: '15-min walk after dinner',
                 subtitle: null,
                 navTo: 'exercise' });

    // Tue/Thu evening cardio split (PM half of the 20+20 split)
    if (isCardioSplit) {
      items.push({ id: 'workout-evening', plannedTime: '21:05', type: 'workout',
                   title: 'Evening walk (PM split)',
                   subtitle: '20 min at 5 km/h',
                   navTo: 'exercise' });
    }

    // Bedtime — anchored at 23:00. Sleep duration baseline 6.5–7 h.
    items.push({ id: 'sleep', plannedTime: '23:00', type: 'sleep',
                 title: 'Sleep',
                 subtitle: 'Lights out · target 7 h',
                 anchor: true });

    // Sort by planned time (stable baseline before shifts cascade).
    items.sort((a, b) => a.plannedTime.localeCompare(b.plannedTime));
    return items.map(i => ({ ...i, time: i.plannedTime }));
  }

  /* ============================================================

   * ============================================================ */

  const TAB_META = {
    today:    { title: 'Today',    render: renderToday },
    meals:    { title: 'Meals',    render: renderMeals },
    exercise: { title: 'Exercise', render: renderExercise },
    tips:     { title: 'Tips',     render: renderTips },

  const nav = document.getElementById('bottom-nav');
  const headerTitle = document.getElementById('header-title');
  const headerSubtitle = document.getElementById('header-subtitle');
  const headerTipsBtn = document.getElementById('header-tips-btn');

  function setView(key, options) {
    options = options || {};
    state.currentView = key;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + key).classList.add('active');
    nav.querySelectorAll('button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.view === key);

    headerTipsBtn.classList.toggle('active', key === 'tips');
    headerTitle.textContent = TAB_META[key].title;
