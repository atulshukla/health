   * ============================================================ */

  function buildGoalRow(icon, label, got, want, color) {
    const pips = [];
    for (let i = 0; i < want; i++) {
      pips.push('<span class="goal-pip' + (i < got ? ' on' : '') + '" style="--c:' + color + '"></span>');
    }
    const hit = got >= want;
    return (
      '<div class="goal-row">'
      +   '<div class="goal-head">'
      +     '<span class="goal-icon">' + icon + '</span>'
      +     '<span class="goal-label">' + label + '</span>'
      +     '<span class="goal-count' + (hit ? ' hit' : '') + '">' + got + ' / ' + want + (hit ? ' ✓' : '') + '</span>'
      +   '</div>'
      +   '<div class="goal-pips">' + pips.join('') + '</div>'
      + '</div>'
    );
  }

  function openWorkoutDaySheet(dayKey) {
    const day = DAYS.find(d => d.key === dayKey);
    const block = plannedBlockForDay(dayKey);
    const dateIso = dateKeyForDayOfWeek(dayKey);

    sheetTitle.textContent = day.name;
    sheetSub.textContent = block
      ? block.short + ' · ' + (block.meta || '')
      : 'Rest day · optional 20 min walk';

    sheetBody.innerHTML = '';

    if (!block) {
      // Rest day — offer one toggle for the optional walk.
      const wrap = el('div');
      wrap.style.padding = '8px 10px';
      const note = el('div');
      note.className = 'warmup-note';
      note.style.margin = '8px 0 14px';
      note.textContent = 'Rest day. Optional 20 min walk keeps the habit going — tap below if you did one.';
      wrap.appendChild(note);

      const walkKey = workoutKey(dateIso, 'restWalk', 0);
      const walkOn = !!state.workouts[walkKey];
      const row = el('button', 'toggle-row');
      row.style.padding = '14px';
      row.style.border = '1px solid var(--border)';
      row.style.borderRadius = '12px';
      row.innerHTML =
        '<div class="toggle-info">'
        +   '<div class="toggle-name">20-min recovery walk</div>'
        +   '<div class="toggle-sub">Easy pace · outside or treadmill</div>'
        + '</div>'
        + '<div class="toggle-switch' + (walkOn ? ' on' : '') + '"></div>';
      row.addEventListener('click', () => {
        if (state.workouts[walkKey]) delete state.workouts[walkKey];
        else state.workouts[walkKey] = true;
        save(STORAGE.workouts, state.workouts);
        openWorkoutDaySheet(dayKey); // re-render sheet
        // and also refresh tracker underneath
        if (state.currentView === 'tracker') renderTracker();
      });
      wrap.appendChild(row);
      sheetBody.appendChild(wrap);
      openSheet();
      return;
    }

    // Active day — show the block's exercises as toggleable rows.
    const count = workoutCountForDay(dayKey);
    const meta = el('div', 'video-meta');
    meta.style.marginTop = '4px';
    meta.appendChild(el('span', 'video-chip strong', count.done + ' / ' + count.total + ' done'));
    if (block.meta) meta.appendChild(el('span', 'video-chip', block.meta));
    sheetBody.appendChild(meta);

    // Bulk action buttons
    const bulk = el('div');
    bulk.style.display = 'flex';
    bulk.style.gap = '8px';
    bulk.style.margin = '14px 8px 6px';

    const markAll = el('button', 'shop-btn primary');
    markAll.textContent = 'Mark all done';
    markAll.addEventListener('click', () => {
      block.exercises.forEach((_, i) => {
        state.workouts[workoutKey(dateIso, block.id, i)] = true;
      });
      save(STORAGE.workouts, state.workouts);
      openWorkoutDaySheet(dayKey);
      if (state.currentView === 'tracker') renderTracker();
    });

    const clearAll = el('button', 'shop-btn');
    clearAll.textContent = 'Clear all';
    clearAll.addEventListener('click', () => {
      block.exercises.forEach((_, i) => {
        delete state.workouts[workoutKey(dateIso, block.id, i)];
      });
      save(STORAGE.workouts, state.workouts);
      openWorkoutDaySheet(dayKey);
      if (state.currentView === 'tracker') renderTracker();
    });

    bulk.appendChild(markAll);
    bulk.appendChild(clearAll);
    sheetBody.appendChild(bulk);

    // Exercise rows
    const list = el('div');
    list.style.padding = '4px 6px 8px';
    block.exercises.forEach((ex, i) => {
      const k = workoutKey(dateIso, block.id, i);
      const done = !!state.workouts[k];
      const row = el('button', 'ex-row');
      row.style.padding = '12px 6px';
      row.style.textAlign = 'left';
      row.style.width = '100%';
      if (done) row.classList.add('done');

      row.innerHTML =
        '<span class="ex-check' + (done ? ' done' : '') + '"></span>'
        + '<div class="ex-body">'
        +   '<div class="ex-name">' + ex.name + '</div>'
        +   '<div class="ex-desc">' + ex.desc + '</div>'
        +   '<div class="ex-sets">' + ex.sets + (ex.rest && ex.rest !== '—' ? ' · rest ' + ex.rest : '') + '</div>'
        + '</div>';

      row.addEventListener('click', () => {
        if (state.workouts[k]) delete state.workouts[k];
        else state.workouts[k] = true;
        save(STORAGE.workouts, state.workouts);
        openWorkoutDaySheet(dayKey);
        if (state.currentView === 'tracker') renderTracker();
      });
      list.appendChild(row);
    });
    sheetBody.appendChild(list);

    openSheet();
  }

  /* ============================================================

   * ============================================================ */

  function renderShopping() {
    const root = document.getElementById('view-shopping');
    root.innerHTML = '';

    // Counts + toolbar
    let total = 0, done = 0;
    SHOPPING.forEach((sec, si) => {
      sec.items.forEach((_, ii) => {
        total++;
        if (state.shopping[sec.cat.toLowerCase().replace(/\s+/g, '_') + '-' + si + '-' + ii]) done++;
      });
    });

    const pct = total > 0 ? Math.round(100*done/total) : 0;
    const status = el('div', 'card shop-status');
    status.innerHTML =
      '<div class="row-flex-between">'
      +   '<div>'
      +     '<h2 style="margin-bottom:4px">Weekly list</h2>'
      +     '<div class="muted small"><b style="color:var(--text)">' + done + '</b> of ' + total + ' checked</div>'
      +   '</div>'
      +   '<div class="shop-status-ring" style="--pct:' + pct + '%"><span>' + pct + '%</span></div>'
      + '</div>';
    root.appendChild(status);

    const toolbar = el('div', 'shop-toolbar');
    const resetBtn = el('button', 'shop-btn', 'Reset list');
    resetBtn.addEventListener('click', () => {
      if (!confirm('Clear all checks?')) return;
      state.shopping = {};
      save(STORAGE.shopping, state.shopping);
      renderShopping();
    });
    const allBtn = el('button', 'shop-btn primary', 'Check all');
    allBtn.addEventListener('click', () => {
      SHOPPING.forEach((sec, si) => {
        sec.items.forEach((_, ii) => {
          state.shopping[keyShop(sec, si, ii)] = true;
        });
      });
      save(STORAGE.shopping, state.shopping);
      renderShopping();
    });
    toolbar.appendChild(resetBtn);
    toolbar.appendChild(allBtn);
    root.appendChild(toolbar);

    SHOPPING.forEach((sec, si) => {
      const card = el('div', 'card shop-section');
      let secDone = 0;
      sec.items.forEach((_, ii) => {
        if (state.shopping[keyShop(sec, si, ii)]) secDone++;
      });
      const h = el('h3');
      h.innerHTML =
        '<span>' + sec.cat + '</span>'
        + '<span class="count">' + secDone + '/' + sec.items.length + '</span>';
      card.appendChild(h);
      sec.items.forEach((it, ii) => {
        const k = keyShop(sec, si, ii);
        const isChecked = !!state.shopping[k];
        const row = el('button', 'shop-item' + (isChecked ? ' checked' : ''));
        row.innerHTML =
          '<span class="shop-check' + (isChecked ? ' checked' : '') + '"></span>'
          + '<span class="shop-name">' + it.name + '</span>'
          + '<span class="shop-qty">' + it.qty + '</span>';
        row.addEventListener('click', () => {
          if (state.shopping[k]) delete state.shopping[k];
          else state.shopping[k] = true;
          save(STORAGE.shopping, state.shopping);
          renderShopping();
        });
        card.appendChild(row);
      });
      root.appendChild(card);
    });
  }

  function keyShop(sec, si, ii) {
    return sec.cat.toLowerCase().replace(/\s+/g, '_') + '-' + si + '-' + ii;
  }

  /* ============================================================
   *  TRACKER TAB
   * ============================================================ */

  function renderTracker() {
    const root = document.getElementById('view-tracker');
    root.innerHTML = '';

    // Summary stats row
    const grid = el('div', 'tracker-grid-2');
    const latestW = state.weight[state.weight.length - 1];
    const prevW = state.weight[state.weight.length - 2];
    const wCard = el('div', 'stat-card weight');
    let wSubClass = '', wSubText = '';
    if (latestW && prevW) {
      if (latestW.kg < prevW.kg) {
        wSubClass = 'down';
        wSubText = '▼ ' + (prevW.kg - latestW.kg).toFixed(1) + ' kg from last';
      } else if (latestW.kg > prevW.kg) {
        wSubClass = 'up';
        wSubText = '▲ ' + (latestW.kg - prevW.kg).toFixed(1) + ' kg from last';
      } else wSubText = 'no change';
    } else if (latestW) wSubText = 'first entry';
    else wSubText = 'no entries yet';
    wCard.innerHTML =
      '<div class="stat-label">Weight</div>'
      + '<div class="stat-value">'
      +   (latestW ? latestW.kg.toFixed(1) : '—')
      +   '<span class="unit">kg</span></div>'
      + '<div class="stat-sub ' + wSubClass + '">' + wSubText + '</div>';
    grid.appendChild(wCard);

    const latestR = state.rhr[state.rhr.length - 1];
    const rhrCard = el('div', 'stat-card rhr');
    const rhrStatus = latestR
      ? (latestR.bpm > 85 ? '⚠ concerning' : (latestR.bpm > 75 ? '⚠ elevated' : '✓ normal'))
      : 'no entries yet';
    rhrCard.innerHTML =
      '<div class="stat-label">Resting HR</div>'
      + '<div class="stat-value">'
      +   (latestR ? latestR.bpm : '—')
      +   '<span class="unit">bpm</span></div>'
      + '<div class="stat-sub">' + rhrStatus + '</div>';
    grid.appendChild(rhrCard);
    root.appendChild(grid);

    // === Supplements today ===
    const suppsCard = el('div', 'card');
    suppsCard.innerHTML = '<h2>Today\'s supplements</h2>';
    const date = todayISO();
    const isSunday = todayDayKey() === 'sun';

    const suppList = [
      { key: 'chia',     name: 'Chia water',   sub: '6:30 AM · 1 tbsp soaked' },
      { key: 'nurokind', name: 'Nurokind-OD',  sub: '8:00 AM · 1500 mcg sublingual' },
    ];
    if (isSunday) {
      suppList.push({ key: 'uprise', name: 'Uprise-D3',   sub: 'Sunday lunch · 60,000 IU with paneer sabzi' });
    }

    suppList.forEach(s => {
      const k = date + '-' + s.key;
      const on = !!state.supps[k];
      const row = el('button', 'toggle-row');
      row.innerHTML =
        '<div class="toggle-info">'
        +   '<div class="toggle-name">' + s.name + '</div>'
        +   '<div class="toggle-sub">' + s.sub + '</div>'
        + '</div>'
        + '<div class="toggle-switch' + (on ? ' on' : '') + '"></div>';
      row.addEventListener('click', () => {
        if (state.supps[k]) delete state.supps[k];
        else state.supps[k] = true;
        save(STORAGE.supps, state.supps);
        renderTracker();
      });
      suppsCard.appendChild(row);
    });
    root.appendChild(suppsCard);

    // === Weekly goal ===
    const totals = weeklyWorkoutTotals();
    const goalCard = el('div', 'card');
    goalCard.innerHTML =
      '<h2>Weekly goal</h2>'
      + '<p class="muted small" style="margin-bottom:12px">Target from your plan: 3 strength + 3 cardio sessions.</p>'
      + buildGoalRow('💪', 'Strength', totals.got.strength, totals.want.strength, 'var(--protein)')
      + buildGoalRow('🚶', 'Cardio',   totals.got.cardio,   totals.want.cardio,   'var(--carbs)');
    root.appendChild(goalCard);

    // === Workouts this week (interactive) ===
    const wkCard = el('div', 'card');
    wkCard.innerHTML =
      '<h2>Workouts this week</h2>'
      + '<p class="muted small" style="margin-bottom:10px">Tap any day to check off exercises.</p>';
    const wSum = el('div', 'workout-sum');
    const today = todayDayKey();
    DAYS.forEach(d => {
      const count = workoutCountForDay(d.key);
      let state3 = 'none';
      if (count.total === 0) state3 = 'rest';
      else if (count.done === 0) state3 = 'none';
      else if (count.done >= count.total) state3 = 'full';
      else state3 = 'partial';

      const block = plannedBlockForDay(d.key);
      const cell = el('button',
        'wk-cell ' + state3 + (d.key === today ? ' today' : ''));
      cell.setAttribute('aria-label', d.name + (block ? ' — ' + block.short : ' — rest day'));
      const countLabel = count.total > 0
        ? '<span class="wk-count">' + count.done + '/' + count.total + '</span>'
        : '<span class="wk-count muted">rest</span>';
      cell.innerHTML =
        '<span class="d">' + d.short + '</span>'
        + '<span class="dot"></span>'
        + countLabel;
      cell.addEventListener('click', () => openWorkoutDaySheet(d.key));
      wSum.appendChild(cell);
    });
    wkCard.appendChild(wSum);
    root.appendChild(wkCard);

    // === Weight log ===
    const wLog = el('div', 'card');
    wLog.innerHTML = '<h2>Weight log</h2><p class="muted small" style="margin-bottom:8px">Log Sunday 7 AM, after toilet, before eating.</p>';
    const wRow = el('div', 'inline-input-row');
    const wInput = el('input', 'inline-input');
    wInput.type = 'number';
    wInput.inputMode = 'decimal';
    wInput.step = '0.1';
    wInput.placeholder = 'kg (e.g. 102.4)';
    const wBtn = el('button', 'btn-primary', 'Add');
    wBtn.addEventListener('click', () => {
      const v = parseFloat(wInput.value);
      if (!v || v < 30 || v > 250) { wInput.focus(); return; }
      state.weight.push({ date: todayISO(), kg: v });
      state.weight.sort((a, b) => a.date.localeCompare(b.date));
      save(STORAGE.weight, state.weight);
      wInput.value = '';
      renderTracker();
    });
    wRow.appendChild(wInput);
    wRow.appendChild(wBtn);
    wLog.appendChild(wRow);

    if (state.weight.length === 0) {
      const empty = el('div', 'no-data', 'No weight entries yet.');
      wLog.appendChild(empty);
    } else {
      const list = el('div', 'log-list');
      const sorted = [...state.weight].sort((a,b) => b.date.localeCompare(a.date));
      sorted.forEach((entry, idx) => {
        const row = el('div', 'log-row');
        const origIdx = state.weight.findIndex(e => e.date === entry.date && e.kg === entry.kg);
        row.innerHTML =
          '<span class="log-date">' + fmtDate(entry.date) + '</span>'
          + '<span><span class="log-val">' + entry.kg.toFixed(1) + ' kg</span>'
          + '<button class="log-del" data-i="' + origIdx + '" aria-label="Delete">×</button></span>';
        list.appendChild(row);
      });
      list.addEventListener('click', (e) => {
        const btn = e.target.closest('.log-del');
        if (!btn) return;
        const i = parseInt(btn.dataset.i, 10);
        if (!confirm('Delete this entry?')) return;
        state.weight.splice(i, 1);
        save(STORAGE.weight, state.weight);
        renderTracker();
      });
      wLog.appendChild(list);
    }
    root.appendChild(wLog);

    // === RHR log ===
    const rLog = el('div', 'card');
    rLog.innerHTML = '<h2>Resting heart rate</h2><p class="muted small" style="margin-bottom:8px">Log daily. Flag if consistently >85 BPM.</p>';
    const rRow = el('div', 'inline-input-row');
    const rInput = el('input', 'inline-input');
    rInput.type = 'number';
    rInput.inputMode = 'numeric';
    rInput.step = '1';
    rInput.placeholder = 'BPM (e.g. 68)';
    const rBtn = el('button', 'btn-primary', 'Add');
    rBtn.addEventListener('click', () => {
      const v = parseInt(rInput.value, 10);
      if (!v || v < 30 || v > 200) { rInput.focus(); return; }
      state.rhr.push({ date: todayISO(), bpm: v });
      state.rhr.sort((a, b) => a.date.localeCompare(b.date));
      save(STORAGE.rhr, state.rhr);
      rInput.value = '';
      renderTracker();
    });
    rRow.appendChild(rInput);
    rRow.appendChild(rBtn);
    rLog.appendChild(rRow);

    if (state.rhr.length === 0) {
      const empty = el('div', 'no-data', 'No RHR entries yet.');
      rLog.appendChild(empty);
    } else {
      const list = el('div', 'log-list');
      const sorted = [...state.rhr].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 14);
      sorted.forEach((entry) => {
        const row = el('div', 'log-row');
        const badge = entry.bpm > 85 ? '⚠' : (entry.bpm > 75 ? '•' : '✓');
        row.innerHTML =
          '<span class="log-date">' + fmtDate(entry.date) + '</span>'
          + '<span class="log-val">' + badge + ' ' + entry.bpm + ' bpm</span>';
        list.appendChild(row);
      });
      rLog.appendChild(list);
    }
    root.appendChild(rLog);

    // === Waist log (monthly measurement from the plan) ===
    const waistCard = el('div', 'card');
    const latestWaist = state.waist[state.waist.length - 1];
    const prevWaist = state.waist[state.waist.length - 2];
    let waistDelta = '';
    if (latestWaist && prevWaist) {
      const d = latestWaist.cm - prevWaist.cm;
      if (d < 0) waistDelta = '<span class="stat-sub down">▼ ' + Math.abs(d).toFixed(1) + ' cm from last</span>';
      else if (d > 0) waistDelta = '<span class="stat-sub up">▲ ' + d.toFixed(1) + ' cm from last</span>';
      else waistDelta = '<span class="stat-sub">no change</span>';
    } else if (latestWaist) {
      waistDelta = '<span class="stat-sub">first entry</span>';
    }
    waistCard.innerHTML =
      '<div class="row-flex-between" style="margin-bottom:8px">'
      +   '<div>'
      +     '<h2 style="margin-bottom:2px">Waist</h2>'
      +     '<p class="muted small" style="margin:0">Measure monthly. Use a tape measure at navel level.</p>'
      +   '</div>'
      +   '<div style="text-align:right">'
      +     '<div class="stat-value" style="font-size:22px">'
      +       (latestWaist ? latestWaist.cm.toFixed(1) : '—')
      +       '<span class="unit">cm</span></div>'
      +     waistDelta
      +   '</div>'
      + '</div>';
    const waistRow = el('div', 'inline-input-row');
    const waistInput = el('input', 'inline-input');
    waistInput.type = 'number';
    waistInput.inputMode = 'decimal';
    waistInput.step = '0.1';
    waistInput.placeholder = 'cm (e.g. 102.5)';
    const waistBtn = el('button', 'btn-primary', 'Add');
    waistBtn.addEventListener('click', () => {
      const v = parseFloat(waistInput.value);
      if (!v || v < 40 || v > 200) { waistInput.focus(); return; }
      state.waist.push({ date: todayISO(), cm: v });
      state.waist.sort((a, b) => a.date.localeCompare(b.date));
      save(STORAGE.waist, state.waist);
      waistInput.value = '';
      renderTracker();
    });
    waistRow.appendChild(waistInput);
    waistRow.appendChild(waistBtn);
    waistCard.appendChild(waistRow);

    if (state.waist.length === 0) {
      waistCard.appendChild(el('div', 'no-data', 'No waist entries yet.'));
    } else {
      const list = el('div', 'log-list');
      const sorted = [...state.waist].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach((entry) => {
        const origIdx = state.waist.findIndex(e => e.date === entry.date && e.cm === entry.cm);
        const row = el('div', 'log-row');
        row.innerHTML =
          '<span class="log-date">' + fmtDate(entry.date) + '</span>'
          + '<span><span class="log-val">' + entry.cm.toFixed(1) + ' cm</span>'
          + '<button class="log-del" data-i="' + origIdx + '" aria-label="Delete">×</button></span>';
        list.appendChild(row);
      });
      list.addEventListener('click', (e) => {
        const btn = e.target.closest('.log-del');
        if (!btn) return;
        if (!confirm('Delete this entry?')) return;
        state.waist.splice(parseInt(btn.dataset.i, 10), 1);
        save(STORAGE.waist, state.waist);
        renderTracker();
      });
      waistCard.appendChild(list);
    }
    root.appendChild(waistCard);


    // === Sunday review symptoms ===
    const sympCard = el('div', 'card');
    sympCard.innerHTML = '<h2>Sunday review — symptoms</h2><p class="muted small" style="margin-bottom:4px">Tap severity. Resets weekly.</p>';
    const wk = weekKey();
    SYMPTOMS_WATCH.forEach(s => {
      const row = el('div', 'symp-row');
      const name = el('div', 'symp-name', s.name);
      const opts = el('div', 'symp-opts');
      const curKey = wk + '-' + s.key;
      const cur = state.symptoms[curKey];
      [{ l: 0, t: 'None' }, { l: 1, t: 'Mild' }, { l: 2, t: 'Bad' }].forEach(o => {
        const btn = el('button', 'symp-opt' + (cur === o.l ? ' active' : ''), o.t);
        btn.dataset.level = o.l;
        btn.addEventListener('click', () => {
          if (cur === o.l) delete state.symptoms[curKey];
          else state.symptoms[curKey] = o.l;
          save(STORAGE.symptoms, state.symptoms);
          renderTracker();
        });
        opts.appendChild(btn);
      });
      row.appendChild(name);
      row.appendChild(opts);
      sympCard.appendChild(row);
    });
    root.appendChild(sympCard);

    // === Export / reset ===
    const dangerCard = el('div', 'card');
    dangerCard.innerHTML = '<h2>Data</h2>'
      + '<p class="muted small" style="margin-bottom:6px">All data is saved locally on this device only.</p>';
    const exportBtn = el('button', 'shop-btn primary', 'Export as JSON');
    exportBtn.style.width = '100%';
    exportBtn.style.marginBottom = '8px';
    exportBtn.addEventListener('click', exportData);
    dangerCard.appendChild(exportBtn);

    const resetAll = el('button', 'bigred-btn', 'Reset all saved data');
    resetAll.addEventListener('click', () => {
      if (!confirm('Erase ALL saved data (swaps, shopping, weights, RHR, supplements, workouts)? This cannot be undone.')) return;
      Object.values(STORAGE).forEach(k => { try { localStorage.removeItem(k); } catch(_){} });
      state.swaps = {}; state.shopping = {}; state.weight = []; state.rhr = [];
      state.waist = []; state.supps = {}; state.workouts = {}; state.symptoms = {};
      renderTracker();
    });
    dangerCard.appendChild(resetAll);
    root.appendChild(dangerCard);
  }

  function dateKeyForDayOfWeek(dayKey) {
    // Return the ISO date of the most recent occurrence of dayKey that
    // falls within the current Sunday-started week.
    const target = DAYS.findIndex(d => d.key === dayKey);
    const now = new Date();
    const todayIdx = now.getDay();
    const diff = target - todayIdx;
    const d = new Date(now);
    d.setDate(now.getDate() + diff);
    return d.getFullYear() + '-'
      + String(d.getMonth()+1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  }

  function exportData() {
    const data = {
      exportedAt: new Date().toISOString(),
      swaps: state.swaps,
      shopping: state.shopping,
      weight: state.weight,
      rhr: state.rhr,
      waist: state.waist,
      supps: state.supps,
      workouts: state.workouts,
      symptoms: state.symptoms,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'atul-health-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 100);
  }

  /* ============================================================
   *  INIT
   * ============================================================ */

  state.currentDay = load(STORAGE.curDay, todayDayKey());
  if (!MEAL_PLAN[state.currentDay]) state.currentDay = todayDayKey();

  let initial = 'today';
  try {
    const saved = localStorage.getItem(STORAGE.lastTab);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (TAB_META[parsed]) initial = parsed;
    }
  } catch (_) {}
  setView(initial);

  window.HealthApp = { state, setView, MEAL_PLAN, ITEM_ALTS, DAYS };
})();
</script>
</body>
</html>
